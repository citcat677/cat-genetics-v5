<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Генетика котов</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #1f2937; color: #f3f4f6; }
    .tab-btn { transition: all 0.2s; }
    .tab-btn.active { background: #374151; border-bottom: 3px solid #f472b6; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; z-index: 1000; }
    .modal.active { display: flex; }
    .modal-content { background: #2d3748; border-radius: 1rem; padding: 1.5rem; max-width: 90%; width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
    .cat-card { transition: transform 0.1s; }
    .cat-card:hover { transform: scale(1.02); background: #374151; }
    .btn { padding: 0.5rem 1rem; border-radius: 0.5rem; font-weight: 600; cursor: pointer; }
    .btn-pink { background: #ec4899; color: white; }
    .btn-pink:hover { background: #db2777; }
    .btn-gray { background: #4b5563; color: white; }
    .btn-gray:hover { background: #374151; }
    .notification-dot { position: absolute; top: -5px; right: -5px; background: #ef4444; color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 0.7rem; display: flex; align-items: center; justify-content: center; }
    .countdown { font-size: 1.2rem; font-weight: bold; color: #fbbf24; }
    .park-game { position: relative; width: 100%; height: 200px; background: #7f1d1d; overflow: hidden; }
    .park-zone { position: absolute; width: 60px; height: 100%; background: #166534; left: 50%; transform: translateX(-50%); }
    .park-cat { position: absolute; font-size: 2rem; transition: left 0.15s linear; }
    body.mobile .cat-card { width: 100% !important; }
    body.mobile .btn { padding: 0.75rem 1.25rem; font-size: 1rem; }
    body.mobile .tab-btn { font-size: 0.8rem; }
    body.mobile #app { max-width: 100% !important; }
    body.mobile .modal-content { width: 95% !important; max-width: 95% !important; }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-start p-4">
  <div id="auth-container" class="w-full max-w-md mt-20 bg-gray-800 p-6 rounded-xl shadow-xl">
    <h1 class="text-2xl font-bold text-pink-400 mb-4">🐾 Генетика котов</h1>
    <input id="nickname" type="text" placeholder="Ник" class="w-full p-2 mb-2 rounded bg-gray-700 text-white">
    <input id="email" type="email" placeholder="Email" class="w-full p-2 mb-2 rounded bg-gray-700 text-white">
    <input id="password" type="password" placeholder="Пароль" class="w-full p-2 mb-2 rounded bg-gray-700 text-white">
    <button id="login-btn" class="btn btn-pink w-full mb-2">Войти</button>
    <button id="register-btn" class="btn btn-gray w-full">Регистрация</button>
  </div>

  <div id="app" class="w-full max-w-4xl hidden">
    <div class="flex justify-between items-center bg-gray-800 p-3 rounded-xl mb-4">
      <div class="flex space-x-2">
        <button class="tab-btn px-3 py-1 rounded" data-tab="home">🏠 Дом</button>
        <button class="tab-btn px-3 py-1 rounded" data-tab="allcats">🌍 Все коты</button>
        <button class="tab-btn px-3 py-1 rounded" data-tab="breeding">💕 Разведение</button>
        <button class="tab-btn px-3 py-1 rounded" data-tab="shop">🛒 Магазин</button>
        <button class="tab-btn px-3 py-1 rounded" data-tab="park">🌳 Парк</button>
        <button class="tab-btn px-3 py-1 rounded" data-tab="castle">🏰 Замок</button>
      </div>
      <div class="flex items-center space-x-3">
        <span id="game-time" class="text-yellow-300 font-mono">☀️ 06:00</span>
        <span id="coins-display" class="text-yellow-400 font-bold">🪙 0</span>
        <button id="inventory-btn" class="relative text-xl">🎒</button>
        <button id="msg-btn" class="relative text-xl">✉️ <span id="msg-badge" class="notification-dot hidden">0</span></button>
        <button id="account-btn" class="text-xl">⚙️</button>
        <button id="reset-btn" class="text-xl hidden" title="Сбросить всё">🗑</button>
        <button id="logout-btn" class="text-sm text-red-400">Выйти</button>
      </div>
    </div>
    <div id="tab-content" class="bg-gray-800 p-4 rounded-xl min-h-[300px]"></div>
  </div>

  <!-- Модальные окна -->
  <div id="cat-modal" class="modal"><div class="modal-content" id="cat-modal-content"></div></div>
  <div id="message-modal" class="modal"><div class="modal-content" id="message-modal-content"></div></div>
  <div id="birth-modal" class="modal"><div class="modal-content max-w-2xl" id="birth-modal-content"></div></div>
  <div id="choose-cat-modal" class="modal"><div class="modal-content max-w-lg w-full" id="choose-cat-modal-content"></div></div>
  <div id="tracking-modal" class="modal"><div class="modal-content" id="tracking-modal-content"></div></div>
  <div id="park-game-modal" class="modal"><div class="modal-content w-96" id="park-game-content"></div></div>
  <div id="inventory-modal" class="modal"><div class="modal-content max-w-lg" id="inventory-modal-content"></div></div>
  <div id="item-use-modal" class="modal"><div class="modal-content" id="item-use-modal-content"></div></div>
  <div id="family-tree-modal" class="modal"><div class="modal-content max-w-lg" id="family-tree-content"></div></div>
  <div id="device-modal" class="modal"><div class="modal-content" id="device-modal-content"></div></div>
  <div id="walk-result-modal" class="modal"><div class="modal-content" id="walk-result-content"></div></div>
  <div id="compare-modal" class="modal"><div class="modal-content max-w-lg" id="compare-modal-content"></div></div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBSO84yoAhHUCIejdf9mmo89oXIYeeSFfs",
      authDomain: "cat-genetics-v6.firebaseapp.com",
      projectId: "cat-genetics-v6",
      storageBucket: "cat-genetics-v6.firebasestorage.app",
      messagingSenderId: "302978224196",
      appId: "1:302978224196:web:106b02fc1157bd17fdac11",
      measurementId: "G-HKJQVRPCZJ"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null, currentTab = 'home', timeInterval = null, notificationsListener = null, gameMinutes = 360;

    const COLORS = ['белый','чёрный','рыжий','серый','кремовый','шоколадный','лиловый','голубой'];
    const PATTERNS = ['однотонный','табби','пятнистый','мраморный','колорпойнт','черепаховый'];
    const EYE_COLORS = ['голубой','зелёный','жёлтый','карий','красно-розовый'];
    const CHARACTERS = ['спокойный','игривый','ленивый','любопытный','независимый','ласковый'];

    // Матрица наследования окрасов
    const colorInheritance = {
      'чёрный_чёрный':[{c:'чёрный',p:80},{c:'серый',p:15},{c:'белый',p:5}],
      'чёрный_серый':[{c:'чёрный',p:50},{c:'серый',p:40},{c:'белый',p:10}],
      'чёрный_белый':[{c:'белый',p:40},{c:'чёрный',p:40},{c:'серый',p:20}],
      'чёрный_рыжий':[{c:'чёрный',p:45},{c:'рыжий',p:45},{c:'серый',p:10}],
      'чёрный_кремовый':[{c:'чёрный',p:40},{c:'кремовый',p:40},{c:'серый',p:20}],
      'чёрный_шоколадный':[{c:'чёрный',p:55},{c:'шоколадный',p:35},{c:'серый',p:10}],
      'чёрный_лиловый':[{c:'чёрный',p:45},{c:'лиловый',p:35},{c:'серый',p:20}],
      'чёрный_голубой':[{c:'чёрный',p:45},{c:'голубой',p:35},{c:'серый',p:20}],
      'серый_серый':[{c:'серый',p:70},{c:'чёрный',p:15},{c:'белый',p:15}],
      'серый_белый':[{c:'серый',p:50},{c:'белый',p:30},{c:'чёрный',p:20}],
      'серый_рыжий':[{c:'серый',p:40},{c:'рыжий',p:40},{c:'чёрный',p:20}],
      'серый_кремовый':[{c:'серый',p:40},{c:'кремовый',p:40},{c:'белый',p:20}],
      'серый_шоколадный':[{c:'серый',p:45},{c:'шоколадный',p:35},{c:'чёрный',p:20}],
      'серый_лиловый':[{c:'серый',p:45},{c:'лиловый',p:35},{c:'белый',p:20}],
      'серый_голубой':[{c:'серый',p:45},{c:'голубой',p:35},{c:'чёрный',p:20}],
      'белый_белый':[{c:'белый',p:90},{c:'серый',p:10}],
      'белый_рыжий':[{c:'белый',p:40},{c:'рыжий',p:40},{c:'кремовый',p:20}],
      'белый_кремовый':[{c:'белый',p:40},{c:'кремовый',p:40},{c:'серый',p:20}],
      'белый_шоколадный':[{c:'белый',p:40},{c:'шоколадный',p:35},{c:'серый',p:25}],
      'белый_лиловый':[{c:'белый',p:40},{c:'лиловый',p:35},{c:'серый',p:25}],
      'белый_голубой':[{c:'белый',p:40},{c:'голубой',p:35},{c:'серый',p:25}],
      'рыжий_рыжий':[{c:'рыжий',p:80},{c:'кремовый',p:15},{c:'белый',p:5}],
      'рыжий_кремовый':[{c:'рыжий',p:45},{c:'кремовый',p:45},{c:'белый',p:10}],
      'рыжий_шоколадный':[{c:'рыжий',p:40},{c:'шоколадный',p:30},{c:'чёрный',p:30}],
      'рыжий_лиловый':[{c:'рыжий',p:40},{c:'лиловый',p:30},{c:'серый',p:30}],
      'рыжий_голубой':[{c:'рыжий',p:40},{c:'голубой',p:30},{c:'серый',p:30}],
      'кремовый_кремовый':[{c:'кремовый',p:80},{c:'белый',p:15},{c:'рыжий',p:5}],
      'кремовый_шоколадный':[{c:'кремовый',p:40},{c:'шоколадный',p:35},{c:'серый',p:25}],
      'кремовый_лиловый':[{c:'кремовый',p:40},{c:'лиловый',p:35},{c:'серый',p:25}],
      'кремовый_голубой':[{c:'кремовый',p:40},{c:'голубой',p:35},{c:'серый',p:25}],
      'шоколадный_шоколадный':[{c:'шоколадный',p:80},{c:'чёрный',p:15},{c:'серый',p:5}],
      'шоколадный_лиловый':[{c:'шоколадный',p:45},{c:'лиловый',p:35},{c:'серый',p:20}],
      'шоколадный_голубой':[{c:'шоколадный',p:45},{c:'голубой',p:35},{c:'серый',p:20}],
      'лиловый_лиловый':[{c:'лиловый',p:80},{c:'серый',p:15},{c:'белый',p:5}],
      'лиловый_голубой':[{c:'лиловый',p:45},{c:'голубой',p:45},{c:'серый',p:10}],
      'голубой_голубой':[{c:'голубой',p:80},{c:'серый',p:15},{c:'белый',p:5}]
    };

    function applyMutations(cat) {
      const r = Math.random() * 100;
      if (r < 2) {
        cat.mainColor = 'белый'; cat.pattern = 'однотонный'; cat.eyeColor = 'красно-розовый';
        cat.mutations.push('альбинизм'); cat.secondaryColor = null; return;
      }
      if (r < 5) {
        const c1 = EYE_COLORS[Math.floor(Math.random()*EYE_COLORS.length)];
        let c2 = EYE_COLORS[Math.floor(Math.random()*EYE_COLORS.length)];
        while (c2 === c1) c2 = EYE_COLORS[Math.floor(Math.random()*EYE_COLORS.length)];
        cat.eyeColor = { type:'разные', colors: [c1, c2] };
        cat.mutations.push('гетерохромия'); return;
      }
      if (r < 8) {
        cat.pattern = cat.age === 'котёнок' ? 'крапчатый' : 'пятнистый';
        if (cat.age !== 'котёнок') cat.mainColor += ' (осветлённые пятна)';
        cat.mutations.push('витилиго'); cat.secondaryColor = null; return;
      }
      if (r < 9) {
        cat.secondaryColor = COLORS[Math.floor(Math.random()*COLORS.length)];
        cat.pattern = 'наполовину разный';
        cat.mutations.push('химеризм');
        if (Math.random() < 0.15) {
          const c1 = EYE_COLORS[Math.floor(Math.random()*EYE_COLORS.length)];
          let c2 = EYE_COLORS[Math.floor(Math.random()*EYE_COLORS.length)];
          while (c2 === c1) c2 = EYE_COLORS[Math.floor(Math.random()*EYE_COLORS.length)];
          cat.eyeColor = { type:'разные', colors: [c1, c2] };
          cat.mutations.push('гетерохромия');
        }
      }
    }

    function generateKittenFromParents(mother, father, motherId, fatherId) {
      const kitten = {
        gender: Math.random() < 0.5 ? 'male' : 'female', age: 'котёнок', state: 'лежит',
        mainColor: getInheritedColor(mother.mainColor, father.mainColor),
        pattern: getInheritedPattern(mother.pattern, father.pattern),
        eyeColor: getInheritedEyeColor(mother.eyeColor, father.eyeColor),
        character: CHARACTERS[Math.floor(Math.random()*CHARACTERS.length)],
        mutations: [], secondaryColor: null, isPregnant: false, pregnancyEnd: null, tiredUntil: null, birthCount: 0,
        motherId: motherId || null, fatherId: fatherId || null,
        adultAt: firebase.firestore.Timestamp.fromDate(new Date(Date.now() + 5*60000))
      };
      // Наследование secondaryColor
      if (mother.secondaryColor && father.secondaryColor) {
        kitten.secondaryColor = Math.random() < 0.5 ? mother.secondaryColor : father.secondaryColor;
      } else if (mother.secondaryColor || father.secondaryColor) {
        kitten.secondaryColor = Math.random() < 0.4 ? (mother.secondaryColor || father.secondaryColor) : null;
      }
      if (kitten.pattern === 'однотонный' || kitten.mutations.includes('витилиго')) kitten.secondaryColor = null;

      const motherMuts = mother.mutations || [], fatherMuts = father.mutations || [];
      motherMuts.forEach(m => { if (fatherMuts.includes(m) && Math.random() < 0.75) kitten.mutations.push(m); });
      if (kitten.mutations.length === 0) applyMutations(kitten);
      return kitten;
    }

    function generateRandomCat() {
      const cat = {
        gender: Math.random()<0.5?'male':'female', age:'взрослый', state:'лежит',
        mainColor: COLORS[Math.floor(Math.random()*COLORS.length)],
        pattern: PATTERNS[Math.floor(Math.random()*PATTERNS.length)],
        eyeColor: EYE_COLORS[Math.floor(Math.random()*EYE_COLORS.length)],
        character: CHARACTERS[Math.floor(Math.random()*CHARACTERS.length)],
        mutations: [], secondaryColor: Math.random()<0.3?COLORS[Math.floor(Math.random()*COLORS.length)]:null,
        isPregnant: false, pregnancyEnd: null, tiredUntil: null, birthCount: 0,
        motherId: null, fatherId: null
      };
      if (cat.pattern === 'однотонный') cat.secondaryColor = null;
      applyMutations(cat);
      return cat;
    }

    function getInheritedColor(mc, fc) {
      if (mc === fc) { const key = `${mc}_${fc}`; if (colorInheritance[key]) return pickFromProb(colorInheritance[key]); return mc; }
      const k1=`${mc}_${fc}`, k2=`${fc}_${mc}`;
      const e = colorInheritance[k1] || colorInheritance[k2];
      if (e) return pickFromProb(e);
      return Math.random() < 0.5 ? mc : fc;
    }
    function getInheritedPattern(mp, fp) {
      if (mp === fp) return Math.random() < 0.8 ? mp : PATTERNS[Math.floor(Math.random()*PATTERNS.length)];
      return Math.random() < 0.5 ? mp : fp;
    }
    function getInheritedEyeColor(me, fe) {
      const mc = typeof me === 'object' ? me.colors[0] : me;
      const fc = typeof fe === 'object' ? fe.colors[0] : fe;
      if (mc === fc) return Math.random() < 0.8 ? mc : EYE_COLORS[Math.floor(Math.random()*EYE_COLORS.length)];
      return Math.random() < 0.5 ? mc : fc;
    }
    function pickFromProb(arr) { const r = Math.random()*100; let cum=0; for(const i of arr){cum+=i.p; if(r<=cum) return i.c;} return arr[arr.length-1].c; }

    function updateGameTimeDisplay() {
      const h = Math.floor(gameMinutes / 60) % 24, m = gameMinutes % 60;
      document.getElementById('game-time').textContent = `${h>=6&&h<18?'☀️':'🌃'} ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
    }
    function incrementGameTime() { gameMinutes++; updateGameTimeDisplay(); }

    // Форматирование времени для таймеров
    function timeLeftStr(until) {
      const diff = until - new Date();
      if (diff <= 0) return 'готово';
      const m = Math.floor(diff/60000), s = Math.floor((diff%60000)/1000);
      return `${m}:${String(s).padStart(2,'0')}`;
    }

    // Устройство
    function applyDeviceMode(mode) {
      if (mode === 'mobile') document.body.classList.add('mobile');
      else document.body.classList.remove('mobile');
      localStorage.setItem('device', mode);
    }
    function showDeviceModal() {
      const modal = document.getElementById('device-modal');
      const content = document.getElementById('device-modal-content');
      content.innerHTML = `<h2 class="text-xl font-bold mb-4">Выберите устройство</h2>
        <div class="grid grid-cols-2 gap-4">
          <button id="choose-mobile" class="btn btn-pink p-6 text-2xl">📱<br><span class="text-sm">Телефон</span></button>
          <button id="choose-desktop" class="btn btn-pink p-6 text-2xl">💻<br><span class="text-sm">Компьютер</span></button>
        </div>`;
      modal.classList.add('active');
      document.getElementById('choose-mobile').addEventListener('click', () => { applyDeviceMode('mobile'); modal.classList.remove('active'); });
      document.getElementById('choose-desktop').addEventListener('click', () => { applyDeviceMode('desktop'); modal.classList.remove('active'); });
    }
    function checkDeviceSelection() {
      if (!localStorage.getItem('device')) showDeviceModal();
      else applyDeviceMode(localStorage.getItem('device'));
    }

    // Auth
    document.getElementById('login-btn').addEventListener('click', ()=> auth.signInWithEmailAndPassword(document.getElementById('email').value.trim(), document.getElementById('password').value).catch(e=>alert(e.message)));
    document.getElementById('register-btn').addEventListener('click', ()=>{
      const nick = document.getElementById('nickname').value.trim();
      if(!nick) return alert('Введите ник');
      auth.createUserWithEmailAndPassword(document.getElementById('email').value.trim(), document.getElementById('password').value)
        .then(userCred => db.collection('users').doc(userCred.user.uid).set({ coins:100, nickname:nick }))
        .catch(e=>alert(e.message));
    });

    auth.onAuthStateChanged(user=>{
      if(user){
        currentUser=user;
        document.getElementById('auth-container').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
        initApp();
      } else {
        currentUser=null;
        document.getElementById('auth-container').classList.remove('hidden');
        document.getElementById('app').classList.add('hidden');
        if(timeInterval) clearInterval(timeInterval);
        if(notificationsListener) notificationsListener();
      }
    });

    async function initApp() {
      updateGameTimeDisplay();
      timeInterval = setInterval(() => {
        incrementGameTime();
        updateAllTimers();
      }, 1000);
      const userDoc = await db.collection('users').doc(currentUser.uid).get();
      if(!userDoc.exists) await db.collection('users').doc(currentUser.uid).set({ coins:100, nickname:currentUser.email });
      if(currentUser.email==='katya2013sara1981@gmail.com') document.getElementById('reset-btn').classList.remove('hidden');
      updateCoinsDisplay();
      listenNotifications();
      checkDeviceSelection();
      switchTab('home');
    }

    function updateAllTimers() {
      document.querySelectorAll('.adult-timer-home').forEach(el => {
        const until = new Date(el.dataset.until);
        el.textContent = '⌚ ' + timeLeftStr(until);
      });
      document.querySelectorAll('.tired-timer-home').forEach(el => {
        const until = new Date(el.dataset.until);
        el.textContent = '⌚ ' + timeLeftStr(until);
      });
    }

    function updateCoinsDisplay() {
      db.collection('users').doc(currentUser.uid).get().then(doc=>{
        document.getElementById('coins-display').textContent = `🪙 ${doc.exists?doc.data().coins:0}`;
      });
    }

    function listenNotifications() {
      if(notificationsListener) notificationsListener();
      notificationsListener = db.collection('users').doc(currentUser.uid)
        .collection('notifications').where('read','==',false)
        .onSnapshot(snap=>{
          const c = snap.size;
          const badge = document.getElementById('msg-badge');
          if(c>0){ badge.textContent=c; badge.classList.remove('hidden'); }
          else badge.classList.add('hidden');
        });
    }

    document.getElementById('reset-btn').addEventListener('click', async ()=>{
      if(!confirm('Удалить ВСЕ данные?')) return;
      const cols = ['cats','users','park','sales','trades','server'];
      const batch = db.batch();
      for(const col of cols) { const snap = await db.collection(col).get(); snap.forEach(d=>batch.delete(d.ref)); }
      await batch.commit();
      auth.signOut();
    });

    document.getElementById('account-btn').addEventListener('click', ()=> showDeviceModal());

    document.querySelectorAll('.tab-btn').forEach(b=>b.addEventListener('click', ()=> switchTab(b.dataset.tab)));
    function switchTab(t) {
      currentTab=t;
      document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
      document.querySelector(`[data-tab="${t}"]`).classList.add('active');
      const c = document.getElementById('tab-content');
      if(t==='home') renderHome();
      else if(t==='allcats') renderAllCats();
      else if(t==='breeding') renderBreeding();
      else if(t==='shop') renderShop();
      else if(t==='park') renderPark();
      else if(t==='castle') renderCastle();
    }

    async function getNextIdNumber() {
      const snap = await db.collection('cats').where('owner','==',currentUser.uid).get();
      return String(snap.size+1).padStart(4,'0');
    }

    // Дом
    function renderHome() {
      const cont = document.getElementById('tab-content');
      cont.innerHTML='<p>Загрузка...</p>';
      db.collection('cats').where('owner','==',currentUser.uid).onSnapshot(snap=>{
        const owned = snap.size;

    async function startBreeding() {
      const m = document.getElementById('mother-select')?.value, f = document.getElementById('father-select')?.value;
      if(!m||!f) return alert('Выберите родителей');
      const motherDoc = await db.collection('cats').doc(m).get();
      if(motherDoc.data().state!=='лежит') return alert('Кошка занята/устала');
      const userRef = db.collection('users').doc(currentUser.uid);

      if(userDoc.data().coins<10) return alert('Недостаточно монет');
      if(!confirm('Потратить 10 монет?')) return;
      await userRef.update({ coins: userDoc.data().coins-10 });

      await db.collection('cats').doc(m).update({ isPregnant:true, state:'беременна', pregnancyEnd: firebase.firestore.Timestamp.fromDate(end) });

    function showCompareModal(catId) {
      const modal = document.getElementById('compare-modal');
      const content = document.getElementById('compare-modal-content');
      content.innerHTML = `<h2>🔍 Сравнить родство</h2><p>Выберите второго кота:</p><select id="compare-select" class="w-full p-2 rounded bg-gray-700 mb-2"><option value="">--</option></select>
        <button id="compare-confirm" class="btn btn-pink">Сравнить</button>`;
      modal.classList.add('active');
      db.collection('cats').where('owner','==',currentUser.uid).get().then(snap=>{
        const sel = document.getElementById('compare-select');
        snap.forEach(doc=>{ const c=doc.data(); sel.innerHTML+=`<option value="${doc.id}">${c.name}</option>`; });
      });
      document.getElementById('compare-confirm').addEventListener('click', async ()=>{
        const otherId = document.getElementById('compare-select').value;
        if (!otherId) return alert('Выберите кота');
        const catDoc = await db.collection('cats').doc(catId).get();
        const otherDoc = await db.collection('cats').doc(otherId).get();
        const cat = catDoc.data(), other = otherDoc.data();
        let relation = 'незнакомец';
        if (cat.motherId && cat.motherId !== 'unknown' && cat.motherId === other.motherId) {
          relation = cat.gender==='male'?'брат':'сестра';
        } else if (cat.fatherId && cat.fatherId !== 'unknown' && cat.fatherId === other.fatherId) {
          relation = cat.gender==='male'?'брат':'сестра';
        } else if (cat.motherId === other.id) relation = 'мама';
        else if (cat.fatherId === other.id) relation = 'папа';
        else if (other.motherId === cat.id) relation = other.gender==='male'?'сын':'дочь';
        else if (other.fatherId === cat.id) relation = other.gender==='male'?'сын':'дочь';
        else {
          const ancestors1 = new Set();
          const getAncestors = async (id, depth=0) => {
            if (depth>3) return;
            const d = await db.collection('cats').doc(id).get();
            if (!d.exists) return;
            const data = d.data();
            if (data.motherId) ancestors1.add(data.motherId);
            if (data.fatherId) ancestors1.add(data.fatherId);
            if (data.motherId) await getAncestors(data.motherId, depth+1);
            if (data.fatherId) await getAncestors(data.fatherId, depth+1);
          };
          await getAncestors(catId);
          if (ancestors1.has(otherId) || ancestors1.has(other.motherId) || ancestors1.has(other.fatherId)) relation = 'дальний родственник';
        }
        content.innerHTML = `<h2>Результат</h2><p>${cat.name} для ${other.name} — <b>${relation}</b></p>
          <button class="btn btn-gray mt-2" onclick="document.getElementById('compare-modal').classList.remove('active')">Закрыть</button>`;
      });
    }

    async function startWalkCheck() {
      const catId = document.getElementById('park-cat-select')?.value;
      if(!catId) return alert('Выберите кота');
      const catDoc = await db.collection('cats').doc(catId).get();
      const cat = catDoc.data();
      if(cat.state==='беременна'||cat.state.startsWith('уставш')) return alert('Ваш кот слишком устал чтобы гулять');
      if(cat.age==='котёнок'){
        const adults = await db.collection('cats').where('owner','==',currentUser.uid).where('age','!=','котёнок').where('state','==','лежит').get();
        if(adults.empty) return alert('Котёнок слишком маленький чтобы гулять одному');
      }
      selectedParkCatId = catId;
      startParkMiniGame();
    }

    function startParkMiniGame() {
      parkGameActive=true;
      const modal = document.getElementById('park-game-modal');
      const content = document.getElementById('park-game-content');
      content.innerHTML = `<h3>Поймайте кота на зелёной зоне!</h3><div id="park-game-area" class="park-game relative cursor-pointer"><div class="park-zone"></div><div id="park-cat" class="park-cat">🐱</div></div>`;
      modal.classList.add('active');
      const area = document.getElementById('park-game-area');
      const catEl = document.getElementById('park-cat');
      let pos=10, dir=1;
      parkCatPosition=pos;
      parkGameInterval = setInterval(()=>{
        pos+=dir*4;
        if(pos>90||pos<10) dir*=-1;
        parkCatPosition=pos;
        catEl.style.left=pos+'%';
      },50);
      area.addEventListener('click', handleParkClick);
    }

    function handleParkClick() {
      if(!parkGameActive) return;
      clearInterval(parkGameInterval);
      parkGameActive=false;
      const area = document.getElementById('park-game-area');
      area.removeEventListener('click', handleParkClick);
      const modal = document.getElementById('park-game-modal');
      if(parkCatPosition>=45 && parkCatPosition<=55){
        modal.classList.remove('active');
        startWalkSuccess();
      } else {
        modal.classList.remove('active');
        alert('Коту не удалось поймать момент. Попробуйте снова!');
        selectedParkCatId=null;
      }
    }

    async function startWalkSuccess() {
      const catId = selectedParkCatId;
      await db.collection('cats').doc(catId).update({ state:'гуляет' });
      const returnTime = new Date(Date.now()+2*60000);
      await db.collection('users').doc(currentUser.uid).collection('notifications').add({
        type:'walking', message:`🐱 Кот гуляет и вернётся через 2 минуты`, catId,
        returnTime: firebase.firestore.Timestamp.fromDate(returnTime), read:false,
        timestamp: firebase.firestore.FieldValue.serverTimestamp() });
      selectedParkCatId=null;
      switchTab('park');
    }

    async function checkWalkingReturns() {
      // Проверка уведомлений walking
      const notifs = await db.collection('users').doc(currentUser.uid).collection('notifications')
        .where('type','==','walking').where('read','==',false).get();
      notifs.forEach(async d=>{
        const data = d.data();
        if(data.returnTime.toDate() <= new Date()){
          const exist = await db.collection('users').doc(currentUser.uid).collection('notifications')
            .where('catId','==',data.catId).where('type','==','walk_return').get();
          if(exist.empty){
            await db.collection('users').doc(currentUser.uid).collection('notifications').add({
              type:'walk_return', message:`🚪 Кот вернулся! Нажмите, чтобы открыть дверь.`, catId:data.catId, read:false,
              timestamp: firebase.firestore.FieldValue.serverTimestamp() });
          }
          d.ref.delete();
        }
      });
      // Дополнительная проверка: если кот в состоянии "гуляет", а уведомлений нет
      const walkingCats = await db.collection('cats').where('owner','==',currentUser.uid).where('state','==','гуляет').get();
      for (const catDoc of walkingCats) {
        const existWalking = await db.collection('users').doc(currentUser.uid).collection('notifications')
          .where('catId','==',catDoc.id).where('type','==','walking').get();
        const existReturn = await db.collection('users').doc(currentUser.uid).collection('notifications')
          .where('catId','==',catDoc.id).where('type','==','walk_return').get();
        if (existWalking.empty && existReturn.empty) {
          // Принудительно создаём возврат
          await db.collection('users').doc(currentUser.uid).collection('notifications').add({
            type:'walk_return', message:`🚪 Кот вернулся!`, catId:catDoc.id, read:false,
            timestamp: firebase.firestore.FieldValue.serverTimestamp() });
        }
      }
    }

    async function openBirthModal(motherId, fatherId) {
      const motherDoc = await db.collection('cats').doc(motherId).get();
      const mother = motherDoc.data();
      const fatherDoc = fatherId!=='unknown'? await db.collection('cats').doc(fatherId).get() : null;
      const father = fatherDoc?.exists ? fatherDoc.data() : null;
      const birthCount = mother.birthCount||0;
      const maxK = birthCount===0?3:5;
      const kittenCount = Math.floor(Math.random()*(maxK-1+1))+1;
      const kittens = [];
      for(let i=0;i<kittenCount;i++){
        if(father) kittens.push(generateKittenFromParents(mother, father, motherId, fatherId));
        else {
          const rCat = generateRandomCat();
          rCat.age = 'котёнок';
          rCat.motherId = motherId;
          rCat.fatherId = null;
          rCat.adultAt = firebase.firestore.Timestamp.fromDate(new Date(Date.now() + 5*60000));
          kittens.push(rCat);
        }
        kittens[i].idNumber = await getNextIdNumber();
      }
      const modal = document.getElementById('birth-modal');
      const content = document.getElementById('birth-modal-content');
      let html = `<h2>💥 Роды! (${kittenCount} котёнка)</h2><div class="grid grid-cols-3 gap-3">`;
      kittens.forEach((k,i)=>{
        html += `<div class="bg-gray-700 p-3 rounded-lg text-center" id="kitten-${i}"><p>🐱</p><p>${k.mainColor}</p><p>${k.pattern}</p><p>{${k.gender==='male'?'мальчик':'девочка'}}</p><button class="btn btn-pink mt-2 select-kitten-btn" data-idx="${i}">Выбрать</button></div>`;
      });
      html += '</div><div id="naming-area" class="mt-3"></div>';
      content.innerHTML=html; modal.classList.add('active');
      window._kittens=kittens; window._namedCount=0; window._kittenNames=new Array(kittenCount).fill('');
      content.querySelectorAll('.select-kitten-btn').forEach(b=>b.addEventListener('click', e=>{
        const idx=e.target.dataset.idx;
        if(window._kittenNames[idx]!=='') return;
        document.getElementById('naming-area').innerHTML = `<input id="kitten-name-input" placeholder="Имя" class="w-full p-2 rounded bg-gray-700 mb-2"><button id="name-kitten-btn" class="btn btn-pink">Назвать</button>`;
        document.getElementById('name-kitten-btn').addEventListener('click', ()=>{
          const name = document.getElementById('kitten-name-input').value.trim();
          if(!name) return alert('Введите имя');
          window._kittenNames[idx]=name;
          window._namedCount++;
          document.getElementById(`kitten-${idx}`).querySelector('.select-kitten-btn').classList.add('hidden');
          document.getElementById(`kitten-${idx}`).innerHTML += `<p class="text-green-400">${name}</p>`;
          document.getElementById('naming-area').innerHTML='';
          if(window._namedCount===kittenCount){
            document.getElementById('naming-area').innerHTML='<button id="finish-birth" class="btn btn-pink mt-3">✅ Завершить</button>';
            document.getElementById('finish-birth').addEventListener('click', async ()=>{
              for(let i=0;i<kittenCount;i++){
                window._kittens[i].name = window._kittenNames[i];
                window._kittens[i].idNumber = await getNextIdNumber();
                window._kittens[i].owner = currentUser.uid;
                await db.collection('cats').add(window._kittens[i]);
              }
              const tiredUntil = new Date(Date.now()+3*60000);
              await db.collection('cats').doc(motherId).update({
                isPregnant:false, state:'уставшая', pregnancyEnd:null,
                tiredUntil: firebase.firestore.Timestamp.fromDate(tiredUntil), birthCount: (mother.birthCount||0)+1 });
              const notifs = await db.collection('users').doc(currentUser.uid).collection('notifications')
                .where('motherId','==',motherId).where('type','==','birth_ready').get();
              notifs.forEach(d=>d.ref.delete());
              modal.classList.remove('active');
              updateCoinsDisplay();
              switchTab('home');
            });
          }
        });
      }));
    }

    function openTrackingModal(endTime) {
      const modal = document.getElementById('tracking-modal');
      const content = document.getElementById('tracking-modal-content');
      const update = ()=>{
        const diff = endTime - new Date();
        if(diff<=0){ content.innerHTML='<p>Время истекло!</p>'; return; }
        const m = Math.floor(diff/60000), s = Math.floor((diff%60000)/1000);
        content.innerHTML = `<h2>⏳ Ожидание</h2><p class="countdown">${m}:${String(s).padStart(2,'0')}</p>
          <button class="btn btn-gray mt-2" onclick="document.getElementById('tracking-modal').classList.remove('active')">Закрыть</button>`;
        modal.classList.add('active');
      };
      update();
      const int = setInterval(()=>{ if(modal.classList.contains('active')) update(); else clearInterval(int); }, 1000);
    }

    setInterval(async ()=>{
      if(!currentUser) return;
      const now = new Date();
      const preg = await db.collection('cats').where('owner','==',currentUser.uid).where('isPregnant','==',true).get();
      preg.forEach(async doc=>{
        if(doc.data().pregnancyEnd?.toDate() <= now){
          const exist = await db.collection('users').doc(currentUser.uid).collection('notifications')
            .where('motherId','==',doc.id).where('type','==','birth_ready').get();
          if(exist.empty){
            await db.collection('users').doc(currentUser.uid).collection('notifications').add({
              type:'birth_ready', message:`💥 ${doc.data().name} готова родить!`, motherId:doc.id, fatherId:'unknown', read:false,
              timestamp: firebase.firestore.FieldValue.serverTimestamp() });
          }
        }
      });
      // Проверка выроста котят
      const kittens = await db.collection('cats').where('owner','==',currentUser.uid).where('age','==','котёнок').get();
      kittens.forEach(async doc=>{
        const cat = doc.data();
        if (cat.adultAt && cat.adultAt.toDate() <= now) {
          const exist = await db.collection('users').doc(currentUser.uid).collection('notifications')
            .where('catId','==',doc.id).where('type','==','adult_ready').get();
          if (exist.empty) {
            await db.collection('users').doc(currentUser.uid).collection('notifications').add({
              type:'adult_ready', message:`✅ ${cat.name} вырос! Нажмите, чтобы подтвердить.`, catId:doc.id, read:false,
              timestamp: firebase.firestore.FieldValue.serverTimestamp() });
          }
        }
      });
      checkWalkingReturns();
      checkCastleReturns();
    }, 10000);

    document.getElementById('logout-btn').addEventListener('click', ()=> auth.signOut());
    console.log('🐱 Генетика котов v4.0');
  </script>
</body>
