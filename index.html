<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Генетика котов - Кошачья империя</title>
    <!-- Tailwind + Font Awesome + Google Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, getDocs, query, where, updateDoc, deleteDoc, addDoc, onSnapshot, Timestamp, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        // Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyBSO84yoAhHUCIejdf9mmo89oXIYeeSFfs",
            authDomain: "cat-genetics-v6.firebaseapp.com",
            projectId: "cat-genetics-v6",
            storageBucket: "cat-genetics-v6.firebasestorage.app",
            messagingSenderId: "302978224196",
            appId: "1:302978224196:web:106b02fc1157bd17fdac11",
            measurementId: "G-HKJQVRPCZJ"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        // Глобальный объект для доступа к функциям и данным
        window.db = db;
        window.auth = auth;
        window.Timestamp = Timestamp;
        
        // Состояние игры
        let currentUser = null;
        let currentUserId = null;
        let userData = null;
        let userCats = [];
        let userInventory = [];
        let notifications = [];
        let sales = [];
        let gameInterval = null;
        let walkCheckInterval = null;
        let castleCheckInterval = null;
        
        // DOM элементы
        const authContainer = document.getElementById('auth-container');
        const appContainer = document.getElementById('app');
        const startScreen = document.getElementById('start-screen');
        const loginScreen = document.getElementById('login-screen');
        const deviceModal = document.getElementById('device-modal');
        const deviceModalContent = document.getElementById('device-modal-content');
        
        // Вспомогательные функции
        function showElement(el) { el.classList.remove('hidden'); }
        function hideElement(el) { el.classList.add('hidden'); }
        
        // Генерация случайного кота (базовый)
        function generateRandomCat(ownerId, ownerName, gender = null, parents = { motherId: null, fatherId: null }) {
            const genders = ['♂', '♀'];
            const finalGender = gender || genders[Math.floor(Math.random() * 2)];
            const coatColors = ['Рыжий', 'Чёрный', 'Белый', 'Коричневый', 'Серый', 'Кремовый', 'Красный'];
            const patterns = ['Однотонный', 'Полосатый', 'Пятнистый', 'Черепаховый', 'Колорпойнт'];
            const eyeColors = ['Золотистый', 'Зелёный', 'Голубой', 'Янтарный', 'Оранжевый'];
            const characters = ['Ласковый', 'Игривый', 'Спокойный', 'Боевой', 'Ленивый', 'Любопытный'];
            
            let mainColor = coatColors[Math.floor(Math.random() * coatColors.length)];
            let secondaryColor = (Math.random() > 0.7 && patterns[Math.floor(Math.random()*patterns.length)] !== 'Однотонный') ? coatColors[Math.floor(Math.random() * coatColors.length)] : null;
            let pattern = patterns[Math.floor(Math.random() * patterns.length)];
            let eyeColor = eyeColors[Math.floor(Math.random() * eyeColors.length)];
            let character = characters[Math.floor(Math.random() * characters.length)];
            let mutations = [];
            if (Math.random() < 0.05) mutations.push('альбинизм');
            if (Math.random() < 0.03) mutations.push('гетерохромия');
            if (Math.random() < 0.04) mutations.push('витилиго');
            if (Math.random() < 0.02) mutations.push('химеризм');
            
            if (mutations.includes('химеризм')) {
                pattern = 'Химера';
                secondaryColor = coatColors[Math.floor(Math.random() * coatColors.length)];
            }
            let eyes = eyeColor;
            if (mutations.includes('гетерохромия')) eyes = { type: 'разные', colors: [eyeColors[Math.floor(Math.random()*eyeColors.length)], eyeColors[Math.floor(Math.random()*eyeColors.length)]] };
            
            const now = Timestamp.now();
            return {
                id: null,
                name: 'Котёнок',
                gender: finalGender,
                age: 0,
                ageMinutes: 0,
                mainColor, secondaryColor, pattern, eyes, character, mutations,
                state: 'котёнок',
                stateEndTime: new Date(now.toDate().getTime() + 10*60000),
                motherId: parents.motherId || null,
                fatherId: parents.fatherId || null,
                ownerId, ownerName, createdAt: now,
                pregnancy: null,
                fatigueEnd: null,
                walkEnd: null,
                expeditionEnd: null,
                isPregnant: false,
                generation: 1
            };
        }
        
        // Проверка уникальности ника
        async function isNicknameUnique(nick) {
            const usersRef = collection(db, "users");
            const q = query(usersRef, where("username", "==", nick));
            const snap = await getDocs(q);
            return snap.empty;
        }
        
        // Регистрация
        async function register(email, password, nickname) {
            if (!await isNicknameUnique(nickname)) throw new Error("Ник уже занят");
            const cred = await createUserWithEmailAndPassword(auth, email, password);
            const user = cred.user;
            await setDoc(doc(db, "users", user.uid), {
                email: email,
                username: nickname,
                coins: 100,
                createdAt: Timestamp.now(),
                device: null
            });
            // Создать первого бесплатного кота
            const newCat = generateRandomCat(user.uid, nickname);
            const catRef = await addDoc(collection(db, "cats"), { ...newCat, ownerId: user.uid, ownerName: nickname, ageMinutes: 0, state: 'котёнок', stateEndTime: new Date(Date.now() + 10*60000) });
            await updateDoc(catRef, { id: catRef.id, name: `${nickname}_Котофей` });
            return user;
        }
        
        // Вход
        async function login(email, password) {
            return await signInWithEmailAndPassword(auth, email, password);
        }
        
        // Модалка устройства
        function showDeviceModal() {
            deviceModal.classList.remove('hidden');
            deviceModalContent.innerHTML = `
                <div class="text-center p-4">
                    <h3 class="text-xl font-bold mb-3 text-amber-800">Выберите устройство</h3>
                    <div class="flex justify-center gap-6">
                        <button id="device-mobile" class="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-3 rounded-xl text-lg"><i class="fas fa-mobile-alt mr-2"></i>📱 Мобильный</button>
                        <button id="device-desktop" class="bg-amber-700 hover:bg-amber-800 text-white px-6 py-3 rounded-xl text-lg"><i class="fas fa-desktop mr-2"></i>💻 Компьютер</button>
                    </div>
                </div>
            `;
            document.getElementById('device-mobile').onclick = () => {
                localStorage.setItem('device', 'mobile');
                document.body.classList.add('mobile');
                deviceModal.classList.add('hidden');
            };
            document.getElementById('device-desktop').onclick = () => {
                localStorage.setItem('device', 'desktop');
                document.body.classList.remove('mobile');
                deviceModal.classList.add('hidden');
            };
        }
        
        // Главная инициализация после входа
        async function initApp() {
            if (gameInterval) clearInterval(gameInterval);
            if (walkCheckInterval) clearInterval(walkCheckInterval);
            if (castleCheckInterval) clearInterval(castleCheckInterval);
            
            // Загрузка данных пользователя
            const userDoc = await getDoc(doc(db, "users", currentUserId));
            userData = userDoc.data();
            
            // Подписки на cats, inventory, notifications, sales
            const unsubscribeCats = onSnapshot(query(collection(db, "cats"), where("ownerId", "==", currentUserId)), (snap) => {
                userCats = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                renderHome();
                renderCastle(); // обновляем замок
            });
            const unsubscribeInv = onSnapshot(collection(db, "users", currentUserId, "inventory"), (snap) => {
                userInventory = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                renderInventory();
            });
            const unsubscribeNotif = onSnapshot(query(collection(db, "notifications"), where("userId", "==", currentUserId), where("read", "==", false)), (snap) => {
                notifications = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                renderNotifications();
            });
            const unsubscribeSales = onSnapshot(collection(db, "sales"), (snap) => {
                sales = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                renderShop();
            });
            
            window.unsubscribes = [unsubscribeCats, unsubscribeInv, unsubscribeNotif, unsubscribeSales];
            
            // Таймеры и проверки
            gameInterval = setInterval(() => {
                renderHome();
                renderCastle();
                document.querySelectorAll('.timer-display').forEach(el => {
                    const catId = el.dataset.catId;
                    const cat = userCats.find(c => c.id === catId);
                    if (cat) el.innerText = timeLeftStr(cat);
                });
            }, 1000);
            
            walkCheckInterval = setInterval(checkWalkingReturns, 1000);
            castleCheckInterval = setInterval(checkCastleReturns, 1000);
            
            renderHome();
            renderInventory();
            renderShop();
            renderBreeding();
            renderAdminPanel(); // если админ
            
            // кнопки навигации
            setupNavigation();
        }
        
        // Вспомогательные таймеры
        function timeLeftStr(cat) {
            if (!cat.stateEndTime) return '';
            const now = Date.now();
            let end = cat.stateEndTime.toDate ? cat.stateEndTime.toDate().getTime() : new Date(cat.stateEndTime).getTime();
            let diff = end - now;
            if (diff <= 0) return '✅ Готово';
            let mins = Math.floor(diff / 60000);
            let secs = Math.floor((diff % 60000) / 1000);
            return `${mins}:${secs<10?'0'+secs:secs}`;
        }
        
        function checkWalkingReturns() {
            userCats.forEach(async cat => {
                if (cat.state === 'гуляет' && cat.walkEnd && cat.walkEnd.toDate().getTime() <= Date.now()) {
                    await updateDoc(doc(db, "cats", cat.id), { state: 'лежит', walkEnd: null });
                    await addDoc(collection(db, "notifications"), {
                        userId: currentUserId,
                        type: 'walk_return',
                        catId: cat.id,
                        catName: cat.name,
                        read: false,
                        createdAt: Timestamp.now()
                    });
                }
            });
        }
        
        function checkCastleReturns() {
            userCats.forEach(async cat => {
                if (cat.state === 'экспедиция' && cat.expeditionEnd && cat.expeditionEnd.toDate().getTime() <= Date.now()) {
                    const rewards = ['Золотая рыбка', 'Кошачья мята', 'Амулет удачи', 'Ошейник силы', 'Магический кристалл'];
                    const reward = Math.random() < 0.3 ? { type: 'coins', amount: 50 } : { type: 'item', name: rewards[Math.floor(Math.random()*rewards.length)] };
                    if (reward.type === 'coins') {
                        await updateDoc(doc(db, "users", currentUserId), { coins: (userData.coins || 0) + reward.amount });
                    } else {
                        await addDoc(collection(db, "users", currentUserId, "inventory"), { name: reward.name, quantity: 1 });
                    }
                    await updateDoc(doc(db, "cats", cat.id), { state: 'уставший', fatigueEnd: Timestamp.fromDate(new Date(Date.now() + 3*60000)), expeditionEnd: null });
                    await addDoc(collection(db, "notifications"), {
                        userId: currentUserId,
                        type: 'castle_reward',
                        catId: cat.id,
                        catName: cat.name,
                        reward: reward.type === 'coins' ? `${reward.amount} монет` : reward.name,
                        read: false,
                        createdAt: Timestamp.now()
                    });
                }
            });
        }
        
        // Рендеры
        function renderHome() {
            const container = document.getElementById('home-content');
            if (!container) return;
            container.innerHTML = `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">${userCats.map(cat => `
                <div class="bg-white/70 backdrop-blur-sm rounded-2xl shadow-lg p-4 border border-amber-200">
                    <div class="flex justify-between"><span class="font-bold text-lg">${cat.name}</span> <span>${cat.gender}</span></div>
                    <div>🎨 ${cat.mainColor} ${cat.pattern}</div>
                    <div>👁️ ${typeof cat.eyes === 'object' ? 'гетерохромия' : cat.eyes}</div>
                    <div>🧬 ${cat.character}</div>
                    <div>📊 ${cat.state} ${cat.state !== 'лежит' ? `<span class="timer-display text-sm" data-cat-id="${cat.id}">${timeLeftStr(cat)}</span>` : ''}</div>
                    <button class="view-cat mt-2 bg-amber-600 text-white px-3 py-1 rounded-full" data-id="${cat.id}">Подробнее</button>
                </div>
            `).join('')}</div><button id="buy-cat" class="mt-6 bg-emerald-700 text-white px-6 py-2 rounded-full">🐱 Купить кота (${userCats.length>=2? (userCats.length===2?'10 монет':'100 монет'):'Первый бесплатно'})</button>`;
            document.querySelectorAll('.view-cat').forEach(btn => btn.onclick = () => viewCatModal(btn.dataset.id));
            document.getElementById('buy-cat')?.addEventListener('click', buyCat);
        }
        
        async function buyCat() {
            let price = 0;
            if (userCats.length === 0) price = 0;
            else if (userCats.length === 1) price = 10;
            else if (userCats.length === 2) price = 100;
            else { alert('Максимум 3 кота'); return; }
            if (price > 0 && userData.coins < price) { alert('Недостаточно монет'); return; }
            const newCat = generateRandomCat(currentUserId, userData.username);
            const catRef = await addDoc(collection(db, "cats"), { ...newCat, state: 'котёнок', stateEndTime: Timestamp.fromDate(new Date(Date.now() + 10*60000)) });
            await updateDoc(catRef, { id: catRef.id, name: `${userData.username}_Кот${userCats.length+1}` });
            if (price > 0) await updateDoc(doc(db, "users", currentUserId), { coins: userData.coins - price });
            alert('Кот куплен!');
        }
        
        function renderCastle() {
            const select = document.getElementById('castle-cat-select');
            if (!select) return;
            const adults = userCats.filter(c => c.state === 'лежит' && c.age >= 10);
            select.innerHTML = `<option value="">-- Выбери кота --</option>${adults.map(c => `<option value="${c.id}">${c.name} (${c.gender})</option>`).join('')}`;
        }
        
        async function startExpedition() {
            const catId = document.getElementById('castle-cat-select').value;
            if (!catId) return;
            const cat = userCats.find(c => c.id === catId);
            if (!cat || cat.state !== 'лежит') { alert('Кот не может идти'); return; }
            await updateDoc(doc(db, "cats", catId), { state: 'экспедиция', expeditionEnd: Timestamp.fromDate(new Date(Date.now() + 3*60000)) });
            alert(`${cat.name} отправился в экспедицию на 3 минуты`);
        }
        
        // Прогулка мини-игра
        let walkGameActive = false;
        function startWalkGame(catId) {
            const cat = userCats.find(c => c.id === catId);
            if (!cat || cat.state !== 'лежит') { alert('Кот не может гулять'); return; }
            walkGameActive = true;
            const modal = document.createElement('div');
            modal.className = 'fixed inset-0 bg-black/70 flex items-center justify-center z-50';
            modal.innerHTML = `
                <div class="bg-white p-6 rounded-2xl text-center w-80">
                    <h3 class="text-xl font-bold mb-4">Поймай кота!</h3>
                    <div class="relative h-32 bg-gray-200 rounded-full overflow-hidden mb-4">
                        <div id="moving-cat" class="absolute text-4xl transition-all duration-50" style="left: 0%; top: 20%;">🐈</div>
                        <div class="absolute top-0 left-1/3 w-1/3 h-full bg-green-300/50 border-x border-green-700"></div>
                    </div>
                    <button id="catch-btn" class="bg-amber-600 text-white px-6 py-2 rounded-full">Ловить!</button>
                </div>
            `;
            document.body.appendChild(modal);
            let position = 0;
            let direction = 1;
            const catEl = modal.querySelector('#moving-cat');
            const interval = setInterval(() => {
                if (!walkGameActive) { clearInterval(interval); return; }
                position += direction * 4;
                if (position >= 80) direction = -1;
                if (position <= 0) direction = 1;
                catEl.style.left = `${position}%`;
            }, 80);
            modal.querySelector('#catch-btn').onclick = () => {
                clearInterval(interval);
                const isWin = position >= 25 && position <= 65;
                if (isWin) {
                    alert('Вы поймали кота! Он уходит гулять на 2 минуты');
                    updateDoc(doc(db, "cats", catId), { state: 'гуляет', walkEnd: Timestamp.fromDate(new Date(Date.now() + 2*60000)) });
                } else alert('Мимо! Попробуйте снова');
                modal.remove();
                walkGameActive = false;
            };
        }
        
        // Админ панель
        function renderAdminPanel() {
            const isAdmin = currentUser?.email === 'katya2013sara1981@gmail.com';
            const adminBtn = document.getElementById('admin-panel-btn');
            if (adminBtn) adminBtn.style.display = isAdmin ? 'block' : 'none';
            if (!isAdmin) return;
            const container = document.getElementById('admin-panel-content');
            if (!container) return;
            container.innerHTML = `
                <div class="bg-white/80 rounded-xl p-4 space-y-4">
                    <h3 class="font-bold text-xl">🛠 Админ панель</h3>
                    <div><input id="admin-nick" placeholder="Ник игрока" class="border p-2 rounded"><button id="admin-add-coins" class="bg-blue-600 text-white px-3 py-1 rounded">➕ Начислить 100 монет</button></div>
                    <div><input id="admin-change-nick" placeholder="Новый ник"><button id="admin-update-nick" class="bg-purple-600 text-white px-3 py-1 rounded">✏ Сменить ник</button></div>
                    <div><h4>✨ Создать кота</h4><input id="admin-cat-owner" placeholder="ID игрока (пусто - себе)"><input id="admin-cat-name" placeholder="Имя кота"><select id="admin-cat-gender"><option>♂</option><option>♀</option></select><button id="admin-create-cat" class="bg-green-700 text-white px-4 py-1 rounded">Создать</button></div>
                    <button id="admin-reset-all" class="bg-red-700 text-white px-4 py-2 rounded">⚠️ СБРОС ВСЕХ ДАННЫХ</button>
                </div>
            `;
            document.getElementById('admin-add-coins')?.addEventListener('click', async () => {
                const nick = document.getElementById('admin-nick').value;
                const usersRef = collection(db, "users");
                const q = query(usersRef, where("username", "==", nick));
                const snap = await getDocs(q);
                if (snap.empty) return alert('Игрок не найден');
                const uid = snap.docs[0].id;
                const userDoc = snap.docs[0].data();
                await updateDoc(doc(db, "users", uid), { coins: (userDoc.coins || 0) + 100 });
                alert('Начислено 100 монет');
            });
            document.getElementById('admin-update-nick')?.addEventListener('click', async () => {
                const newNick = document.getElementById('admin-change-nick').value;
                if (!newNick) return;
                const usersRef = collection(db, "users");
                const q = query(usersRef, where("username", "==", newNick));
                const existing = await getDocs(q);
                if (!existing.empty && existing.docs[0].id !== currentUserId) return alert('Ник занят');
                await updateDoc(doc(db, "users", currentUserId), { username: newNick });
                alert('Ник изменён (текущий пользователь)');
            });
            document.getElementById('admin-create-cat')?.addEventListener('click', async () => {
                let ownerId = document.getElementById('admin-cat-owner').value.trim();
                let ownerName = '';
                if (!ownerId) { ownerId = currentUserId; ownerName = userData.username; }
                else {
                    const userDoc = await getDoc(doc(db, "users", ownerId));
                    if (!userDoc.exists()) return alert('Пользователь не найден');
                    ownerName = userDoc.data().username;
                }
                const catName = document.getElementById('admin-cat-name').value || 'Админ-кот';
                const gender = document.getElementById('admin-cat-gender').value;
                const newCat = generateRandomCat(ownerId, ownerName, gender);
                newCat.name = catName;
                newCat.state = 'взрослый';
                newCat.age = 10;
                const ref = await addDoc(collection(db, "cats"), newCat);
                await updateDoc(ref, { id: ref.id });
                alert('Кот создан');
            });
            document.getElementById('admin-reset-all')?.addEventListener('click', async () => {
                if (confirm('УДАЛИТЬ ВСЕХ КОТОВ, ПОЛЬЗОВАТЕЛЕЙ? НЕОБРАТИМО')) {
                    const catsSnap = await getDocs(collection(db, "cats"));
                    for (const docSnap of catsSnap.docs) await deleteDoc(docSnap.ref);
                    const usersSnap = await getDocs(collection(db, "users"));
                    for (const docSnap of usersSnap.docs) await deleteDoc(docSnap.ref);
                    const notifSnap = await getDocs(collection(db, "notifications"));
                    for (const docSnap of notifSnap.docs) await deleteDoc(docSnap.ref);
                    const salesSnap = await getDocs(collection(db, "sales"));
                    for (const docSnap of salesSnap.docs) await deleteDoc(docSnap.ref);
                    alert('Всё удалено');
                }
            });
        }
        
        // прочие заглушки для рендеров
        function renderInventory() {}
        function renderShop() {}
        function renderBreeding() {}
        function viewCatModal(id) { alert('Подробнее о коте - в разработке'); }
        function setupNavigation() {
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.onclick = () => {
                    document.querySelectorAll('.tab-content').forEach(tab => tab.classList.add('hidden'));
                    document.getElementById(`${btn.dataset.tab}-content`).classList.remove('hidden');
                };
            });
        }
        
        // UI события входа
        document.getElementById('play-btn')?.addEventListener('click', () => {
            startScreen.classList.add('hidden');
            loginScreen.classList.remove('hidden');
        });
        document.getElementById('to-register')?.addEventListener('click', () => {
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('register-form').classList.remove('hidden');
        });
        document.getElementById('to-login')?.addEventListener('click', () => {
            document.getElementById('register-form').classList.add('hidden');
            document.getElementById('login-form').classList.remove('hidden');
        });
        document.getElementById('login-submit')?.addEventListener('click', async () => {
            const email = document.getElementById('login-email').value;
            const pwd = document.getElementById('login-pwd').value;
            try { await login(email, pwd); } catch(e) { alert('Ошибка входа'); }
        });
        document.getElementById('register-submit')?.addEventListener('click', async () => {
            const email = document.getElementById('reg-email').value;
            const pwd = document.getElementById('reg-pwd').value;
            const nick = document.getElementById('reg-nick').value;
            if (!email || !pwd || !nick) return alert('Заполните все поля');
            try { await register(email, pwd, nick); } catch(e) { alert(e.message); }
        });
        
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                currentUserId = user.uid;
                authContainer.classList.add('hidden');
                appContainer.classList.remove('hidden');
                showDeviceModal();
                await initApp();
            } else {
                currentUser = null;
                authContainer.classList.remove('hidden');
                appContainer.classList.add('hidden');
                startScreen.classList.remove('hidden');
                loginScreen.classList.add('hidden');
                if (window.unsubscribes) window.unsubscribes.forEach(unsub => unsub());
                if (gameInterval) clearInterval(gameInterval);
            }
        });
        
        // Экспорт глобально для кнопок
        window.startExpedition = startExpedition;
        window.startWalkGame = startWalkGame;
    </script>
    <style>
        body { font-family: 'Quicksand', sans-serif; background: linear-gradient(145deg, #f5e7d3 0%, #e6d5b8 100%); min-height: 100vh; }
        .mobile .cat-card { font-size: 0.9rem; padding: 0.75rem; }
        .btn-pink { background-color: #c17b5e; color: white; transition: 0.2s; }
        .btn-pink:hover { background-color: #a55e43; }
        .tab-content { animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .glass-card { background: rgba(255, 248, 235, 0.85); backdrop-filter: blur(4px); }
    </style>
</head>
<body class="bg-amber-50 text-stone-800">
    <div id="auth-container" class="min-h-screen flex items-center justify-center p-4">
        <div id="start-screen" class="text-center">
            <h1 class="text-5xl font-bold text-amber-800 mb-8"><i class="fas fa-paw"></i> Генетика котов</h1>
            <button id="play-btn" class="btn-pink text-4xl px-12 py-8 rounded-3xl shadow-2xl hover:scale-105 transition-transform"><i class="fas fa-play mr-3"></i> Играть</button>
        </div>
        <div id="login-screen" class="hidden glass-card rounded-2xl p-8 w-full max-w-md shadow-2xl">
            <div id="login-form">
                <h2 class="text-2xl font-bold mb-4">Вход</h2>
                <input type="email" id="login-email" placeholder="Email" class="w-full border p-3 rounded-lg mb-3">
                <input type="password" id="login-pwd" placeholder="Пароль" class="w-full border p-3 rounded-lg mb-4">
                <button id="login-submit" class="bg-emerald-700 text-white w-full py-2 rounded-xl">Войти</button>
                <p class="mt-4 text-center">Нет аккаунта? <button id="to-register" class="text-amber-700 underline">Регистрация</button></p>
            </div>
            <div id="register-form" class="hidden">
                <h2 class="text-2xl font-bold mb-4">Регистрация</h2>
                <input type="text" id="reg-nick" placeholder="Игровой ник" class="w-full border p-3 rounded-lg mb-3">
                <input type="email" id="reg-email" placeholder="Email" class="w-full border p-3 rounded-lg mb-3">
                <input type="password" id="reg-pwd" placeholder="Пароль" class="w-full border p-3 rounded-lg mb-4">
                <button id="register-submit" class="bg-amber-700 text-white w-full py-2 rounded-xl">Создать</button>
                <p class="mt-4 text-center"><button id="to-login" class="text-amber-700 underline">Уже есть аккаунт?</button></p>
            </div>
        </div>
    </div>
    <div id="app" class="hidden container mx-auto p-4">
        <div class="flex flex-wrap gap-2 mb-6 justify-center">
            <button class="nav-btn bg-amber-700 text-white px-5 py-2 rounded-full shadow" data-tab="home">🏠 Дом</button>
            <button class="nav-btn bg-amber-700 text-white px-5 py-2 rounded-full shadow" data-tab="park">🌳 Парк</button>
            <button class="nav-btn bg-amber-700 text-white px-5 py-2 rounded-full shadow" data-tab="castle">🏰 Замок</button>
            <button class="nav-btn bg-amber-700 text-white px-5 py-2 rounded-full shadow" data-tab="shop">🛒 Магазин</button>
            <button class="nav-btn bg-amber-700 text-white px-5 py-2 rounded-full shadow" data-tab="inventory">🎒 Инвентарь</button>
            <button class="nav-btn bg-amber-700 text-white px-5 py-2 rounded-full shadow" data-tab="breeding">🧬 Разведение</button>
            <button id="admin-panel-btn" class="nav-btn bg-stone-700 text-white px-5 py-2 rounded-full shadow hidden" data-tab="admin">🛢️ Админ</button>
        </div>
        <div id="home-content" class="tab-content"></div>
        <div id="park-content" class="tab-content hidden">
            <div class="glass-card p-5 rounded-2xl">
                <h2 class="text-2xl font-bold">🌳 Прогулка</h2>
                <select id="walk-cat-select" class="border p-2 rounded my-3 w-full"></select>
                <button id="start-walk" class="bg-green-700 text-white px-6 py-2 rounded-full" onclick="window.startWalkGame(document.getElementById('walk-cat-select').value)">Гулять с котом</button>
            </div>
        </div>
        <div id="castle-content" class="tab-content hidden">
            <div class="glass-card p-5 rounded-2xl">
                <h2 class="text-2xl font-bold">🏰 Экспедиция</h2>
                <select id="castle-cat-select" class="border p-2 rounded my-3 w-full"></select>
                <button onclick="window.startExpedition()" class="bg-purple-800 text-white px-6 py-2 rounded-full">Отправить</button>
            </div>
        </div>
        <div id="shop-content" class="tab-content hidden">Магазин в разработке</div>
        <div id="inventory-content" class="tab-content hidden">Инвентарь пуст</div>
        <div id="breeding-content" class="tab-content hidden">Разведение скоро</div>
        <div id="admin-content" class="tab-content hidden"></div>
        <div id="notifications-panel" class="fixed bottom-4 right-4 max-w-xs bg-white/90 rounded-xl shadow-lg p-2"></div>
    </div>
    <div id="device-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div id="device-modal-content" class="bg-white rounded-2xl p-6"></div>
    </div>
    <script>
        // Переключение навигации + обновление списков для прогулки
        const selectsUpdate = () => {
            if (window.userCats) {
                const walkSelect = document.getElementById('walk-cat-select');
                if (walkSelect) walkSelect.innerHTML = window.userCats.filter(c => c.state === 'лежит').map(c => `<option value="${c.id}">${c.name}</option>`).join('');
            }
        };
        setInterval(selectsUpdate, 2000);
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
                document.getElementById(`${btn.dataset.tab}-content`).classList.remove('hidden');
                if (btn.dataset.tab === 'admin' && window.renderAdminPanel) window.renderAdminPanel();
                if (btn.dataset.tab === 'park') selectsUpdate();
                if (btn.dataset.tab === 'castle' && window.renderCastle) window.renderCastle();
            });
        });
    </script>
</body>
</html>
