  <script>
    // ---------- Firebase конфиг ----------
    const firebaseConfig = {
      apiKey: "AIzaSyBSO84yoAhHUCIejdf9mmo89oXIYeeSFfs",
      authDomain: "cat-genetics-v6.firebaseapp.com",
      projectId: "cat-genetics-v6",
      storageBucket: "cat-genetics-v6.firebasestorage.app",
      messagingSenderId: "302978224196",
      appId: "1:302978224196:web:106b02fc1157bd17fdac11",
      measurementId: "G-HKJQVRPCZJ"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null, currentTab = 'home', gameMinutes = 360, timeInterval = null, notifUnsub = null;
    const COLORS = ['белый','чёрный','рыжий','серый','кремовый','коричневый','медовый','песочный'];
    const PATTERNS = ['однотонный','полосатый','пятнистый','мраморный','черепаховый','колорпойнт'];
    const EYE_COLORS = ['янтарный','зелёный','ореховый','золотистый','карий'];
    const CHARACTERS = ['ласковый','игривый','спокойный','ленивый','любопытный','независимый'];

    // Генетика наследования (упрощённая матрица для демо)
    function inheritColor(mc, fc) {
      const opts = [mc, fc];
      if (mc === fc) return mc;
      const r = Math.random();
      if (r < 0.45) return mc;
      if (r < 0.9) return fc;
      return COLORS[Math.floor(Math.random()*COLORS.length)];
    }
    function inheritPattern(mp, fp) { return Math.random() < 0.7 ? (Math.random()<0.5?mp:fp) : PATTERNS[Math.floor(Math.random()*PATTERNS.length)]; }
    function inheritEye(me, fe) { const mEye = typeof me === 'object' ? me.colors[0] : me; const fEye = typeof fe === 'object' ? fe.colors[0] : fe; return Math.random() < 0.8 ? (Math.random()<0.5?mEye:fEye) : EYE_COLORS[Math.floor(Math.random()*EYE_COLORS.length)]; }
    function applyMutations(cat) {
      const r = Math.random() * 100;
      if (r < 3) { cat.mainColor = 'белый'; cat.pattern = 'однотонный'; cat.eyeColor = 'розовый'; cat.mutations.push('альбинизм'); cat.secondaryColor = null; }
      else if (r < 6) { cat.eyeColor = { type:'разные', colors: [EYE_COLORS[Math.floor(Math.random()*EYE_COLORS.length)], EYE_COLORS[Math.floor(Math.random()*EYE_COLORS.length)]] }; cat.mutations.push('гетерохромия'); }
      else if (r < 9) { cat.pattern = 'пятнистый'; cat.secondaryColor = null; cat.mutations.push('витилиго'); }
      else if (r < 10) { cat.secondaryColor = COLORS[Math.floor(Math.random()*COLORS.length)]; cat.mutations.push('химеризм'); }
    }
    function generateKitten(mother, father, motherId, fatherId) {
      const kitten = {
        gender: Math.random()<0.5?'male':'female', age: 'котёнок', state: 'лежит',
        mainColor: inheritColor(mother.mainColor, father.mainColor),
        pattern: inheritPattern(mother.pattern, father.pattern),
        eyeColor: inheritEye(mother.eyeColor, father.eyeColor),
        character: CHARACTERS[Math.floor(Math.random()*CHARACTERS.length)],
        mutations: [], secondaryColor: (mother.secondaryColor && father.secondaryColor && Math.random()<0.4) ? (Math.random()<0.5?mother.secondaryColor:father.secondaryColor) : null,
        motherId, fatherId, isPregnant: false, tiredUntil: null, birthCount: 0,
        adultAt: firebase.firestore.Timestamp.fromDate(new Date(Date.now()+5*60000))
      };
      if (kitten.pattern === 'однотонный') kitten.secondaryColor = null;
      applyMutations(kitten);
      return kitten;
    }
    function generateRandomCat() {
      const cat = {
        gender: Math.random()<0.5?'male':'female', age:'взрослый', state:'лежит',
        mainColor: COLORS[Math.floor(Math.random()*COLORS.length)],
        pattern: PATTERNS[Math.floor(Math.random()*PATTERNS.length)],
        eyeColor: EYE_COLORS[Math.floor(Math.random()*EYE_COLORS.length)],
        character: CHARACTERS[Math.floor(Math.random()*CHARACTERS.length)],
        mutations: [], secondaryColor: Math.random()<0.3 ? COLORS[Math.floor(Math.random()*COLORS.length)] : null,
        motherId: null, fatherId: null, tiredUntil: null, birthCount: 0
      };
      if (cat.pattern === 'однотонный') cat.secondaryColor = null;
      applyMutations(cat);
      return cat;
    }

    function timeLeftStr(untilDate) {
      if (!untilDate) return '';
      const diff = untilDate.toDate() - new Date();
      if (diff <= 0) return 'готово';
      const m = Math.floor(diff/60000), s = Math.floor((diff%60000)/1000);
      return `${m}:${s<10?'0'+s:s}`;
    }

    function updateGameTime() { gameMinutes++; const h=Math.floor(gameMinutes/60)%24, m=gameMinutes%60; document.getElementById('game-time').innerHTML = `${h>=6&&h<18?'☀️':'🌙'} ${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`; }
    function updateCoinsDisplay() { db.collection('users').doc(currentUser?.uid).get().then(doc=>{ if(doc.exists) document.getElementById('coins-display').innerHTML = `🪙 ${doc.data().coins}`; }); }

    // Устройство
    function applyDevice(mode) { if(mode==='mobile') document.body.classList.add('mobile'); else document.body.classList.remove('mobile'); localStorage.setItem('device',mode); }
    function showDeviceModal() { 
      const modal = document.getElementById('device-modal'), cont = document.getElementById('device-modal-content');
      cont.innerHTML = `<h2 class="text-xl font-bold mb-4">📱 Выбор лапки</h2><div class="flex gap-4 justify-center"><button id="dev-mobile" class="btn-nature px-6 py-3 rounded-xl">📱 Телефон</button><button id="dev-desktop" class="btn-nature px-6 py-3 rounded-xl">💻 Компьютер</button></div>`;
      modal.classList.add('active');
      document.getElementById('dev-mobile').onclick = () => { applyDevice('mobile'); modal.classList.remove('active'); };
      document.getElementById('dev-desktop').onclick = () => { applyDevice('desktop'); modal.classList.remove('active'); };
    }

    // Уникальность ника
    async function isNickUnique(nick) { const q = await db.collection('users').where('username','==',nick).get(); return q.empty; }

    // Регистрация
    async function register(email, pwd, nick) {
      if(!await isNickUnique(nick)) throw new Error('Ник уже занят');
      const cred = await auth.createUserWithEmailAndPassword(email, pwd);
      await db.collection('users').doc(cred.user.uid).set({ coins: 100, username: nick, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
      const starter = generateRandomCat(); starter.owner = cred.user.uid; starter.name = `${nick}_Лесной`; starter.age = 'взрослый';
      starter.idNumber = `#${Math.floor(Math.random()*9999)}`;
      await db.collection('cats').add(starter);
      return cred.user;
    }

    // ---------- Основная логика после входа ----------
    async function initAfterAuth() {
      if (timeInterval) clearInterval(timeInterval);
      timeInterval = setInterval(() => { updateGameTime(); refreshTimers(); }, 1000);
      setInterval(() => { checkWalkingReturns(); checkCastleReturns(); checkPregnancies(); checkAdultGrowth(); }, 5000);
      updateCoinsDisplay();
      if (currentUser.email === 'katya2013sara1981@gmail.com') {
        document.getElementById('reset-all-btn').classList.remove('hidden');
        document.getElementById('admin-tab-btn').classList.remove('hidden');
      } else { document.getElementById('reset-all-btn').classList.add('hidden'); document.getElementById('admin-tab-btn').classList.add('hidden'); }
      listenNotifications();
      switchTab('home');
    }

    function refreshTimers() {
      document.querySelectorAll('.timer-adult').forEach(el => { const until = new Date(el.dataset.until); if(until) el.innerText = timeLeftStr({toDate:()=>until}); });
      document.querySelectorAll('.timer-tired').forEach(el => { const until = new Date(el.dataset.until); if(until) el.innerText = timeLeftStr({toDate:()=>until}); });
    }

    async function checkWalkingReturns() {
      const walks = await db.collection('users').doc(currentUser.uid).collection('notifications').where('type','==','walking').get();
      walks.forEach(async d => { const data = d.data(); if(data.returnTime.toDate() <= new Date()){ await db.collection('users').doc(currentUser.uid).collection('notifications').add({ type:'walk_return', catId:data.catId, message:`🚪 Кот вернулся!`, read:false, timestamp:firebase.firestore.FieldValue.serverTimestamp() }); d.ref.delete(); } });
      const lostCats = await db.collection('cats').where('owner','==',currentUser.uid).where('state','==','гуляет').get();
      for(const cat of lostCats.docs){
        const existing = await db.collection('users').doc(currentUser.uid).collection('notifications').where('catId','==',cat.id).where('type','in',['walking','walk_return']).get();
        if(existing.empty) await db.collection('users').doc(currentUser.uid).collection('notifications').add({ type:'walk_return', catId:cat.id, message:`🚪 Кот вернулся из леса`, read:false, timestamp:firebase.firestore.FieldValue.serverTimestamp() });
      }
    }

    async function checkCastleReturns() {
      const expeditions = await db.collection('users').doc(currentUser.uid).collection('notifications').where('type','==','castle_exp').get();
      expeditions.forEach(async d => { const data = d.data(); if(data.returnTime.toDate() <= new Date()){ const rewards = [{type:'item',name:'Золотая рыбка',desc:'мгновенные роды'},{type:'item',name:'Кошачья мята',desc:'+10 монет и отдых'},{type:'coins',amount:50,name:'Мешочек монет'}]; const rew = rewards[Math.floor(Math.random()*rewards.length)]; if(rew.type==='coins'){ const userRef = db.collection('users').doc(currentUser.uid); await userRef.update({ coins: (await userRef.get()).data().coins+rew.amount }); } else { await db.collection('users').doc(currentUser.uid).collection('inventory').add({ name:rew.name, type:rew.name.toLowerCase().replace(' ','_'), desc:rew.desc }); } await db.collection('cats').doc(data.catId).update({ state:'уставший', tiredUntil: firebase.firestore.Timestamp.fromDate(new Date(Date.now()+3*60000)) }); d.ref.delete(); await db.collection('users').doc(currentUser.uid).collection('notifications').add({ type:'info', message:`🏰 Экспедиция принесла ${rew.name}`, read:false, timestamp:firebase.firestore.FieldValue.serverTimestamp() }); } });
    }

    async function checkPregnancies() {
      const pregs = await db.collection('cats').where('owner','==',currentUser.uid).where('isPregnant','==',true).get();
      pregs.forEach(async doc => { if(doc.data().pregnancyEnd?.toDate() <= new Date()){ await db.collection('users').doc(currentUser.uid).collection('notifications').add({ type:'birth_ready', motherId:doc.id, message:`💥 Роды!`, read:false, timestamp:firebase.firestore.FieldValue.serverTimestamp() }); } });
    }
    async function checkAdultGrowth() {
      const kittens = await db.collection('cats').where('owner','==',currentUser.uid).where('age','==','котёнок').get();
      kittens.forEach(async doc => { if(doc.data().adultAt?.toDate() <= new Date()){ await db.collection('users').doc(currentUser.uid).collection('notifications').add({ type:'adult_ready', catId:doc.id, message:`✅ Котёнок вырос!`, read:false, timestamp:firebase.firestore.FieldValue.serverTimestamp() }); } });
    }

    async function confirmAdult(catId) { await db.collection('cats').doc(catId).update({ age:'взрослый', adultAt:null }); document.getElementById('cat-modal')?.classList.remove('active'); }
    async function finishRest(catId) { await db.collection('cats').doc(catId).update({ state:'лежит', tiredUntil:null }); }

    // --- ОТРИСОВКА ВКЛАДОК ---
    async function renderHome() {
      const snap = await db.collection('cats').where('owner','==',currentUser.uid).get();
      let html = `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">`;
      snap.forEach(doc => { const c = doc.data(); html += `<div class="cat-card p-3 cursor-pointer" data-cat-id="${doc.id}"><div class="flex justify-between"><span class="font-bold text-amber-300">🐱 ${c.name}</span><span>${c.gender==='male'?'♂ мальчик':'♀ девочка'}</span></div><div class="text-sm">${c.mainColor} ${c.pattern}</div><div>${typeof c.eyeColor === 'object' ? '✨ гетерохромия' : c.eyeColor}</div><div>${c.state} ${c.tiredUntil ? `<span class="timer-tired" data-until="${c.tiredUntil.toDate().toISOString()}">${timeLeftStr(c.tiredUntil)}</span>` : c.adultAt ? `<span class="timer-adult" data-until="${c.adultAt.toDate().toISOString()}">${timeLeftStr(c.adultAt)}</span>` : ''}</div></div>`; });
      html += `</div><button id="buy-cat-btn" class="btn-forest mt-5 px-5 py-2 rounded-full">🐾 Купить кота (${snap.size===0?'бесплатно':snap.size===1?'10 монет':'100 монет'})</button>`;
      document.getElementById('tab-content').innerHTML = html;
      document.querySelectorAll('[data-cat-id]').forEach(el => el.addEventListener('click', (e) => openCatView(e.currentTarget.dataset.catId)));
      document.getElementById('buy-cat-btn')?.addEventListener('click', openBuyModal);
    }

    async function openBuyModal() {
      const owned = (await db.collection('cats').where('owner','==',currentUser.uid).get()).size;
      let price = 0; if(owned===0) price=0; else if(owned===1) price=10; else if(owned===2) price=100; else { alert('У вас уже 3 кота, больше нельзя'); return; }
      const userDoc = await db.collection('users').doc(currentUser.uid).get();
      if(userDoc.data().coins < price) return alert('Не хватает монет');
      const candidates = [generateRandomCat(), generateRandomCat(), generateRandomCat()];
      const modal = document.getElementById('choose-cat-modal'), cont = document.getElementById('choose-cat-modal-content');
      cont.innerHTML = `<h2 class="text-xl font-bold">Выбери спутника</h2><div class="grid grid-cols-3 gap-2 mt-3">` + candidates.map((c,i)=>`<div class="bg-stone-800 p-2 rounded"><div>${c.mainColor} ${c.pattern}</div><button class="btn-nature text-sm mt-1 select-cand" data-idx="${i}">Выбрать</button></div>`).join('') + `</div>`;
      modal.classList.add('active');
      window._candCats = candidates;
      document.querySelectorAll('.select-cand').forEach(btn => btn.addEventListener('click', async (e) => {
        const idx = e.target.dataset.idx, chosen = window._candCats[idx];
        const name = prompt("Дайте имя коту:", "Лесной");
        if(!name) return;
