<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Генетика котов</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #1f2937; color: #f3f4f6; }
    .tab-btn { transition: all 0.2s; }
    .tab-btn.active { background: #374151; border-bottom: 3px solid #f472b6; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; z-index: 1000; }
    .modal.active { display: flex; }
    .modal-content { background: #2d3748; border-radius: 1rem; padding: 1.5rem; max-width: 90%; width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
    .cat-card { transition: transform 0.1s; }
    .cat-card:hover { transform: scale(1.02); background: #374151; }
    .btn { padding: 0.5rem 1rem; border-radius: 0.5rem; font-weight: 600; cursor: pointer; }
    .btn-pink { background: #ec4899; color: white; }
    .btn-pink:hover { background: #db2777; }
    .btn-gray { background: #4b5563; color: white; }
    .btn-gray:hover { background: #374151; }
    .notification-dot { position: absolute; top: -5px; right: -5px; background: #ef4444; color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 0.7rem; display: flex; align-items: center; justify-content: center; }
    .countdown { font-size: 1.2rem; font-weight: bold; color: #fbbf24; }
    .park-game { position: relative; width: 100%; height: 200px; background: #7f1d1d; overflow: hidden; }
    .park-zone { position: absolute; width: 60px; height: 100%; background: #166534; left: 50%; transform: translateX(-50%); }
    .park-cat { position: absolute; font-size: 2rem; transition: left 0.15s linear; }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-start p-4">
  <div id="auth-container" class="w-full max-w-md mt-20 bg-gray-800 p-6 rounded-xl shadow-xl">
    <h1 class="text-2xl font-bold text-pink-400 mb-4">🐾 Генетика котов</h1>
    <input id="email" type="email" placeholder="Email" class="w-full p-2 mb-2 rounded bg-gray-700 text-white">
    <input id="password" type="password" placeholder="Пароль" class="w-full p-2 mb-2 rounded bg-gray-700 text-white">
    <button id="login-btn" class="btn btn-pink w-full mb-2">Войти</button>
    <button id="register-btn" class="btn btn-gray w-full">Регистрация</button>
  </div>

  <div id="app" class="w-full max-w-4xl hidden">
    <div class="flex justify-between items-center bg-gray-800 p-3 rounded-xl mb-4">
      <div class="flex space-x-2">
        <button class="tab-btn px-3 py-1 rounded" data-tab="home">🏠 Дом</button>
        <button class="tab-btn px-3 py-1 rounded" data-tab="allcats">🌍 Все коты</button>
        <button class="tab-btn px-3 py-1 rounded" data-tab="breeding">💕 Разведение</button>
        <button class="tab-btn px-3 py-1 rounded" data-tab="shop">🛒 Магазин</button>
        <button class="tab-btn px-3 py-1 rounded" data-tab="park">🌳 Парк</button>
      </div>
      <div class="flex items-center space-x-3">
        <span id="game-time" class="text-yellow-300 font-mono">☀️ 06:00</span>
        <span id="coins-display" class="text-yellow-400 font-bold">🪙 0</span>
        <button id="inventory-btn" class="relative text-xl">🎒</button>
        <button id="msg-btn" class="relative text-xl">✉️ <span id="msg-badge" class="notification-dot hidden">0</span></button>
        <button id="account-btn" class="text-xl">⚙️</button>
        <button id="reset-btn" class="text-xl hidden" title="Сбросить всё">🗑</button>
        <button id="logout-btn" class="text-sm text-red-400">Выйти</button>
      </div>
    </div>
    <div id="tab-content" class="bg-gray-800 p-4 rounded-xl min-h-[300px]"></div>
  </div>

  <!-- Модалки -->
  <div id="cat-modal" class="modal"><div class="modal-content" id="cat-modal-content"></div></div>
  <div id="message-modal" class="modal"><div class="modal-content" id="message-modal-content"></div></div>
  <div id="birth-modal" class="modal"><div class="modal-content" id="birth-modal-content"></div></div>
  <div id="choose-cat-modal" class="modal"><div class="modal-content max-w-lg w-full" id="choose-cat-modal-content"></div></div>
  <div id="tracking-modal" class="modal"><div class="modal-content" id="tracking-modal-content"></div></div>
  <div id="park-game-modal" class="modal"><div class="modal-content w-96" id="park-game-content"></div></div>
  <div id="inventory-modal" class="modal"><div class="modal-content max-w-lg" id="inventory-modal-content"></div></div>
  <div id="item-use-modal" class="modal"><div class="modal-content" id="item-use-modal-content"></div></div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBSO84yoAhHUCIejdf9mmo89oXIYeeSFfs",
      authDomain: "cat-genetics-v6.firebaseapp.com",
      projectId: "cat-genetics-v6",
      storageBucket: "cat-genetics-v6.firebasestorage.app",
      messagingSenderId: "302978224196",
      appId: "1:302978224196:web:106b02fc1157bd17fdac11",
      measurementId: "G-HKJQVRPCZJ"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null;
    let currentTab = 'home';
    let gameInterval = null;
    let timeInterval = null;
    let notificationsListener = null;
    let gameMinutes = 360; // 6:00

    function updateGameTimeDisplay() {
      const hours = Math.floor(gameMinutes / 60) % 24;
      const mins = gameMinutes % 60;
      const icon = (hours >= 6 && hours < 18) ? '☀️' : '🌃';
      document.getElementById('game-time').textContent = `${icon} ${String(hours).padStart(2,'0')}:${String(mins).padStart(2,'0')}`;
    }
    function incrementGameTime() { gameMinutes++; updateGameTimeDisplay(); }

    // Auth
    document.getElementById('login-btn').addEventListener('click', () => {
      auth.signInWithEmailAndPassword(document.getElementById('email').value.trim(), document.getElementById('password').value)
        .catch(e => alert(e.message));
    });
    document.getElementById('register-btn').addEventListener('click', () => {
      auth.createUserWithEmailAndPassword(document.getElementById('email').value.trim(), document.getElementById('password').value)
        .catch(e => alert(e.message));
    });

    auth.onAuthStateChanged(user => {
      if (user) {
        currentUser = user;
        document.getElementById('auth-container').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
        initApp();
      } else {
        currentUser = null;
        document.getElementById('auth-container').classList.remove('hidden');
        document.getElementById('app').classList.add('hidden');
        if (timeInterval) clearInterval(timeInterval);
        if (notificationsListener) notificationsListener();
      }
    });

    async function initApp() {
      updateGameTimeDisplay();
      timeInterval = setInterval(incrementGameTime, 1000);
      const userDoc = await db.collection('users').doc(currentUser.uid).get();
      if (!userDoc.exists) {
        await db.collection('users').doc(currentUser.uid).set({ coins: 100, nickname: currentUser.email });
      }
      if (currentUser.email === 'katya2013sara1981@gmail.com') {
        document.getElementById('reset-btn').classList.remove('hidden');
      }
      updateCoinsDisplay();
      listenNotifications();
      switchTab('home');
    }

    function updateCoinsDisplay() {
      db.collection('users').doc(currentUser.uid).get().then(doc => {
        document.getElementById('coins-display').textContent = `🪙 ${doc.exists ? doc.data().coins : 0}`;
      });
    }

    function listenNotifications() {
      if (notificationsListener) notificationsListener();
      notificationsListener = db.collection('users').doc(currentUser.uid)
        .collection('notifications').where('read', '==', false)
        .onSnapshot(snap => {
          const count = snap.size;
          const badge = document.getElementById('msg-badge');
          if (count > 0) { badge.textContent = count; badge.classList.remove('hidden'); }
          else badge.classList.add('hidden');
        });
    }

    // Сброс всего (создатель)
    document.getElementById('reset-btn').addEventListener('click', async () => {
      if (!confirm('Удалить ВСЕ данные (котов, аккаунты, уведомления)?')) return;
      const batch = db.batch();
      const collections = ['cats', 'users', 'park', 'sales', 'trades', 'server'];
      for (const col of collections) {
        const snap = await db.collection(col).get();
        snap.forEach(doc => batch.delete(doc.ref));
      }
      await batch.commit();
      alert('Всё удалено.');
      auth.signOut();
    });

    // Табы
    document.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click', () => switchTab(btn.dataset.tab)));
    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
      const container = document.getElementById('tab-content');
      switch(tab) {
        case 'home': renderHome(); break;
        case 'allcats': renderAllCats(); break;
        case 'breeding': renderBreeding(); break;
        case 'shop': container.innerHTML = '<p class="text-gray-400">Магазин в разработке</p>'; break;
        case 'park': renderPark(); break;
      }
    }

    // Генерация случайного кота
    function generateRandomCat() {
      const colors = ['белый','чёрный','рыжий','серый','кремовый','шоколадный','лиловый','голубой'];
      const patterns = ['однотонный','табби','пятнистый','мраморный','колорпойнт','черепаховый'];
      const eyeColors = ['голубой','зелёный','жёлтый','карий','разные'];
      const chars = ['спокойный','игривый','ленивый','любопытный','независимый','ласковый'];
      return {
        gender: Math.random() < 0.5 ? 'male' : 'female',
        age: 'взрослый',
        state: 'лежит',
        mainColor: colors[Math.floor(Math.random()*colors.length)],
        pattern: patterns[Math.floor(Math.random()*patterns.length)],
        eyeColor: eyeColors[Math.floor(Math.random()*eyeColors.length)],
        character: chars[Math.floor(Math.random()*chars.length)],
        mutations: [],
        secondaryColor: Math.random() < 0.3 ? colors[Math.floor(Math.random()*colors.length)] : null,
        isPregnant: false,
        pregnancyEnd: null,
        tiredUntil: null
      };
    }

    // Получить следующий ID для кота пользователя
    async function getNextIdNumber() {
      const snap = await db.collection('cats').where('owner', '==', currentUser.uid).get();
      return String(snap.size + 1).padStart(4, '0');
    }

    // Дом
    function renderHome() {
      const container = document.getElementById('tab-content');
      container.innerHTML = '<p>Загрузка...</p>';
      db.collection('cats').where('owner', '==', currentUser.uid)
        .onSnapshot(snap => {
          const owned = snap.size;
          let html = '<div class="flex flex-wrap gap-3" id="home-cats">';
          snap.forEach(doc => {
            const c = doc.data();
            html += `<div class="cat-card bg-gray-700 p-3 rounded-lg w-44">
              <span class="cat-link cursor-pointer text-blue-300 hover:underline" data-cat-id="${doc.id}">🐱 ${c.name}</span>
              <div class="text-xs text-gray-400">{${c.gender==='male'?'мальчик':'девочка'}} [${c.idNumber}]</div>
              <div class="text-xs">Возраст: ${c.age}</div>
              <div class="text-xs text-pink-300">${c.state}</div>
            </div>`;
          });
          html += '</div>';
          if (snap.empty) html += '<p class="text-gray-400">У вас пока нет котов.</p>';
          let btnText = '', disabled = false;
          if (owned===0) btnText='Купить кота (бесплатно)';
          else if (owned===1) btnText='Купить кота (10 монет)';
          else if (owned===2) btnText='Купить кота (100 монет)';
          else { btnText='Заблокировано'; disabled=true; }
          html += `<button id="buy-cat-btn" class="btn btn-pink mt-3" ${disabled?'disabled':''}>${btnText}</button>`;
          container.innerHTML = html;
          if (!disabled) document.getElementById('buy-cat-btn')?.addEventListener('click', openChooseCatModal);
        });
    }

    // Все коты (бывшая Улица)
    function renderAllCats() {
      const container = document.getElementById('tab-content');
      container.innerHTML = '<p>Загрузка...</p>';
      db.collection('cats').onSnapshot(snap => {
        let html = '<div class="flex flex-wrap gap-3">';
        snap.forEach(doc => {
          const c = doc.data();
          html += `<div class="bg-gray-700 p-3 rounded-lg w-44">
            <span class="cat-link cursor-pointer text-blue-300" data-cat-id="${doc.id}">🐱 ${c.name}</span>
            <div class="text-xs text-gray-400">{${c.gender==='male'?'мальчик':'девочка'}}</div>
          </div>`;
        });
        html += '</div>';
        container.innerHTML = html;
      });
    }

    // Покупка (выбор из трёх)
    function openChooseCatModal() {
      const cats = [generateRandomCat(), generateRandomCat(), generateRandomCat()];
      const modal = document.getElementById('choose-cat-modal');
      const content = document.getElementById('choose-cat-modal-content');
      let html = '<h2 class="text-xl font-bold text-pink-300 mb-3">Выберите котёнка</h2><div class="grid grid-cols-3 gap-3">';
      cats.forEach((cat,idx) => {
        html += `<div class="bg-gray-700 p-3 rounded-lg text-center">
          <p class="text-lg">🐱</p>
          <p><b>Окрас:</b> ${cat.mainColor}${cat.secondaryColor?' + '+cat.secondaryColor:''}</p>
          <p><b>Рисунок:</b> ${cat.pattern}</p>
          <p><b>Глаза:</b> ${cat.eyeColor}</p>
          <p><b>Характер:</b> ${cat.character}</p>
          <button class="btn btn-pink mt-2 choose-cat-btn" data-idx="${idx}">Выбрать</button>
        </div>`;
      });
      html += '</div>';
      content.innerHTML = html;
      modal.classList.add('active');
      window._tempCats = cats;
      content.querySelectorAll('.choose-cat-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          window._chosenCat = window._tempCats[e.target.dataset.idx];
          content.innerHTML = `
            <h2 class="text-xl font-bold text-pink-300">Назовите кота</h2>
            <div class="bg-gray-700 p-3 rounded-lg mb-3">
              <p><b>Окрас:</b> ${window._chosenCat.mainColor}${window._chosenCat.secondaryColor?' + '+window._chosenCat.secondaryColor:''}</p>
              <p><b>Рисунок:</b> ${window._chosenCat.pattern}</p>
              <p><b>Глаза:</b> ${window._chosenCat.eyeColor}</p>
              <p><b>Пол:</b> {${window._chosenCat.gender==='male'?'мальчик':'девочка'}}</p>
            </div>
            <input id="new-cat-name" type="text" placeholder="Имя кота" class="w-full p-2 rounded bg-gray-700 mb-2">
            <button id="confirm-choose-btn" class="btn btn-pink">Забрать домой</button>
            <button class="btn btn-gray" onclick="document.getElementById('choose-cat-modal').classList.remove('active')">Отмена</button>
          `;
          document.getElementById('confirm-choose-btn').addEventListener('click', finalizeCatPurchase);
        });
      });
    }

    async function finalizeCatPurchase() {
      const name = document.getElementById('new-cat-name')?.value.trim();
      if (!name) return alert('Введите имя');
      const userRef = db.collection('users').doc(currentUser.uid);
      const userDoc = await userRef.get();
      const coins = userDoc.data().coins;
      const catsSnap = await db.collection('cats').where('owner','==',currentUser.uid).get();
      const owned = catsSnap.size;
      let price = 0;
      if (owned===0) price=0; else if (owned===1) price=10; else if (owned===2) price=100;
      else { alert('Больше нельзя'); return; }
      if (coins < price) return alert('Недостаточно монет');
      const newCat = {
        ...window._chosenCat,
        owner: currentUser.uid,
        name: name,
        idNumber: await getNextIdNumber(),
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      };
      await db.collection('cats').add(newCat);
      await userRef.update({ coins: coins - price });
      updateCoinsDisplay();
      document.getElementById('choose-cat-modal').classList.remove('active');
      window._tempCats = null; window._chosenCat = null;
    }

    // Разведение
    function renderBreeding() {
      const container = document.getElementById('tab-content');
      container.innerHTML = '<p>Загрузка...</p>';
      db.collection('cats').where('owner','==',currentUser.uid).get().then(snap => {
        const cats = []; snap.forEach(doc => cats.push({id:doc.id,...doc.data()}));
        const females = cats.filter(c => c.gender==='female' && c.age!=='котёнок' && !c.isPregnant && c.state==='лежит');
        const males = cats.filter(c => c.gender==='male' && c.age!=='котёнок' && c.state==='лежит');
        let html = '<div class="space-y-4" id="breed-area">';
        html += '<div><label class="block text-sm">Мать:</label><select id="mother-select" class="w-full p-2 rounded bg-gray-700"><option value="">-- выберите --</option>';
        females.forEach(c => html += `<option value="${c.id}">${c.name} [${c.idNumber}]</option>`);
        html += '</select></div><div><label class="block text-sm">Отец:</label><select id="father-select" class="w-full p-2 rounded bg-gray-700"><option value="">-- выберите --</option>';
        males.forEach(c => html += `<option value="${c.id}">${c.name} [${c.idNumber}]</option>`);
        html += '</select></div><button id="breed-btn" class="btn btn-pink">Скрестить 💕</button></div>';
        container.innerHTML = html;
      });
    }

    async function startBreeding() {
      const motherId = document.getElementById('mother-select')?.value;
      const fatherId = document.getElementById('father-select')?.value;
      if (!motherId || !fatherId) return alert('Выберите родителей');
      const motherDoc = await db.collection('cats').doc(motherId).get();
      if (motherDoc.data().state !== 'лежит') return alert('Кошка занята или устала');
      const userRef = db.collection('users').doc(currentUser.uid);
      const userDoc = await userRef.get();
      if (userDoc.data().coins < 10) return alert('Недостаточно монет');
      if (!confirm('Потратить 10 монет?')) return;
      await userRef.update({ coins: userDoc.data().coins - 10 });
      const pregnancyEnd = new Date(Date.now() + 5*60000);
      await db.collection('cats').doc(motherId).update({
        isPregnant: true, state: 'беременна', pregnancyEnd: firebase.firestore.Timestamp.fromDate(pregnancyEnd)
      });
      await db.collection('users').doc(currentUser.uid).collection('notifications').add({
        type:'pregnancy_tracking', message:`🐱 ${motherDoc.data().name} беременна.`, motherId, fatherId,
        pregnancyEnd: firebase.firestore.Timestamp.fromDate(pregnancyEnd), read:false,
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
      });
      updateCoinsDisplay();
      switchTab('breeding');
    }

    // Просмотр кота
    async function openCatView(catId) {
      const doc = await db.collection('cats').doc(catId).get();
      if (!doc.exists) return;
      const c = doc.data();
      const modal = document.getElementById('cat-modal');
      const content = document.getElementById('cat-modal-content');
      content.innerHTML = `
        <h2 class="text-xl font-bold text-pink-300">🐱 ${c.name}</h2>
        <p><b>Пол:</b> {${c.gender==='male'?'мальчик':'девочка'}}</p>
        <p><b>ID:</b> [${c.idNumber}]</p><p><b>Возраст:</b> ${c.age}</p>
        <p><b>Цвет:</b> ${c.mainColor} ${c.secondaryColor?'+'+c.secondaryColor:''}</p>
        <p><b>Окрас:</b> ${c.pattern}</p><p><b>Глаза:</b> ${c.eyeColor}</p>
        <p><b>Характер:</b> ${c.character}</p><p><b>Состояние:</b> ${c.state}</p>
        <button class="btn btn-gray mt-3" onclick="document.getElementById('cat-modal').classList.remove('active')">Закрыть</button>
      `;
      modal.classList.add('active');
    }

    // Отслеживание беременности
    function openTrackingModal(endTime) {
      const modal = document.getElementById('tracking-modal');
      const content = document.getElementById('tracking-modal-content');
      const update = () => {
        const diff = endTime - new Date();
        if (diff <= 0) { content.innerHTML = '<p>Роды начались!</p>'; return; }
        const m = Math.floor(diff/60000), s = Math.floor((diff%60000)/1000);
        content.innerHTML = `<h2>⏳ Ожидание родов</h2><p class="countdown">${m}:${String(s).padStart(2,'0')}</p>
          <button class="btn btn-gray mt-2" onclick="document.getElementById('tracking-modal').classList.remove('active')">Закрыть</button>`;
        modal.classList.add('active');
      };
      update();
      const int = setInterval(() => { if (modal.classList.contains('active')) update(); else clearInterval(int); }, 1000);
    }

    // Роды
    async function openBirthModal(motherId, fatherId) {
      const motherDoc = await db.collection('cats').doc(motherId).get();
      const mother = motherDoc.data();
      const kitten = { ...generateRandomCat(), owner: currentUser.uid, name:'', age:'котёнок' };
      const modal = document.getElementById('birth-modal');
      const content = document.getElementById('birth-modal-content');
      content.innerHTML = `<h2>💥 Роды!</h2><p>Кошка ${mother.name} родила котёнка.</p>
        <p>Пол: {${kitten.gender==='male'?'мальчик':'девочка'}}</p>
        <input id="kitten-name" type="text" placeholder="Имя котёнка" class="w-full p-2 rounded bg-gray-700 mb-2">
        <button id="save-kitten" class="btn btn-pink">Сохранить</button>
        <button class="btn btn-gray" onclick="document.getElementById('birth-modal').classList.remove('active')">Отмена</button>`;
      modal.classList.add('active');
      document.getElementById('save-kitten').addEventListener('click', async () => {
        const name = document.getElementById('kitten-name').value.trim();
        if (!name) return alert('Введите имя');
        kitten.name = name;
        kitten.idNumber = await getNextIdNumber();
        await db.collection('cats').add(kitten);
        const tiredUntil = new Date(Date.now() + 3*60000);
        await db.collection('cats').doc(motherId).update({
          isPregnant: false, state: 'уставшая', pregnancyEnd: null, tiredUntil: firebase.firestore.Timestamp.fromDate(tiredUntil)
        });
        // удалим уведомления о родах
        const notifs = await db.collection('users').doc(currentUser.uid).collection('notifications')
          .where('motherId','==',motherId).where('type','==','birth_ready').get();
        notifs.forEach(d => d.ref.delete());
        modal.classList.remove('active');
        updateCoinsDisplay();
        switchTab('home');
      });
    }

    // ========== ПАРК ==========
    let parkGameActive = false;
    let parkCatPosition = 0;
    let parkGameInterval = null;
    let selectedParkCatId = null;

    function renderPark() {
      const container = document.getElementById('tab-content');
      container.innerHTML = '<p>Загрузка...</p>';
      db.collection('cats').where('owner','==',currentUser.uid).get().then(snap => {
        const cats = []; snap.forEach(d => cats.push({id:d.id,...d.data()}));
        const adults = cats.filter(c => c.age!=='котёнок' && c.state==='лежит');
        const kittens = cats.filter(c => c.age==='котёнок');
        let html = '<h3 class="text-lg font-bold mb-2">Отправить кота на прогулку</h3>';
        if (adults.length===0 && kittens.length===0) html += '<p>Нет котов для прогулки</p>';
        else {
          html += '<select id="park-cat-select" class="w-full p-2 rounded bg-gray-700 mb-2"><option value="">-- выберите кота --</option>';
          adults.forEach(c => html += `<option value="${c.id}">${c.name} (взрослый)</option>`);
          kittens.forEach(c => html += `<option value="${c.id}">${c.name} (котёнок)</option>`);
          html += '</select><button id="start-walk-btn" class="btn btn-pink">Гулять!</button>';
        }
        container.innerHTML = html;
        document.getElementById('start-walk-btn')?.addEventListener('click', startWalkCheck);
      });
    }

    async function startWalkCheck() {
      const catId = document.getElementById('park-cat-select').value;
      if (!catId) return alert('Выберите кота');
      const catDoc = await db.collection('cats').doc(catId).get();
      const cat = catDoc.data();
      if (cat.state === 'беременна' || cat.state.startsWith('уставш')) return alert('Ваш кот слишком устал чтобы гулять');
      if (cat.age === 'котёнок') {
        const adults = await db.collection('cats').where('owner','==',currentUser.uid)
          .where('age','!=','котёнок').where('state','==','лежит').get();
        if (adults.empty) return alert('Котёнок слишком маленький чтобы гулять одному, сначала нужно чтобы гулял взрослый');
      }
      selectedParkCatId = catId;
      startParkMiniGame();
    }

    function startParkMiniGame() {
      parkGameActive = true;
      const modal = document.getElementById('park-game-modal');
      const content = document.getElementById('park-game-content');
      content.innerHTML = `
        <h3 class="text-lg font-bold mb-2">Поймайте кота на зелёной зоне!</h3>
        <div id="park-game-area" class="park-game relative cursor-pointer">
          <div class="park-zone"></div>
          <div id="park-cat" class="park-cat">🐱</div>
        </div>`;
      modal.classList.add('active');
      const catEl = document.getElementById('park-cat');
      const area = document.getElementById('park-game-area');
      let pos = 10; // 0-100%
      let direction = 1;
      parkCatPosition = pos;
      parkGameInterval = setInterval(() => {
        pos += direction * 4;
        if (pos > 90 || pos < 10) direction *= -1;
        parkCatPosition = pos;
        catEl.style.left = pos + '%';
      }, 50);
      area.addEventListener('click', handleParkClick);
    }

    function handleParkClick(e) {
      if (!parkGameActive) return;
      clearInterval(parkGameInterval);
      parkGameActive = false;
      document.getElementById('park-game-area').removeEventListener('click', handleParkClick);
      const modal = document.getElementById('park-game-modal');
      const greenZoneLeft = 45, greenZoneRight = 55; // зелёная зона в процентах
      if (parkCatPosition >= greenZoneLeft && parkCatPosition <= greenZoneRight) {
        // успех
        modal.classList.remove('active');
        startWalkSuccess();
      } else {
        alert('Кот слишком устал чтобы гулять');
        modal.classList.remove('active');
        selectedParkCatId = null;
      }
    }

    async function startWalkSuccess() {
      const catId = selectedParkCatId;
      await db.collection('cats').doc(catId).update({ state: 'гуляет' });
      const returnTime = new Date(Date.now() + 2*60000);
      await db.collection('users').doc(currentUser.uid).collection('notifications').add({
        type: 'walking', message: `🐱 Кот гуляет и вернётся через 2 минуты.`, catId,
        returnTime: firebase.firestore.Timestamp.fromDate(returnTime), read: false,
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
      });
      selectedParkCatId = null;
      switchTab('park');
    }

    // Возвращение с прогулки (проверка в глобальном интервале)
    async function checkWalkingReturns() {
      const notifs = await db.collection('users').doc(currentUser.uid).collection('notifications')
        .where('type','==','walking').where('read','==',false).get();
      notifs.forEach(async doc => {
        const data = doc.data();
        if (data.returnTime.toDate() <= new Date()) {
          // Создаём уведомление "открыть дверь"
          const existing = await db.collection('users').doc(currentUser.uid).collection('notifications')
            .where('catId','==',data.catId).where('type','==','walk_return').get();
          if (existing.empty) {
            await db.collection('users').doc(currentUser.uid).collection('notifications').add({
              type: 'walk_return', message: `🚪 Кот вернулся! Нажмите, чтобы открыть дверь.`, catId: data.catId,
              read: false, timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
          }
          doc.ref.delete(); // удаляем уведомление о прогулке
        }
      });
    }

    // Обработка двери (в делегировании)
    async function openDoor(catId) {
      const rand = Math.random() * 100;
      const catDoc = await db.collection('cats').doc(catId).get();
      const cat = catDoc.data();
      if (rand < 5) {
        // котёнок
        const kitten = { ...generateRandomCat(), owner: currentUser.uid, name:'', age:'котёнок', idNumber: await getNextIdNumber() };
        const modal = document.getElementById('birth-modal'); // переиспользуем
        const content = document.getElementById('birth-modal-content');
        content.innerHTML = `<h2>🎉 Найден котёнок!</h2><p>Пол: {${kitten.gender==='male'?'мальчик':'девочка'}}</p>
          <input id="kitten-name" type="text" placeholder="Имя" class="w-full p-2 rounded bg-gray-700 mb-2">
          <button id="save-kitten" class="btn btn-pink">Забрать</button>`;
        modal.classList.add('active');
        document.getElementById('save-kitten').addEventListener('click', async () => {
          const name = document.getElementById('kitten-name').value.trim();
          if (!name) return alert('Введите имя');
          kitten.name = name;
          await db.collection('cats').add(kitten);
          await finishWalk(catId);
          modal.classList.remove('active');
        });
      } else if (rand < 70) {
        // мячик
        await db.collection('users').doc(currentUser.uid).collection('inventory').add({ type: 'ball', name: 'Мячик' });
        await finishWalk(catId);
        alert('Кот принёс Мячик!');
      } else {
        // ускоритель
        await db.collection('users').doc(currentUser.uid).collection('inventory').add({ type: 'accelerator', name: 'Ускоритель беременности' });
        await finishWalk(catId);
        alert('Кот принёс Ускоритель беременности!');
      }
    }

    async function finishWalk(catId) {
      const tiredUntil = new Date(Date.now() + 3*60000);
      await db.collection('cats').doc(catId).update({ state: 'уставший', tiredUntil: firebase.firestore.Timestamp.fromDate(tiredUntil) });
      // удалить уведомление walk_return
      const notifs = await db.collection('users').doc(currentUser.uid).collection('notifications')
        .where('catId','==',catId).where('type','==','walk_return').get();
      notifs.forEach(d => d.ref.delete());
      updateCoinsDisplay();
    }

    // Инвентарь
    document.getElementById('inventory-btn').addEventListener('click', async () => {
      const modal = document.getElementById('inventory-modal');
      const content = document.getElementById('inventory-modal-content');
      const invSnap = await db.collection('users').doc(currentUser.uid).collection('inventory').get();
      let html = '<h2 class="text-lg font-bold mb-2">🎒 Инвентарь</h2>';
      if (invSnap.empty) html += '<p>Пусто</p>';
      invSnap.forEach(doc => {
        const item = doc.data();
        html += `<div class="bg-gray-700 p-2 rounded mb-2 flex justify-between items-center">
          <span>${item.name}</span>
          <div>
            <button class="text-blue-400 mr-2 item-use-btn" data-item-id="${doc.id}" data-type="${item.type}">👁 Использовать</button>
            <button class="text-red-400 item-delete-btn" data-item-id="${doc.id}">❌</button>
          </div>
        </div>`;
      });
      html += '<button class="btn btn-gray mt-2" onclick="document.getElementById(\'inventory-modal\').classList.remove(\'active\')">Закрыть</button>';
      content.innerHTML = html;
      modal.classList.add('active');

      content.querySelectorAll('.item-delete-btn').forEach(b => b.addEventListener('click', async (e) => {
        await db.collection('users').doc(currentUser.uid).collection('inventory').doc(e.target.dataset.itemId).delete();
        document.getElementById('inventory-btn').click(); // обновить
      }));
      content.querySelectorAll('.item-use-btn').forEach(b => b.addEventListener('click', (e) => {
        const itemId = e.target.dataset.itemId;
        const type = e.target.dataset.type;
        openItemUseModal(itemId, type);
      }));
    });

    async function openItemUseModal(itemId, type) {
      const modal = document.getElementById('item-use-modal');
      const content = document.getElementById('item-use-modal-content');
      let catsSnap;
      if (type === 'ball') {
        catsSnap = await db.collection('cats').where('owner','==',currentUser.uid).where('state','in',['уставшая','уставший']).get();
      } else if (type === 'accelerator') {
        catsSnap = await db.collection('cats').where('owner','==',currentUser.uid).where('isPregnant','==',true).get();
      }
      let html = `<h3>Выберите кота для ${type==='ball'?'Мячика':'Ускорителя'}</h3>`;
      if (catsSnap.empty) html += '<p>Нет подходящих котов</p>';
      catsSnap.forEach(doc => {
        const c = doc.data();
        html += `<div class="bg-gray-700 p-2 rounded mb-2 flex justify-between">
          <span>${c.name} (${c.state})</span>
          <button class="btn btn-pink use-on-cat-btn" data-cat-id="${doc.id}" data-item-id="${itemId}" data-type="${type}">✅</button>
        </div>`;
      });
      html += '<button class="btn btn-gray" onclick="document.getElementById(\'item-use-modal\').classList.remove(\'active\')">Закрыть</button>';
      content.innerHTML = html;
      modal.classList.add('active');
      content.querySelectorAll('.use-on-cat-btn').forEach(b => b.addEventListener('click', async (e) => {
        const catId = e.target.dataset.catId;
        const itemId = e.target.dataset.itemId;
        const itemType = e.target.dataset.type;
        if (itemType === 'ball') {
          await db.collection('cats').doc(catId).update({ state: 'лежит', tiredUntil: null });
          alert('Кот больше не уставший!');
        } else {
          // ускоритель - мгновенные роды
          const motherDoc = await db.collection('cats').doc(catId).get();
          openBirthModal(catId, 'unknown');
        }
        await db.collection('users').doc(currentUser.uid).collection('inventory').doc(itemId).delete();
        modal.classList.remove('active');
        document.getElementById('inventory-btn').click();
      }));
    }

    // Глобальное делегирование
    document.addEventListener('click', (e) => {
      if (e.target.classList.contains('modal')) { e.target.classList.remove('active'); return; }
      const catLink = e.target.closest('[data-cat-id]');
      if (catLink) { openCatView(catLink.dataset.catId); return; }
      if (e.target.id === 'breed-btn') { startBreeding(); return; }
      const birthAction = e.target.closest('[data-action="accept-birth"]');
      if (birthAction) { openBirthModal(birthAction.dataset.motherId, birthAction.dataset.fatherId); return; }
      const trackAction = e.target.closest('[data-action="track-pregnancy"]');
      if (trackAction) { openTrackingModal(new Date(trackAction.dataset.end)); return; }
      const doorAction = e.target.closest('[data-action="open-door"]');
      if (doorAction) { openDoor(doorAction.dataset.catId); return; }
    });

    // Сообщения
    document.getElementById('msg-btn').addEventListener('click', async () => {
      const modal = document.getElementById('message-modal');
      const content = document.getElementById('message-modal-content');
      const notifs = await db.collection('users').doc(currentUser.uid).collection('notifications').where('read','==',false).get();
      let html = '<h2>📬 Уведомления</h2>';
      notifs.forEach(doc => {
        const n = doc.data();
        html += `<div class="bg-gray-700 p-2 rounded mb-2 flex justify-between items-center"><span>${n.message}</span>`;
        if (n.type==='pregnancy_tracking') html += `<button data-action="track-pregnancy" data-end="${n.pregnancyEnd.toDate().toISOString()}" class="text-blue-400">👁</button>`;
        else if (n.type==='birth_ready') html += `<button data-action="accept-birth" data-mother-id="${n.motherId}" data-father-id="${n.fatherId}" class="text-pink-400">💥</button>`;
        else if (n.type==='walk_return') html += `<button data-action="open-door" data-cat-id="${n.catId}" class="text-green-400">🚪</button>`;
        html += `</div>`;
      });
      html += '<button class="btn btn-gray mt-2" onclick="document.getElementById(\'message-modal\').classList.remove(\'active\')">Закрыть</button>';
      content.innerHTML = html;
      modal.classList.add('active');
    });

    // Периодическая проверка состояний
    setInterval(async () => {
      if (!currentUser) return;
      const now = new Date();
      // Проверка беременностей
      const preg = await db.collection('cats').where('owner','==',currentUser.uid).where('isPregnant','==',true).get();
      preg.forEach(async doc => {
        const d = doc.data();
        if (d.pregnancyEnd?.toDate() <= now) {
          const exist = await db.collection('users').doc(currentUser.uid).collection('notifications')
            .where('motherId','==',doc.id).where('type','==','birth_ready').get();
          if (exist.empty) {
            await db.collection('users').doc(currentUser.uid).collection('notifications').add({
              type:'birth_ready', message:`💥 ${d.name} готова родить!`, motherId:doc.id, fatherId:'unknown',
              read:false, timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
          }
        }
      });
      // Проверка уставших после родов/прогулки
      const tired = await db.collection('cats').where('owner','==',currentUser.uid).where('tiredUntil','!=',null).get();
      tired.forEach(async doc => {
        if (doc.data().tiredUntil?.toDate() <= now) {
          await doc.ref.update({ state: 'лежит', tiredUntil: null });
        }
      });
      // Проверка гуляющих
      checkWalkingReturns();
    }, 10000);

    document.getElementById('logout-btn').addEventListener('click', () => auth.signOut());
    console.log('🐱 Генетика котов v2.0 запущена');
  </script>
</body>
</html>
