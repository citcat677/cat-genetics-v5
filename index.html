<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐱 Генетика котов</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); align-items: center; justify-content: center; z-index: 100; }
    .modal.active { display: flex; }
    .notification-dot { position: relative; }
    .notification-dot::after { content: ''; position: absolute; top: -5px; right: -5px; width: 12px; height: 12px; background: red; border-radius: 50%; display: none; }
    .notification-dot.has-notifications::after { display: block; }
    .cat-link { cursor: pointer; text-decoration: underline; color: #2563eb; }
  </style>
</head>
<body class="bg-gray-100">
<div id="app" class="max-w-6xl mx-auto p-4"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
  // ================== КОНФИГ ==================
  const firebaseConfig = {
    apiKey: "AIzaSyBSO84yoAhHUCIejdf9mmo89oXIYeeSFfs",
    authDomain: "cat-genetics-v6.firebaseapp.com",
    projectId: "cat-genetics-v6",
    storageBucket: "cat-genetics-v6.firebasestorage.app",
    messagingSenderId: "302978224196",
    appId: "1:302978224196:web:106b02fc1157bd17fdac11",
    measurementId: "G-HKJQVRPCZJ"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  const COAT_COLORS = ['черный', 'белый', 'рыжий', 'серый'];
  const EYE_COLORS = ['голубой', 'зеленый', 'желтый'];
  const PATTERNS = ['однотонный', 'полосатый', 'крапчатый', 'поинт'];
  const CHARACTERS = ['добрый', 'игривый', 'агрессивный', 'ласковый', 'дружелюбный', 'ленивый'];
  const FEMALE_NAMES = ['Дымка', 'Снежка', 'Люся', 'Мила', 'Пуша', 'Луна', 'Зайка'];
  const MALE_NAMES = ['Персик', 'Рыжик', 'Барсик', 'Уголёк', 'Кузя', 'Симба'];
  function randomItem(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  function inheritCoat(c1, c2) { return Math.random() < 0.5 ? c1 : c2; }
  function inheritEyes(e1, e2) { return Math.random() < 0.5 ? e1 : e2; }

  let notifications = [];
  function addNotification(msg, opts = {}) {
    const notif = { message: msg, read: false, time: Date.now(), ...opts };
    notifications.unshift(notif);
    updateNotifDot();
    return notif;
  }
  function updateNotifDot() {
    const dot = document.getElementById('notif-dot');
    if (!dot) return;
    if (notifications.some(n => !n.read)) dot.classList.add('has-notifications');
    else dot.classList.remove('has-notifications');
  }

  // Игровое время
  let gameTimeInterval, serverTimeOffset = 0;
  async function getServerTime() {
    const snap = await db.collection('server').doc('time').get();
    if (snap.exists) return snap.data().timestamp;
    const now = Date.now();
    await db.collection('server').doc('time').set({ timestamp: now });
    return now;
  }
  function startClock() {
    if (gameTimeInterval) clearInterval(gameTimeInterval);
    gameTimeInterval = setInterval(() => {
      const realNow = Date.now() + serverTimeOffset;
      const gameSeconds = Math.floor(realNow / 1000) * 60;
      const totalMinutes = gameSeconds % (24 * 60);
      const h = Math.floor(totalMinutes / 60);
      const m = totalMinutes % 60;
      const icon = (h >= 21 || h < 6) ? '🌃' : '☀️';
      const el = document.getElementById('game-time');
      if (el) el.innerHTML = `⌚ ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')} ${icon}`;
    }, 1000);
  }

  function showLanding() {
    document.getElementById('app').innerHTML = `
      <div class="flex flex-col items-center justify-center min-h-screen">
        <h1 class="text-5xl font-bold text-purple-700 mb-6">🐱 Генетика котов</h1>
        <p class="text-xl mb-8">Добро пожаловать!</p>
        <button id="play-btn" class="bg-purple-600 text-white px-10 py-4 rounded-full text-2xl font-bold">Играть</button>
      </div>`;
    document.getElementById('play-btn').onclick = showAuthForm;
  }

  function showAuthForm() {
    document.getElementById('app').innerHTML = `
      <div class="max-w-md mx-auto mt-20 bg-white p-6 rounded-lg shadow">
        <h2 class="text-2xl font-bold mb-4">Вход / Регистрация</h2>
        <input id="email" type="email" placeholder="Email" class="w-full border p-2 mb-2 rounded">
        <input id="password" type="password" placeholder="Пароль" class="w-full border p-2 mb-4 rounded">
        <button id="login-btn" class="bg-blue-500 text-white px-4 py-2 rounded mr-2">Войти</button>
        <button id="signup-btn" class="bg-green-500 text-white px-4 py-2 rounded">Регистрация</button>
        <p id="auth-error" class="text-red-500 mt-2 text-sm"></p>
      </div>`;
    document.getElementById('login-btn').onclick = () => {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      auth.signInWithEmailAndPassword(email, password)
        .then(() => {
          const uid = auth.currentUser.uid;
          db.collection('users').doc(uid).get().then(doc => {
            if (!doc.exists) {
              db.collection('users').doc(uid).set({ coins: 20, catsBought: 0 });
            }
          });
        })
        .catch(e => document.getElementById('auth-error').innerText = e.message);
    };
    document.getElementById('signup-btn').onclick = () => {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      auth.createUserWithEmailAndPassword(email, password)
        .then(() => {
          db.collection('users').doc(auth.currentUser.uid).set({ coins: 20, catsBought: 0 });
        })
        .catch(e => document.getElementById('auth-error').innerText = e.message);
    };
  }

  // ================== ИГРОВОЙ ИНТЕРФЕЙС ==================
  function showGame(user) {
    const uid = user.uid;
    const isAdmin = user.email === 'katya2013sara1981@gmail.com';
    getServerTime().then(st => { serverTimeOffset = st - Date.now(); startClock(); });

    document.getElementById('app').innerHTML = `
      <div id="main-interface" class="bg-white rounded-lg shadow p-4">
        <div class="flex justify-between items-center mb-4">
          <h1 class="text-2xl font-bold">🐱 Коты</h1>
          <div class="flex items-center gap-3">
            <div id="game-time" class="bg-gray-200 px-3 py-1 rounded-full text-sm font-mono"></div>
            <span id="coins-display" class="font-semibold"></span>
            <div id="notif-dot" class="notification-dot">
              <button id="messages-btn" class="bg-blue-400 text-white px-3 py-1 rounded">✉️</button>
            </div>
            ${isAdmin ? '<button id="reset-btn" class="bg-red-500 text-white px-3 py-1 rounded" title="Удалить свой аккаунт и данные">🌹</button>' : ''}
            ${isAdmin ? '<button id="nuke-btn" class="bg-black text-white px-3 py-1 rounded" title="Удалить все данные всех игроков">🛢</button>' : ''}
            <button id="delete-account-btn" class="bg-gray-700 text-white px-3 py-1 rounded" title="Удалить свой аккаунт">🗑️</button>
            <button id="logout-btn" class="bg-gray-500 text-white px-3 py-1 rounded">Выйти</button>
          </div>
        </div>
        <div class="flex border-b mb-4">
          <button class="tab-link px-4 py-2 font-semibold bg-gray-200" data-tab="home">🏠 Дом</button>
          <button class="tab-link px-4 py-2 font-semibold" data-tab="street">🌳 Улица</button>
          <button class="tab-link px-4 py-2 font-semibold" data-tab="breeding">🧬 Разведение</button>
        </div>
        <div id="home-content" class="tab-content active"></div>
        <div id="street-content" class="tab-content"></div>
        <div id="breeding-content" class="tab-content"></div>
      </div>
      <!-- Модальные окна -->
      <div id="cat-modal" class="modal">
        <div class="bg-white p-6 rounded-lg max-w-md w-full relative">
          <button onclick="closeModal('cat-modal')" class="absolute top-2 right-2 text-xl">✕</button>
          <div id="cat-modal-content"></div>
        </div>
      </div>
      <div id="confirm-modal" class="modal">
        <div class="bg-white p-6 rounded-lg max-w-md w-full text-center">
          <div id="confirm-message" class="mb-4"></div>
          <div class="flex gap-2 justify-center">
            <button id="confirm-yes-btn" class="bg-green-500 text-white px-6 py-2 rounded">✅</button>
            <button id="confirm-no-btn" class="bg-gray-300 px-6 py-2 rounded">Отмена</button>
          </div>
        </div>
      </div>
      <div id="messages-modal" class="modal">
        <div class="bg-white p-6 rounded-lg max-w-md w-full relative">
          <button onclick="closeModal('messages-modal')" class="absolute top-2 right-2 text-xl">✕</button>
          <h2 class="text-xl font-bold mb-4">Сообщения</h2>
          <div id="messages-list"></div>
        </div>
      </div>
      <div id="naming-modal" class="modal">
        <div class="bg-white p-6 rounded-lg max-w-md w-full relative">
          <h2 class="text-xl font-bold mb-4">🐱 Назовите котёнка!</h2>
          <div id="naming-details"></div>
          <input id="naming-input" type="text" placeholder="Введите имя" class="border p-2 w-full mt-2">
          <div class="flex gap-2 mt-4">
            <button id="save-name-btn" class="bg-green-500 text-white px-4 py-2 rounded">✅ Сохранить</button>
          </div>
        </div>
      </div>
      <div id="error-modal" class="modal">
        <div class="bg-white p-6 rounded-lg max-w-md w-full text-center">
          <h2 class="text-xl font-bold mb-4">Ошибка</h2>
          <div id="error-message" class="mb-4"></div>
          <button onclick="closeModal('error-modal')" class="bg-red-500 text-white px-6 py-2 rounded">❌</button>
        </div>
      </div>
    `;

    // Данные пользователя
    db.collection('users').doc(uid).onSnapshot(doc => {
      if (!doc.exists) return;
      const d = doc.data();
      document.getElementById('coins-display').innerText = `💰 ${d.coins || 0}`;
      updateBuyButton(d.catsBought || 0);
    });

    function updateBuyButton(bought) {
      const btn = document.getElementById('buy-cat-btn');
      if (!btn) return;
      if (bought === 0) { btn.innerText = '+ Купить кота (бесплатно)'; btn.disabled = false; }
      else if (bought === 1) { btn.innerText = '+ Купить кота (10💰)'; btn.disabled = false; }
      else if (bought === 2) { btn.innerText = '+ Купить кота (100💰)'; btn.disabled = false; }
      else { btn.innerText = 'Нет котов'; btn.disabled = true; }
    }

    // Переключение вкладок
    document.querySelectorAll('.tab-link').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-link').forEach(b => b.classList.remove('bg-gray-200'));
        btn.classList.add('bg-gray-200');
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.getElementById(btn.dataset.tab + '-content').classList.add('active');
        if (btn.dataset.tab === 'breeding') loadBreedingTab();
      });
    });

    // Кнопки админа
    document.getElementById('delete-account-btn').onclick = async () => {
      if (confirm('Удалить ваш аккаунт?')) {
        await db.collection('users').doc(uid).delete();
        await auth.currentUser.delete();
        location.reload();
      }
    };
    if (isAdmin) {
      document.getElementById('reset-btn').onclick = async () => {
        if (confirm('Удалить свой аккаунт и все данные?')) {
          await resetAllData();
          await auth.currentUser.delete();
          location.reload();
        }
      };
      document.getElementById('nuke-btn').onclick = async () => {
        if (confirm('Удалить ВСЕ данные всех игроков?')) {
          await resetAllData();
          alert('Все данные удалены.');
          location.reload();
        }
      };
    }

    async function resetAllData() {
      const cols = ['cats', 'users', 'park', 'sales', 'trades', 'server'];
      for (const col of cols) {
        const snap = await db.collection(col).get();
        const batch = db.batch();
        snap.forEach(doc => batch.delete(doc.ref));
        await batch.commit();
      }
    }

    // Дом
    function renderHome() {
      const container = document.getElementById('home-content');
      container.innerHTML = `
        <h2 class="font-bold text-lg mb-2">Мои коты</h2>
        <div id="my-cats" class="space-y-2"></div>
        <button id="buy-cat-btn" class="mt-2 bg-purple-500 text-white px-3 py-1 rounded"></button>
      `;
      document.getElementById('buy-cat-btn').onclick = buyCat;
    }

    async function buyCat() {
      const userDoc = await db.collection('users').doc(uid).get();
      const d = userDoc.data();
      const bought = d.catsBought || 0;
      const coins = d.coins || 0;
      const price = bought === 0 ? 0 : bought === 1 ? 10 : 100;
      if (bought >= 3) { showError('Вы раскупили всех котов.'); return; }
      if (coins < price) { showError('Недостаточно монет.'); return; }
      if (price > 0) await db.collection('users').doc(uid).update({ coins: firebase.firestore.FieldValue.increment(-price) });
      const newId = (await db.collection('cats').get()).size + 1;
      const newCat = {
        owner: uid, name: '', gender: Math.random() < 0.5 ? 'кошка' : 'кот', age: 'взрослый', id: newId,
        coatColor: randomItem(COAT_COLORS), eyeColor: randomItem(EYE_COLORS), pattern: randomItem(PATTERNS),
        character: randomItem(CHARACTERS), isPregnant: false, state: 'лежит',
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      };
      openNaming(newCat);
      await db.collection('users').doc(uid).update({ catsBought: bought + 1 });
    }

    function openNaming(catData) {
      document.getElementById('naming-details').innerHTML = `
        Пол: {${catData.gender === 'кот' ? 'мальчик' : 'девочка'}}<br>
        Окрас: ${catData.coatColor}, ${catData.pattern}<br>
        Глаза: ${catData.eyeColor}<br>
        Характер: ${catData.character}
      `;
      document.getElementById('naming-input').value = '';
      document.getElementById('naming-modal').classList.add('active');
      document.getElementById('save-name-btn').onclick = async () => {
        const name = document.getElementById('naming-input').value.trim();
        if (!name) { alert('Введите имя!'); return; }
        await db.collection('cats').add({ ...catData, name });
        document.getElementById('naming-modal').classList.remove('active');
      };
    }

    function showError(msg) {
      document.getElementById('error-message').innerText = msg;
      document.getElementById('error-modal').classList.add('active');
    }
    function showConfirm(msg, onConfirm) {
      document.getElementById('confirm-message').innerText = msg;
      document.getElementById('confirm-modal').classList.add('active');
      document.getElementById('confirm-yes-btn').onclick = () => {
        document.getElementById('confirm-modal').classList.remove('active');
        onConfirm();
      };
      document.getElementById('confirm-no-btn').onclick = () => {
        document.getElementById('confirm-modal').classList.remove('active');
      };
    }
    window.closeModal = (id) => document.getElementById(id).classList.remove('active');

    // Мои коты
    db.collection('cats').where('owner', '==', uid).onSnapshot(snap => {
      const cats = [];
      snap.forEach(doc => cats.push({ id: doc.id, ...doc.data() }));
      const myCatsDiv = document.getElementById('my-cats');
      if (myCatsDiv) {
        myCatsDiv.innerHTML = cats.length ? cats.map(c => `
          <div class="border p-2 rounded flex items-center gap-2">
            <span class="cat-link" onclick="openCatView('${c.id}')">🐱 ${c.name}</span>
            {${c.gender === 'кот' ? 'мальчик' : 'девочка'}} [${String(c.id).padStart(4, '0')}] ${c.age} <span class="text-sm">(${c.state})</span>
          </div>
        `).join('') : '<p>Нет котов.</p>';
      }
    });

    // Улица
    db.collection('cats').onSnapshot(snap => {
      const cats = [];
      snap.forEach(doc => cats.push(doc.data()));
      const streetDiv = document.getElementById('street-content');
      if (streetDiv) {
        streetDiv.innerHTML = '<h2 class="font-bold text-lg mb-2">Все коты</h2>' + cats.map(c => `
          <div class="border p-2 rounded text-sm">🐱 ${c.name} {${c.gender === 'кот' ? 'мальчик' : 'девочка'}} [${String(c.id).padStart(4, '0')}] – ${c.coatColor}, ${c.eyeColor}</div>
        `).join('');
      }
    });

    // Просмотр кота
    window.openCatView = async (catId) => {
      const doc = await db.collection('cats').doc(catId).get();
      if (!doc.exists) return;
      const c = doc.data();
      document.getElementById('cat-modal-content').innerHTML = `
        <h2 class="text-xl font-bold mb-4">${c.name}</h2>
        <p><strong>Пол:</strong> {${c.gender === 'кот' ? 'мальчик' : 'девочка'}}</p>
        <p><strong>ID:</strong> [${String(c.id).padStart(4, '0')}]</p>
        <p><strong>Возраст:</strong> ${c.age}</p>
        <p><strong>Основной цвет:</strong> ${c.coatColor}</p>
        <p><strong>Окрас:</strong> ${c.pattern || 'нет'}</p>
        <p><strong>Цвет глаз:</strong> ${c.eyeColor}</p>
        <p><strong>Характер:</strong> ${c.character}</p>
        <p><strong>Состояние:</strong> ${c.state || 'лежит'}</p>
        ${c.isPregnant ? '<p class="text-pink-500 font-semibold">Беременна</p>' : ''}
        ${c.mutation ? `<p><strong>Мутация:</strong> ${c.mutation}</p>` : ''}
        ${c.secondaryColor ? `<p><strong>Второстепенный цвет:</strong> ${c.secondaryColor}</p>` : ''}
      `;
      document.getElementById('cat-modal').classList.add('active');
    };

    // Разведение
    function loadBreedingTab() {
      const container = document.getElementById('breeding-content');
      container.innerHTML = `
        <h2 class="font-bold text-lg mb-2">Разведение</h2>
        <div class="flex gap-4">
          <div><label>Мать {девочка}</label><select id="mother-select" class="border p-1 w-full"></select></div>
          <div><label>Отец {мальчик}</label><select id="father-select" class="border p-1 w-full"></select></div>
        </div>
        <button id="breed-btn" class="mt-4 bg-pink-500 text-white px-4 py-2 rounded">Скрестить</button>
      `;
      db.collection('cats').where('owner', '==', uid).get().then(snap => {
        const cats = [];
        snap.forEach(doc => cats.push({ id: doc.id, ...doc.data() }));
        const mothers = cats.filter(c => c.gender === 'кошка' && c.age !== 'новорождённый' && c.age !== 'котёнок');
        const fathers = cats.filter(c => c.gender === 'кот' && c.age !== 'новорождённый' && c.age !== 'котёнок');
        document.getElementById('mother-select').innerHTML = '<option value="">-- выбери --</option>' + mothers.map(c => `<option value="${c.id}">${c.name} {девочка}</option>`).join('');
        document.getElementById('father-select').innerHTML = '<option value="">-- выбери --</option>' + fathers.map(c => `<option value="${c.id}">${c.name} {мальчик}</option>`).join('');
      });
      document.getElementById('breed-btn').onclick = async () => {
        const motherId = document.getElementById('mother-select').value;
        const fatherId = document.getElementById('father-select').value;
        if (!motherId || !fatherId) { showError('Выберите мать и отца.'); return; }
        const [mSnap, fSnap] = await Promise.all([
          db.collection('cats').doc(motherId).get(),
          db.collection('cats').doc(fatherId).get()
        ]);
        if (!mSnap.exists || !fSnap.exists) return;
        const m = mSnap.data(), f = fSnap.data();
        if (m.gender !== 'кошка' || f.gender !== 'кот') { showError('Мать должна быть кошкой, отец — котом.'); return; }
        const userDoc = await db.collection('users').doc(uid).get();
        if (userDoc.data().coins < 10) { showError('Недостаточно монет (нужно 10).'); return; }
        showConfirm(`Ваша кошка ${m.name} забеременеет. После подтверждения мы отправим письмо с отслеживанием.`, async () => {
          await db.collection('users').doc(uid).update({ coins: firebase.firestore.FieldValue.increment(-10) });
          const pregnancyEnd = Date.now() + 300000;
          await db.collection('cats').doc(motherId).update({
            isPregnant: true,
            pregnancyStart: firebase.firestore.FieldValue.serverTimestamp(),
            pregnancyEnd: pregnancyEnd,
            fatherId: fatherId,
            state: 'беременна'
          });
          addNotification(`🐱 ${m.name} забеременела! Родит через 5 минут. <button class="text-blue-600 underline" onclick="viewPregnancy('${motherId}')">👁</button>`, { type: 'pregnancy', catId: motherId, pregnancyEnd });
        });
      };
    }

    // Отслеживание родов
    setInterval(async () => {
      const now = Date.now();
      const snap = await db.collection('cats').where('isPregnant', '==', true).get();
      for (const doc of snap.docs) {
        const cat = doc.data();
        if (cat.pregnancyEnd && now >= cat.pregnancyEnd) {
          if (!localStorage.getItem(`birth_notified_${cat.id}`)) {
            localStorage.setItem(`birth_notified_${cat.id}`, '1');
            addNotification(`У кошки ${cat.name} начались роды! Нажмите <button class="text-blue-600 underline" onclick="acceptBirth('${cat.id}')">💥 Принять роды</button>`, { type: 'birth', catId: cat.id, birthTime: now });
          }
          // Авто-роды через 10 минут
          const birthNotified = parseInt(localStorage.getItem(`birth_notified_${cat.id}`));
          if (birthNotified && now - birthNotified > 600000) {
            await performBirth(cat.id);
          }
        }
      }
    }, 5000);

    window.viewPregnancy = (catId) => openCatView(catId);
    window.acceptBirth = async (catId) => await performBirth(catId);

    async function performBirth(catId) {
      const catDoc = await db.collection('cats').doc(catId).get();
      if (!catDoc.exists) return;
      const cat = catDoc.data();
      if (!cat.isPregnant) return;
      const fatherId = cat.fatherId;
      let fatherData = {};
      if (fatherId) {
        const fSnap = await db.collection('cats').doc(fatherId).get();
        if (fSnap.exists) fatherData = fSnap.data();
      }
      // Один котёнок для теста
      const coat = inheritCoat(cat.coatColor, fatherData.coatColor || cat.coatColor);
      const eye = inheritEyes(cat.eyeColor, fatherData.eyeColor || cat.eyeColor);
      const gender = Math.random() < 0.5 ? 'кошка' : 'кот';
      const newId = (await db.collection('cats').get()).size + 1;
      const kitten = {
        owner: cat.owner,
        name: '',
        gender,
        age: 'новорождённый',
        id: newId,
        coatColor: coat,
        eyeColor: eye,
        pattern: randomItem(PATTERNS),
        character: randomItem(CHARACTERS),
        isPregnant: false,
        state: 'лежит',
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        motherId: cat.id,
        fatherId: cat.fatherId
      };
      openNaming(kitten);
      await db.collection('cats').doc(catId).update({
        isPregnant: false,
        pregnancyStart: null,
        pregnancyEnd: null,
        state: 'уставшая',
        litterCount: firebase.firestore.FieldValue.increment(1)
      });
      // Удаляем уведомления
      notifications = notifications.filter(n => n.catId !== catId);
      localStorage.removeItem(`birth_notified_${catId}`);
      updateNotifDot();
    }

    // Сообщения
    document.getElementById('messages-btn').onclick = () => {
      document.getElementById('messages-list').innerHTML = notifications.length ? notifications.map(n => `<p>${n.message}</p>`).join('') : 'Нет сообщений.';
      notifications.forEach(n => n.read = true);
      updateNotifDot();
      document.getElementById('messages-modal').classList.add('active');
    };

    document.getElementById('logout-btn').onclick = () => auth.signOut();
    renderHome();
  }

  auth.onAuthStateChanged(user => {
    if (user) showGame(user);
    else showLanding();
  });
</script>
</body>
</html>
