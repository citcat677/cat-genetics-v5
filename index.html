<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генетика котов</title>
    <script src="https://cdn.tailwindcss.com">
    </script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js">
    </script>
    <style>
        :root {
            --bg: #1a1a2e;
            --panel: #16213e;
            --accent: #e94560;
            --text: #eee;
            --gold: #f0c040;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
        }
        body.mobile {
            font-size: 14px;
        }
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: var(--panel);
            border-radius: 16px;
            padding: 24px;
            max-width: 90vw;
            max-height: 85vh;
            overflow-y: auto;
            border: 2px solid var(--accent);
            box-shadow: 0 0 30px rgba(233, 68, 96, 0.3);
        }
        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
        }
        .btn:hover:not(:disabled) {
            filter: brightness(1.2);
            transform: translateY(-1px);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .tab-btn {
            background: transparent;
            border: 2px solid var(--accent);
            color: var(--text);
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }
        .tab-btn.active {
            background: var(--accent);
            color: white;
        }
        .cat-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        .cat-card:hover {
            border-color: var(--accent);
            background: rgba(233, 68, 96, 0.1);
        }
        .mini-game-area {
            width: 100%;
            height: 120px;
            background: #0a0a1a;
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            margin: 12px 0;
        }
        .golden-ball {
            width: 30px;
            height: 30px;
            background: radial-gradient(circle, #ffd700, #b8860b);
            border-radius: 50%;
            position: absolute;
            cursor: pointer;
            animation: fall linear forwards;
        }
        @keyframes fall {
            from {
                transform: translateY(-40px);
            }
            to {
                transform: translateY(130px);
            }
        }
        .spark {
            width: 20px;
            height: 20px;
            background: #ffff88;
            border-radius: 50%;
            position: absolute;
            cursor: pointer;
            box-shadow: 0 0 15px #ffff88;
            animation: sparkFloat 2s infinite alternate;
        }
        @keyframes sparkFloat {
            0% {
                transform: translate(0, 0);
            }
            100% {
                transform: translate(20px, -20px);
            }
        }
        .timer-bar {
            height: 8px;
            background: #333;
            border-radius: 4px;
            overflow: hidden;
        }
        .timer-fill {
            height: 100%;
            background: var(--accent);
            transition: width 1s linear;
        }
        @media (max-width: 768px) {
            .modal-content {
                max-width: 95vw;
                padding: 16px;
            }
            .tab-btn {
                padding: 4px 10px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <!-- Верхняя панель -->
    <div id="top-bar" class="flex items-center justify-between p-3 bg-opacity-90 sticky top-0 z-50" style="background:var(--panel)">
        <div class="flex items-center gap-2">
            <span id="game-time" class="text-lg font-bold">☀️ 12:00</span>
            <span id="coins-display" class="ml-4 text-yellow-400">🪙 0</span>
        </div>
        <div class="flex items-center gap-2">
            <span id="player-nick" class="text-sm"></span>
            <button id="notif-btn" class="btn text-sm">✉️ <span id="notif-count" class="bg-red-500 rounded-full px-1.5 py-0.5 text-xs">0</span></button>
            <button id="inventory-btn" class="btn text-sm">🎒</button>
            <button id="settings-btn" class="btn text-sm">⚙️</button>
            <button id="logout-btn" class="btn text-sm">Выйти</button>
        </div>
    </div>

    <!-- Основной контент -->
    <div id="main-content" class="p-4 max-w-6xl mx-auto" style="display:none">
        <!-- Вкладки -->
        <div id="tabs-container" class="flex flex-wrap gap-2 mb-4">
            <button class="tab-btn active" data-tab="home">🏠 Дом</button>
            <button class="tab-btn" data-tab="allcats">🐱 Все коты</button>
            <button class="tab-btn" data-tab="breed">💕 Разведение</button>
            <button class="tab-btn" data-tab="park">🌳 Парк</button>
            <button class="tab-btn" data-tab="castle">🏰 Замок</button>
            <button class="tab-btn" data-tab="forest">🌲 Лес</button>
            <button class="tab-btn" data-tab="shop">🛒 Магазин</button>
            <button class="tab-btn" data-tab="trade">🤝 Обмен</button>
            <button class="tab-btn" data-tab="admin" id="admin-tab" style="display:none">⚙️ Админ</button>
        </div>
        <div id="tab-content"></div>
    </div>

    <!-- Экран авторизации -->
    <div id="auth-screen" class="flex items-center justify-center min-h-screen">
        <div class="bg-opacity-90 p-8 rounded-2xl shadow-2xl w-full max-w-md" style="background:var(--panel)">
            <h2 class="text-2xl font-bold text-center mb-6">🐱 Генетика котов</h2>
            <div id="auth-form">
                <input id="auth-nick" type="text" placeholder="Ник (только при регистрации)" class="w-full p-3 mb-3 rounded-lg bg-gray-800 text-white border border-gray-600">
                <input id="auth-email" type="email" placeholder="Email" class="w-full p-3 mb-3 rounded-lg bg-gray-800 text-white border border-gray-600">
                <input id="auth-password" type="password" placeholder="Пароль" class="w-full p-3 mb-4 rounded-lg bg-gray-800 text-white border border-gray-600">
                <div class="flex gap-3">
                    <button id="login-btn" class="btn flex-1">Войти</button>
                    <button id="register-btn" class="btn flex-1">Регистрация</button>
                </div>
                <p id="auth-error" class="text-red-400 mt-3 text-sm text-center"></p>
            </div>
        </div>
    </div>

    <!-- Модальные окна -->
    <div id="modal-cat" class="modal"><div class="modal-content" id="modal-cat-content"></div></div>
    <div id="modal-generic" class="modal"><div class="modal-content" id="modal-generic-content"></div></div>
    <div id="modal-minigame" class="modal"><div class="modal-content" id="modal-minigame-content"></div></div>

    <script>
        // ============ FIREBASE INIT ============
        const firebaseConfig = {
            apiKey: "AIzaSyC2XXT7_xrIQTN_0sRoE3Rq-kDtaNCqmWY",
            authDomain: "cat-genetics-v13.firebaseapp.com",
            projectId: "cat-genetics-v13",
            storageBucket: "cat-genetics-v13.firebasestorage.app",
            messagingSenderId: "359189498139",
            appId: "1:359189498139:web:8b1fed573eff578a512bbe",
            measurementId: "G-69F67NMR89"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        db.settings({ merge: true });

        // ============ GLOBALS ============
        let currentUser = null;
        let currentUserData = null;
        let isProcessing = false;
        const ADMIN_EMAIL = 'katya2013sara1981@gmail.com';
        let activeTab = 'home';
        let allCatsCache = [];
        let allUsersCache = [];
        let unsubscribes = [];

        // ============ UTILS ============
        function generateId4() {
            return String(Math.floor(Math.random() * 9000) + 1000);
        }

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${m}:${s.toString().padStart(2,'0')}`;
        }

        function getGameTime() {
            const now = new Date();
            const totalMinutes = Math.floor(now.getTime() / 1000);
            const gameTotal = totalMinutes;
            const gameHour = gameTotal % 24;
            const gameMin = Math.floor((now.getTime() / 1000) % 60);
            const isDay = gameHour >= 6 && gameHour < 18;
            return {
                icon: isDay ? '☀️' : '🌃',
                timeStr: `${gameHour.toString().padStart(2,'0')}:${gameMin.toString().padStart(2,'0')}`,
                hour: gameHour,
                minute: gameMin
            };
        }

        async function getNextCatId() {
            const ref = db.collection('server').doc('counters');
            const doc = await ref.get();
            if (!doc.exists) {
                await ref.set({ nextCatId: 1 });
                return '0001';
            }
            const data = doc.data();
            const id = data.nextCatId || 1;
            await ref.update({ nextCatId: id + 1 });
            return String(id).padStart(4, '0');
        }

        async function getNextPlayerId() {
            const ref = db.collection('server').doc('playerCounter');
            const doc = await ref.get();
            if (!doc.exists) {
                await ref.set({ nextPlayerId: 1 });
                return 1;
            }
            const data = doc.data();
            const id = data.nextPlayerId || 1;
            await ref.update({ nextPlayerId: id + 1 });
            return id;
        }

        // ============ AUTH ============
        document.getElementById('login-btn').addEventListener('click', async () => {
            if (isProcessing) return;
            isProcessing = true;
            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-password').value;
            try {
                await auth.signInWithEmailAndPassword(email, password);
                document.getElementById('auth-error').textContent = '';
            } catch (e) {
                document.getElementById('auth-error').textContent = 'Ошибка входа: ' + e.message;
            }
            isProcessing = false;
        });

        document.getElementById('register-btn').addEventListener('click', async () => {
            if (isProcessing) return;
            isProcessing = true;
            const nick = document.getElementById('auth-nick').value.trim();
            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-password').value;
            if (!nick) {
                document.getElementById('auth-error').textContent = 'Введите ник!';
                isProcessing = false;
                return;
            }
            try {
                const cred = await auth.createUserWithEmailAndPassword(email, password);
                const playerId = await getNextPlayerId();
                await db.collection('users').doc(cred.user.uid).set({
                    nick: nick,
                    email: email,
                    coins: 100,
                    playerId: playerId,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                document.getElementById('auth-error').textContent = '';
            } catch (e) {
                document.getElementById('auth-error').textContent = 'Ошибка регистрации: ' + e.message;
            }
            isProcessing = false;
        });

        document.getElementById('logout-btn').addEventListener('click', () => auth.signOut());

        document.getElementById('settings-btn').addEventListener('click', () => {
            const modal = document.getElementById('modal-generic');
            const content = document.getElementById('modal-generic-content');
            content.innerHTML = `
                <h3 class="text-xl font-bold mb-4">Настройки</h3>
                <p class="mb-3">Выберите устройство:</p>
                <div class="flex gap-3">
                    <button class="btn device-btn" data-device="mobile">📱 Мобильное</button>
                    <button class="btn device-btn" data-device="desktop">🖥️ Десктоп</button>
                </div>
                <button class="btn mt-4 close-modal">Закрыть</button>
            `;
            modal.classList.add('active');
            content.querySelectorAll('.device-btn').forEach(b => {
                b.addEventListener('click', (e) => {
                    const device = e.target.dataset.device;
                    if (device === 'mobile') {
                        document.body.classList.add('mobile');
                        localStorage.setItem('device', 'mobile');
                    } else {
                        document.body.classList.remove('mobile');
                        localStorage.setItem('device', 'desktop');
                    }
                    modal.classList.remove('active');
                });
            });
            content.querySelector('.close-modal').addEventListener('click', () => modal.classList
                .remove('active'));
        });

        // ============ AUTH STATE ============
        auth.onAuthStateChanged(async (user) => {
            unsubscribeAll();
            if (user) {
                currentUser = user;
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                const userDoc = await db.collection('users').doc(user.uid).get();
                if (userDoc.exists) {
                    currentUserData = userDoc.data();
                    document.getElementById('player-nick').textContent = currentUserData.nick;
                    document.getElementById('coins-display').textContent = '🪙 ' + currentUserData.coins;
                    if (user.email === ADMIN_EMAIL) {
                        document.getElementById('admin-tab').style.display = 'inline-block';
                    }
                    startGameLoop();
                    listenUserData();
                    loadTab('home');
                }
                if (localStorage.getItem('device') === 'mobile') {
                    document.body.classList.add('mobile');
                }
            } else {
                currentUser = null;
                currentUserData = null;
                document.getElementById('auth-screen').style.display = 'flex';
                document.getElementById('main-content').style.display = 'none';
                document.getElementById('admin-tab').style.display = 'none';
            }
        });

        function listenUserData() {
            if (!currentUser) return;
            const unsub = db.collection('users').doc(currentUser.uid).onSnapshot(doc => {
                if (doc.exists) {
                    currentUserData = doc.data();
                    document.getElementById('coins-display').textContent = '🪙 ' + currentUserData.coins;
                }
            });
            unsubscribes.push(unsub);
        }

        function unsubscribeAll() {
            unsubscribes.forEach(u => u());
            unsubscribes = [];
        }

        // ============ GAME LOOP ============
        function startGameLoop() {
            updateGameTime();
            setInterval(updateGameTime, 1000);
            setInterval(backgroundProcesses, 10000);
            backgroundProcesses();
        }

        function updateGameTime() {
            const gt = getGameTime();
            document.getElementById('game-time').textContent = gt.icon + ' ' + gt.timeStr;
        }

        async function backgroundProcesses() {
            if (!currentUser) return;
            try {
                const now = Date.now();
                const userCats = await db.collection('cats').where('ownerId', '==', currentUser.uid).get();
                for (const doc of userCats.docs) {
                    const cat = { id: doc.id, ...doc.data() };
                    let updated = false;
                    const updateData = {};
                    // Проверка котят
                    if (cat.age === 'котёнок' && cat.adultAt && cat.adultAt < now && cat.state !== 'врослый') {
                        updateData.age = 'взрослый';
                        updateData.state = 'лежит';
                        updated = true;
                        await addNotification(currentUser.uid, 'adult',
                            `🐱 ${cat.name} вырос!`, { catId: doc.id });
                    }
                    // Проверка уставших
                    if (cat.tiredUntil && cat.tiredUntil < now && cat.state === 'уставшая') {
                        updateData.state = 'лежит';
                        updateData.tiredUntil = null;
                        updated = true;
                    }
                    // Проверка беременных
                    if (cat.pregnancyEnd && cat.pregnancyEnd < now && cat.isPregnant && cat.state === 'беременна') {
                        const notifExists = await db.collection('users').doc(currentUser.uid).collection(
                            'notifications').where('type', '==', 'birth_ready').where('catId', '==', doc.id).get();
                        if (notifExists.empty) {
                            await addNotification(currentUser.uid, 'birth_ready',
                                `💥 ${cat.name} готова родить!`, { catId: doc.id, motherId: doc.id,
                                fatherId: cat.fatherId || null });
                        }
                    }
                    // Проверка прогулок
                    if (cat.walkReturnAt && cat.walkReturnAt < now && cat.state === 'гуляет') {
                        await addNotification(currentUser.uid, 'walk_return',
                            `🚪 ${cat.name} вернулся из парка!`, { catId: doc.id });
                        updateData.state = 'уставшая';
                        updateData.tiredUntil = now + 180000;
                        updateData.walkReturnAt = null;
                        updated = true;
                    }
                    if (cat.castleReturnAt && cat.castleReturnAt < now && cat.state === 'в поиске сокровищ') {
                        await addNotification(currentUser.uid, 'castle_return',
                            `🚪 ${cat.name} вернулся из замка!`, { catId: doc.id });
                        updateData.state = 'уставшая';
                        updateData.tiredUntil = now + 180000;
                        updateData.castleReturnAt = null;
                        updated = true;
                    }
                    if (cat.forestReturnAt && cat.forestReturnAt < now && cat.state === 'в лесу') {
                        await addNotification(currentUser.uid, 'forest_return',
                            `🚪 ${cat.name} вернулся из леса!`, { catId: doc.id });
                        updateData.state = 'уставшая';
                        updateData.tiredUntil = now + 120000;
                        updateData.forestReturnAt = null;
                        updated = true;
                    }
                    if (updated) {
                        await db.collection('cats').doc(doc.id).update(updateData);
                    }
                }
                // Боты-коты для админа
                if (currentUser.email === ADMIN_EMAIL) {
                    await botCatRespawn();
                }
                // Обновление замка
                await updateCastleEvent();
            } catch (e) {
                console.error('Background error:', e);
            }
        }

        async function addNotification(uid, type, text, data = {}) {
            await db.collection('users').doc(uid).collection('notifications').add({
                type,
                text,
                data,
                createdAt: Date.now(),
                read: false
            });
        }

        async function updateCastleEvent() {
            const ref = db.collection('server').doc('castleEvent');
            const doc = await ref.get();
            const now = Date.now();
            if (!doc.exists) {
                await ref.set({
                    isOpen: false,
                    nextOpenTime: now + 900000,
                    windowStart: 0
                });
                return;
            }
            const data = doc.data();
            if (data.isOpen && data.windowStart && now - data.windowStart > 300000) {
                await ref.update({ isOpen: false, nextOpenTime: now + 900000 });
            }
            if (!data.isOpen && data.nextOpenTime && now >= data.nextOpenTime) {
                await ref.update({ isOpen: true, windowStart: now, nextOpenTime: now + 900000 });
            }
        }

        async function botCatRespawn() {
            const salesSnap = await db.collection('sales').where('bot', '==', true).get();
            const botCount = salesSnap.size;
            if (botCount < 3) {
                const toAdd = 3 - botCount;
                for (let i = 0; i < toAdd; i++) {
                    const cat = generateRandomCat();
                    cat.name = 'Безымянный';
                    cat.ownerId = 'bot';
                    const catId = await getNextCatId();
                    cat.idNumber = catId;
                    const catRef = await db.collection('cats').add(cat);
                    const price = Math.floor(Math.random() * 51) + 10;
                    await db.collection('sales').add({
                        catId: catRef.id,
                        sellerId: 'bot',
                        price: price,
                        bot: true,
                        createdAt: Date.now(),
                        type: 'cat'
                    });
                }
            }
            // Удаление старых ботов
            const oldBots = await db.collection('sales').where('bot', '==', true).get();
            const hourAgo = Date.now() - 3600000;
            for (const doc of oldBots.docs) {
                if (doc.data().createdAt < hourAgo) {
                    await db.collection('cats').doc(doc.data().catId).delete();
                    await doc.ref.delete();
                }
            }
        }

        // ============ CAT GENERATION ============
        const colors = ['белый', 'чёрный', 'рыжий', 'серый', 'кремовый', 'шоколадный', 'лиловый', 'голубой'];
        const patterns = ['однотонный', 'полосатый', 'пятнистый', 'мраморный', 'черепаховый', 'колор-пойнт'];
        const eyeColors = ['зелёные', 'голубые', 'жёлтые', 'медные', 'красно-розовые'];
        const characters = ['ласковый', 'игривый', 'спокойный', 'независимый', 'озорной', 'мудрый'];

        function generateRandomCat(gender = null) {
            const sex = gender || (Math.random() < 0.5 ? 'male' : 'female');
            let mainColor = colors[Math.floor(Math.random() * colors.length)];
            let secondaryColor = Math.random() < 0.3 ? colors[Math.floor(Math.random() * colors.length)] : null;
            let pattern = patterns[Math.floor(Math.random() * patterns.length)];
            let eyes = eyeColors[Math.floor(Math.random() * eyeColors.length)];
            let character = characters[Math.floor(Math.random() * characters.length)];
            let mutations = [];

            if (Math.random() < 0.02) {
                mutations.push('альбинизм');
                mainColor = 'белый';
                pattern = 'однотонный';
                eyes = 'красно-розовые';
                secondaryColor = null;
            }
            if (Math.random() < 0.03) mutations.push('гетерохромия');
            if (Math.random() < 0.03) mutations.push('витилиго');
            if (Math.random() < 0.01) {
                mutations.push('химеризм');
                secondaryColor = colors[Math.floor(Math.random() * colors.length)];
                pattern = 'наполовину разный';
                if (Math.random() < 0.5) mutations.push('гетерохромия');
            }

            if (pattern === 'однотонный') secondaryColor = null;

            return {
                name: '',
                gender: sex,
                age: 'котёнок',
                state: 'лежит',
                mainColor,
                secondaryColor,
                pattern,
                eyeColor: eyes,
                character,
                mutations,
                ownerId: '',
                idNumber: '',
                motherId: null,
                fatherId: null,
                birthCount: 0,
                isPregnant: false,
                pregnancyEnd: null,
                adultAt: Date.now() + 300000,
                tiredUntil: null,
                createdAt: Date.now()
            };
        }

        function generateKittenFromParents(mother, father = null) {
            const kitten = generateRandomCat();
            kitten.age = 'котёнок';
            kitten.adultAt = Date.now() + 300000;
            kitten.motherId = mother.id;
            kitten.fatherId = father ? father.id : null;
            kitten.ownerId = mother.ownerId;

            if (father) {
                kitten.mainColor = Math.random() < 0.5 ? mother.mainColor : father.mainColor;
                kitten.pattern = Math.random() < 0.8 ?
                    (Math.random() < 0.5 ? mother.pattern : father.pattern) :
                    patterns[Math.floor(Math.random() * patterns.length)];
                kitten.eyeColor = Math.random() < 0.5 ? mother.eyeColor : father.eyeColor;
                kitten.mutations = [...new Set([...mother.mutations, ...father.mutations])];
                if (Math.random() < 0.02) kitten.mutations.push('альбинизм');
                if (kitten.mutations.includes('альбинизм')) {
                    kitten.mainColor = 'белый';
                    kitten.pattern = 'однотонный';
                    kitten.eyeColor = 'красно-розовые';
                    kitten.secondaryColor = null;
                }
            } else {
                kitten.mainColor = mother.mainColor;
                kitten.pattern = mother.pattern;
                kitten.eyeColor = mother.eyeColor;
                kitten.mutations = [...mother.mutations];
            }

        // ============ HOME TAB ============
        async function loadHomeTab(container) {
            if (!currentUser) return;
            const catsSnap = await db.collection('cats').where('ownerId', '==', currentUser.uid).get();

            if (catCount === 0) buyBtnText = 'Купить кота (бесплатно)';
            else if (catCount <= 3) buyBtnText = 'Купить кота (10 монет)';
            else if (catCount === 4) buyBtnText = 'Купить кота (100 монет)';
            else { buyBtnText = 'Больше нельзя';

            html +=
                `<button id="buy-cat-btn" class="btn" ${buyDisabled?'disabled':''}>${buyBtnText}</button></div>`;

        function renderCatCard(cat) {
            const now = Date.now();
            let statusHtml = '';
            if (cat.age === 'котёнок' && cat.adultAt > now) {
                const remaining = Math.ceil((cat.adultAt - now) / 1000);
                statusHtml =
                    `<span class="text-yellow-300 text-xs">🐣 Котёнок (${formatTime(remaining)})</span>`;
            } else if (cat.state === 'уставшая' && cat.tiredUntil > now) {
                const remaining = Math.ceil((cat.tiredUntil - now) / 1000);
                statusHtml =
                `<span class="text-orange-300 text-xs">😴 Устал (${formatTime(remaining)})</span>`;
            } else {
                statusHtml = `<span class="text-green-300 text-xs">${cat.state}</span>`;
            }
            return `
            <div class="cat-card" data-cat-id="${cat.id}">
                <div class="font-bold">${cat.name || 'Безымянный'}</div>
                <div class="text-sm text-gray-300">${cat.gender==='male'?'♂ мальчик':'♀ девочка'} [${cat.idNumber}]</div>
                <div class="text-xs">${cat.age} · ${statusHtml}</div>
            </div>`;
        }

        async function openBuyCatModal() {
            if (isProcessing) return;
            isProcessing = true;
            const catCount = (await db.collection('cats').where('ownerId', '==', currentUser.uid).get()).size;
            let cost = 0;
            if (catCount === 0) cost = 0;
            else if (catCount <= 3) cost = 10;
            else if (catCount === 4) cost = 100;
            else { alert('Нельзя больше котов!');
                isProcessing = false; return; }

            if (currentUserData.coins < cost) {
                alert('Недостаточно монет!');
                isProcessing = false;
                return;
            }

            const kittens = [];
            for (let i = 0; i < 3; i++) kittens.push(generateRandomCat());

            const modal = document.getElementById('modal-generic');
            const content = document.getElementById('modal-generic-content');
            content.innerHTML = '<h3 class="text-xl font-bold mb-4">Выберите котёнка</h3><div class="grid grid-cols-3 gap-3">';
            kittens.forEach((k, i) => {
                content.innerHTML += `
                <div class="cat-card text-center" data-kitten="${i}">
                    <p class="font-bold">Котёнок ${i+1}</p>
                    <p class="text-sm">${k.mainColor}${k.secondaryColor?', '+k.secondaryColor:''}</p>
                    <p class="text-sm">${k.pattern} · ${k.eyeColor}</p>

                </div>`;
            });
            content.innerHTML += '</div><button class="btn mt-4 close-modal">Отмена</button>';
            modal.classList.add('active');

            content.querySelectorAll('.select-kitten-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const idx = parseInt(e.target.dataset.index);
                    const kitten = kittens[idx];
                    const name = prompt('Введите имя котёнка (макс 20 символов):', '');
                    if (!name || name.length > 20) { alert('Имя должно быть от 1 до 20 символов!'); return; }
                    kitten.name = name;
                    kitten.ownerId = currentUser.uid;
                    const catId = await getNextCatId();
                    kitten.idNumber = catId;
                    try {
                        await db.collection('cats').add(kitten);

                            await db.collection('users').doc(currentUser.uid).update({
                                coins: firebase.firestore.FieldValue.increment(-cost)

                        modal.classList.remove('active');
                        loadTab('home');
                    } catch (err) {
                        alert('Ошибка: ' + err.message);
                    }
                });
            });
            content.querySelector('.close-modal')?.addEventListener('click', () => modal.classList.remove('active'));
            isProcessing = false;

        function startParkMinigame(catId) {
            const area = document.getElementById('park-game-area');
            area.style.display = 'block';
            area.innerHTML =
                '<div id="park-cat-mover" style="position:absolute;width:40px;height:40px;background:#e94560;border-radius:50%;left:0;top:40px;transition:left 0.05s"></div><div id="park-zone" style="position:absolute;left:45%;width:10%;height:100%;background:rgba(0,255,0,0.3)"></div>';
            const mover = document.getElementById('park-cat-mover');
            let pos = 0;
            let direction = 1;
            const interval = setInterval(() => {
                pos += direction * 4;
                if (pos > 260) direction = -1;
                if (pos < 0) direction = 1;
                mover.style.left = pos + 'px';
            }, 50);
            mover.addEventListener('click', () => {
                clearInterval(interval);
                const zoneLeft = area.offsetWidth * 0.45;
                const zoneRight = area.offsetWidth * 0.55;
                if (pos >= zoneLeft && pos <= zoneRight) {
                    successPark(catId);
                } else {
                    alert('Мимо!');
                }
                area.style.display = 'none';
            });
        }

        async function loadShopSub(sub) {
            const shopContent = document.getElementById('shop-content');
            if (!shopContent) return;
            if (sub === 'buy') {
                const salesSnap = await db.collection('sales').where('status', '==', 'active').get();
                let html = '<div class="grid gap-3">';
                for (const doc of salesSnap.docs) {
                    const sale = doc.data();
                    if (sale.type === 'cat' && sale.catId) {
                        const catDoc = await db.collection('cats').doc(sale.catId).get();
                        if (catDoc.exists) {
                            const cat = catDoc.data();
                            html += `
                            <div class="cat-card flex justify-between items-center">
                                <div><b>${cat.name}</b> [${cat.idNumber}] ${cat.mainColor} · ${cat.pattern}</div>
                                <div class="flex items-center gap-2">
                                    <span class="text-yellow-400">🪙 ${sale.price}</span>
                                    <button class="btn buy-lot-btn" data-sale-id="${doc.id}" data-price="${sale.price}">Купить</button>
                                </div>
                            </div>`;
                        }
                    } else if (sale.type === 'item') {
                        html += `
                        <div class="cat-card flex justify-between items-center">
                            <div><b>${sale.itemName}</b></div>
                            <div class="flex items-center gap-2">
                                <span class="text-yellow-400">🪙 ${sale.price}</span>
                                <button class="btn buy-lot-btn" data-sale-id="${doc.id}" data-price="${sale.price}">Купить</button>
                            </div>
                        </div>`;
                    }
                }
                html += '</div>';
                shopContent.innerHTML = html;
                shopContent.querySelectorAll('.buy-lot-btn').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        if (isProcessing) return;
                        isProcessing = true;
                        const saleId = e.target.dataset.saleId;
                        const price = parseInt(e.target.dataset.price);
                        if (currentUserData.coins < price) { alert(
                                'Недостаточно монет!');
                            isProcessing = false; return; }
                        try {
                            const saleDoc = await db.collection('sales').doc(saleId).get();
                            const sale = saleDoc.data();
                            await db.collection('users').doc(currentUser.uid).update({
                                coins: firebase.firestore.FieldValue.increment(-price)
                            });
                            if (sale.type === 'cat') {
                                await db.collection('cats').doc(sale.catId).update({ ownerId: currentUser
                                        .uid });
                                if (sale.bot) {
                                    const name = prompt('Введите имя для кота:',
                                    'Безымянный');
                                    if (name) await db.collection('cats').doc(sale.catId).update({ name });
                                }
                            } else if (sale.type === 'item') {
                                await db.collection('users').doc(currentUser.uid).collection('inventory').add({
                                    name: sale.itemName,
                                    type: sale.itemType,
                                    acquiredAt: Date.now()
                                });
                            }
                            if (sale.sellerId !== 'bot') {
                                await db.collection('users').doc(sale.sellerId).update({
                                    coins: firebase.firestore.FieldValue.increment(price)
                                });
                            }
                            await db.collection('sales').doc(saleId).update({ status: 'sold' });
                            loadShopSub('buy');
                        } catch (err) {
                            alert('Ошибка: ' + err.message);
                        }
                        isProcessing = false;
                    });
                });
            } else if (sub === 'sell') {
                let html = '<h3>Продажа кота</h3><select id="sell-cat" class="w-full p-2 mb-3 bg-gray-800 rounded"><option value="">Выберите кота</option>';
                const userCats = await db.collection('cats').where('ownerId', '==', currentUser.uid).get();
                userCats.forEach(d => {
                    const c = d.data();
                    html +=
                        `<option value="${d.id}">${c.name} [${c.idNumber}]</option>`;
                });
                html += '</select>';
                html +=
                    '<h3>Продажа предмета</h3><select id="sell-item" class="w-full p-2 mb-3 bg-gray-800 rounded"><option value="">Выберите предмет</option>';
                const invSnap = await db.collection('users').doc(currentUser.uid).collection('inventory').get();
                invSnap.forEach(d => {
                    html +=
                        `<option value="${d.id}">${d.data().name}</option>`;
                });

                offers: {
                    [currentUser.uid]: { cats: [], items: [], coins: 0 },
                    [partnerUid]: { cats: [], items: [], coins: 0 }
                },

        function openTradeModal(tradeId) {
            const modal = document.getElementById('modal-generic');
            const content = document.getElementById('modal-generic-content');
            content.innerHTML = '<div id="trade-interface">Загрузка...</div>';
            modal.classList.add('active');

                if (!doc.exists || doc.data().status === 'completed') {
                    modal.classList.remove('active');

            const myOffer = trade.offers[currentUser.uid] || { cats: [], items: [], coins: 0 };
            const partnerOffer = trade.offers[Object.keys(trade.offers).find(k => k !== currentUser.uid)] || { cats: [],
                items: [], coins: 0 };
            const myAccepted = trade.accepted[currentUser.uid];
            const partnerAccepted = trade.accepted[Object.keys(trade.accepted).find(k => k !== currentUser.uid)];

            let html = '<div class="grid grid-cols-2 gap-4"><div><h3>Ваше предложение</h3>';

            html += '<div id="my-offer-list">';
            for (const catId of myOffer.cats) {

            }
            for (const itemId of myOffer.items) {

                if (itemDoc.exists) html +=
                    `<p>📦 ${itemDoc.data().name} <button class="text-red-400 remove-offer" data-type="item" data-id="${itemId}">x</button></p>`;
            }
            html += '</div></div><div><h3>Предложение партнёра</h3>';
            html += `<p>Монеты: ${partnerOffer.coins}</p><div>`;
            for (const catId of partnerOffer.cats) {
                const catDoc = await db.collection('cats').doc(catId).get();
                if (catDoc.exists) html += `<p>🐱 ${catDoc.data().name}</p>`;
            }
            html += '</div></div></div>';
            html +=
                `<div class="flex gap-3 mt-4"><button id="accept-trade-btn" class="btn" ${myAccepted?'disabled':''}>Принять ${myAccepted?'✓':''}</button><button id="decline-trade-btn" class="btn">Отклонить</button></div>`;

                    .data().idNumber + '] ID:' + d.id).join('\n'));
                if (catId && !myOffer.cats.includes(catId)) {
                    myOffer.cats.push(catId);
                    await db.collection('trades').doc(tradeId).update({
                        ['offers.' + currentUser.uid + '.cats']: myOffer.cats
                    });
                }
            });
            container.querySelector('#add-my-item')?.addEventListener('click', async () => {
                const items = await db.collection('users').doc(currentUser.uid).collection('inventory').get();
                const itemId = prompt('Введите ID предмета:\n' + items.docs.map(d => d.data().name + ' ID:' + d.id)
                    .join('\n'));
                if (itemId && !myOffer.items.includes(itemId)) {
                    myOffer.items.push(itemId);
                    await db.collection('trades').doc(tradeId).update({
                        ['offers.' + currentUser.uid + '.items']: myOffer.items
                    });
                }
            });
            container.querySelector('#my-coins')?.addEventListener('change', async (e) => {
                const val = parseInt(e.target.value) || 0;
                await db.collection('trades').doc(tradeId).update({
                    ['offers.' + currentUser.uid + '.coins']: val
                });
            });
            container.querySelector('#accept-trade-btn')?.addEventListener('click', async () => {
                await db.collection('trades').doc(tradeId).update({
                    ['accepted.' + currentUser.uid]: true
                });
                const updated = await db.collection('trades').doc(tradeId).get();
                const acc = updated.data().accepted;
                if (acc[currentUser.uid] && acc[Object.keys(acc).find(k => k !== currentUser.uid)]) {
                    setTimeout(async () => {
                        await executeTrade(tradeId);
                    }, 5000);
                }
            });

                await db.collection('trades').doc(tradeId).delete();

                    const id = e.target.dataset.id;
                    if (type === 'cat') myOffer.cats = myOffer.cats.filter(x => x !== id);
                    else myOffer.items = myOffer.items.filter(x => x !== id);
                    await db.collection('trades').doc(tradeId).update({
                        ['offers.' + currentUser.uid]: myOffer
                    });
                });
            });
        }

        async function executeTrade(tradeId) {
            const tradeDoc = await db.collection('trades').doc(tradeId).get();
            if (!tradeDoc.exists) return;
            const trade = tradeDoc.data();
            const p1 = trade.players[0];
            const p2 = trade.players[1];
            const o1 = trade.offers[p1];
            const o2 = trade.offers[p2];

            for (const catId of o1.cats) await db.collection('cats').doc(catId).update({ ownerId: p2 });
            for (const catId of o2.cats) await db.collection('cats').doc(catId).update({ ownerId: p1 });
            for (const itemId of o1.items) {
                const itemDoc = await db.collection('users').doc(p1).collection('inventory').doc(itemId).get();
                await db.collection('users').doc(p2).collection('inventory').add(itemDoc.data());
                await db.collection('users').doc(p1).collection('inventory').doc(itemId).delete();
            }
            for (const itemId of o2.items) {
                const itemDoc = await db.collection('users').doc(p2).collection('inventory').doc(itemId).get();
                await db.collection('users').doc(p1).collection('inventory').add(itemDoc.data());
                await db.collection('users').doc(p2).collection('inventory').doc(itemId).delete();
            }
            await db.collection('users').doc(p1).update({ coins: firebase.firestore.FieldValue.increment(o2.coins - o1
                    .coins) });
            await db.collection('users').doc(p2).update({ coins: firebase.firestore.FieldValue.increment(o1.coins - o2
                    .coins) });
            await db.collection('trades').doc(tradeId).update({ status: 'completed' });
        }

        async function handleNotificationAction(type, catId) {
            if (type === 'birth_ready') {
                const catDoc = await db.collection('cats').doc(catId).get();
                if (catDoc.exists) await startBirth(catDoc.data(), catId);
            } else if (type === 'walk_return') {
                await processWalkReturn(catId);
            } else if (type === 'castle_return') {
                await processCastleReturn(catId);
            } else if (type === 'forest_return') {
                await processForestReturn(catId);
            } else if (type === 'adult') {
                openCatModal(catId);
            } else {
                alert('Действие для типа ' + type);
            }
        }

        async function startBirth(motherData, motherId) {
            const fatherId = motherData.fatherId;
            let fatherData = null;
            if (fatherId) {
                const fDoc = await db.collection('cats').doc(fatherId).get();
                if (fDoc.exists) fatherData = { id: fatherId, ...fDoc.data() };
            }
            const birthCount = motherData.birthCount || 0;
            const kittenCount = birthCount === 0 ? Math.floor(Math.random() * 3) + 1 : Math.floor(Math.random() * 5) + 1;
            const kittens = [];
            for (let i = 0; i < kittenCount; i++) {
                kittens.push(generateKittenFromParents({ id: motherId, ...motherData }, fatherData));
            }

            const modal = document.getElementById('modal-generic');
            const content = document.getElementById('modal-generic-content');
            let html = '<h3 class="text-xl font-bold mb-4">🐱 Роды!</h3><div class="grid grid-cols-2 gap-3">';

                html += `
                <div class="cat-card text-center" id="kitten-${i}">
                    <p>${k.gender==='male'?'♂':'♀'} ${k.mainColor}</p>
                    <p>${k.pattern} · ${k.eyeColor}</p>
                    <button class="btn choose-kitten-btn" data-index="${i}">Выбрать</button>
                    <input type="text" class="kitten-name-input bg-gray-800 p-1 rounded mt-2 w-full" placeholder="Имя" style="display:none" maxlength="20">
                </div>`;
            });
            html += '</div><button id="finish-birth-btn" class="btn mt-4 w-full" disabled>✅ Завершить</button>';
            content.innerHTML = html;
            modal.classList.add('active');
            const chosenNames = {};
            content.querySelectorAll('.choose-kitten-btn').forEach(b => {
                b.addEventListener('click', (e) => {
                    const idx = e.target.dataset.index;
                    const card = document.getElementById('kitten-' + idx);
                    card.querySelector('.choose-kitten-btn').style.display = 'none';
                    card.querySelector('.kitten-name-input').style.display = 'block';
                    card.querySelector('.kitten-name-input').focus();
                });
            });
            content.querySelector('#finish-birth-btn').addEventListener('click', async () => {
                const inputs = content.querySelectorAll('.kitten-name-input');
                let allNamed = true;
                inputs.forEach(inp => {
                    if (inp.style.display !== 'none' && !inp.value.trim()) allNamed = false;
                });
                if (!allNamed) { alert('Дайте имена всем выбранным котятам!'); return; }
                for (let i = 0; i < kittens.length; i++) {
                    const inp = content.querySelector(`#kitten-${i} .kitten-name-input`);
                    if (inp.style.display !== 'none') {
                        kittens[i].name = inp.value.trim();

                        kittens[i].idNumber = await getNextCatId();

                    'catId', '==', motherId).get();

                modal.classList.remove('active');
                loadTab('home');
            });
        }

                alert('Найдено монет: ' + coins);
            }
            await db.collection('cats').doc(catId).update({ state: 'уставшая', tiredUntil: Date.now() + 180000,
                castleReturnAt: null });
            const notifs = await db.collection('users').doc(currentUser.uid).collection('notifications').where('catId',
                '==', catId).get();
            for (const d of notifs.docs) await d.ref.delete();
        }

        async function processForestReturn(catId) {
            const rand = Math.random();
            if (rand < 0.15) {
                const kitten = generateRandomCat();
                kitten.mutations.push('лесной дух');
                kitten.name = prompt('Найден котёнок с мутацией "лесной дух"! Введите имя:');
                if (kitten.name) {
                    kitten.ownerId = currentUser.uid;
                    kitten.idNumber = await getNextCatId();
                    await db.collection('cats').add(kitten);
                }
            } else if (rand < 0.7) {
                const items = ['Лесной амулет', 'Мячик', 'Кошачья мята', 'Магический кристалл'];
                const item = items[Math.floor(Math.random() * items.length)];
                await db.collection('users').doc(currentUser.uid).collection('inventory').add({ name: item, acquiredAt: Date
                        .now() });
                alert('Найден предмет: ' + item);
            } else {
                const coins = Math.floor(Math.random() * 21) + 5;
                await db.collection('users').doc(currentUser.uid).update({ coins: firebase.firestore.FieldValue.increment(
                        coins) });
                alert('Найдено монет: ' + coins);
            }
            await db.collection('cats').doc(catId).update({ state: 'уставшая', tiredUntil: Date.now() + 120000,
                forestReturnAt: null });
            const notifs = await db.collection('users').doc(currentUser.uid).collection('notifications').where('catId',
                '==', catId).get();
            for (const d of notifs.docs) await d.ref.delete();
        }

        // ============ CAT MODAL ============
        function openCatModal(catId) {
            const cat = allCatsCache.find(c => c.id === catId) || null;
            if (!cat) return;
            const modal = document.getElementById('modal-cat');
            const content = document.getElementById('modal-cat-content');
            const now = Date.now();
            let html = `<h3 class="text-xl font-bold">${cat.name} [${cat.idNumber}]</h3>`;
            html +=
                `<p>Пол: ${cat.gender==='male'?'♂ мальчик':'♀ девочка'} | Возраст: ${cat.age}</p>`;
            html +=
                `<p>Цвет: ${cat.mainColor}${cat.secondaryColor?', '+cat.secondaryColor:''} | Рисунок: ${cat.pattern}</p>`;
            html += `<p>Глаза: ${cat.eyeColor} | Характер: ${cat.character}</p>`;
            html += `<p>Состояние: ${cat.state}</p>`;
            if (cat.mutations.length) html +=
                `<p>Мутации: ${cat.mutations.join(', ')}</p>`;
            if (cat.age === 'котёнок' && cat.adultAt > now) {
                html +=
                    `<p class="text-yellow-300">Взрослеет через: ${formatTime(Math.ceil((cat.adultAt-now)/1000))}</p>`;
            }
            if (cat.state === 'уставшая' && cat.tiredUntil > now) {
                html +=
                    `<p class="text-orange-300">Отдых до: ${formatTime(Math.ceil((cat.tiredUntil-now)/1000))}</p>`;
                html +=
                    `<button class="btn rest-cat-btn" data-cat-id="${cat.id}">😴💤 Отдохнул</button>`;
            }
            html += `<div class="flex gap-3 mt-4"><button class="btn compare-btn" data-cat-id="${cat.id}">🔍 Определить родство</button>`;
            html += `<button class="btn close-modal">Закрыть</button></div>`;
            content.innerHTML = html;
            modal.classList.add('active');

            content.querySelector('.rest-cat-btn')?.addEventListener('click', async () => {
                await db.collection('cats').doc(cat.id).update({ state: 'лежит', tiredUntil: null });
                modal.classList.remove('active');
                loadTab(activeTab);
            });
            content.querySelector('.compare-btn')?.addEventListener('click', () => openCompareModal(cat));
            content.querySelector('.close-modal')?.addEventListener('click', () => modal.classList.remove('active'));
        }

        async function openCompareModal(cat) {
            const userCats = await db.collection('cats').where('ownerId', '==', currentUser.uid).get();
            const cats = userCats.docs.map(d => ({ id: d.id, ...d.data() })).filter(c => c.id !== cat.id);
            const modal = document.getElementById('modal-generic');
            const content = document.getElementById('modal-generic-content');
            let html = '<h3>Выберите кота для сравнения</h3><select id="compare-select" class="w-full p-2 bg-gray-800 rounded">';
            cats.forEach(c => html +=
                `<option value="${c.id}">${c.name} [${c.idNumber}]</option>`);
            html += '</select><button id="do-compare-btn" class="btn mt-3">Сравнить</button>';
            html += '<div id="compare-result" class="mt-4"></div>';
            html += '<button class="btn mt-3 close-modal">Закрыть</button>';
            content.innerHTML = html;
            modal.classList.add('active');
            document.getElementById('do-compare-btn').addEventListener('click', async () => {
                const otherId = document.getElementById('compare-select').value;
                const otherCat = cats.find(c => c.id === otherId);
                let relation = 'незнакомец';
                if (cat.motherId && cat.motherId === otherCat.id) relation = 'мама';
                else if (cat.fatherId && cat.fatherId === otherCat.id) relation = 'папа';
                else if (otherCat.motherId && otherCat.motherId === cat.id) relation = 'сын/дочь';
                else if (otherCat.fatherId && otherCat.fatherId === cat.id) relation = 'сын/дочь';
                else if (cat.motherId && otherCat.motherId && cat.motherId === otherCat.motherId) relation = 'брат/сестра';
                else if (cat.fatherId && otherCat.fatherId && cat.fatherId === otherCat.fatherId) relation =
                    'брат/сестра';
                document.getElementById('compare-result').textContent = 'Родство: ' + relation;
            });
            content.querySelector('.close-modal')?.addEventListener('click', () => modal.classList.remove('active'));
        }

        // ============ INVENTORY ============
        document.getElementById('inventory-btn').addEventListener('click', async () => {
            const modal = document.getElementById('modal-generic');
            const content = document.getElementById('modal-generic-content');
            const invSnap = await db.collection('users').doc(currentUser.uid).collection('inventory').get();
            let html = '<h3 class="text-xl font-bold mb-4">🎒 Инвентарь</h3>';
            invSnap.forEach(d => {
                html +=
                    `<div class="cat-card flex justify-between items-center"><span>${d.data().name}</span><div><button class="btn use-item-btn" data-item-id="${d.id}" data-item-name="${d.data().name}">👁</button><button class="btn delete-item-btn" data-item-id="${d.id}">❌</button></div></div>`;
            });
            html += '<button class="btn mt-4 close-modal">Закрыть</button>';
            content.innerHTML = html;
            modal.classList.add('active');
            content.querySelectorAll('.use-item-btn').forEach(b => {
                b.addEventListener('click', async (e) => {
                    const itemId = e.target.dataset.itemId;
                    const itemName = e.target.dataset.itemName;
                    await useItem(itemName, itemId);
                    modal.classList.remove('active');
                });
            });
            content.querySelectorAll('.delete-item-btn').forEach(b => {
                b.addEventListener('click', async (e) => {
                    await db.collection('users').doc(currentUser.uid).collection('inventory').doc(e.target
                        .dataset.itemId).delete();
                    document.getElementById('inventory-btn').click();
                });
            });
            content.querySelector('.close-modal')?.addEventListener('click', () => modal.classList.remove('active'));
        });

        async function useItem(itemName, itemId) {
            if (itemName === 'Мячик') {
                const cats = await db.collection('cats').where('ownerId', '==', currentUser.uid).where('state', '==',
                    'уставшая').get();
                if (cats.empty) { alert('Нет уставших котов!'); return; }
                const catId = prompt('Выберите ID кота:\n' + cats.docs.map(d => d.data().name + ' ID:' + d.id).join(
                    '\n'));
                if (catId) {
                    await db.collection('cats').doc(catId).update({ state: 'лежит', tiredUntil: null });
                    await db.collection('users').doc(currentUser.uid).collection('inventory').doc(itemId).delete();
                }
            } else if (itemName === 'Кошачья мята') {
                const cats = await db.collection('cats').where('ownerId', '==', currentUser.uid).where('state', '==',
                    'уставшая').get();
                if (cats.empty) { alert('Нет уставших котов!'); return; }
                const catId = prompt('Выберите ID кота:\n' + cats.docs.map(d => d.data().name + ' ID:' + d.id).join(
                    '\n'));
                if (catId) {
                    await db.collection('cats').doc(catId).update({ state: 'лежит', tiredUntil: null });
                    await db.collection('users').doc(currentUser.uid).update({ coins: firebase.firestore.FieldValue
                            .increment(10) });
                    await db.collection('users').doc(currentUser.uid).collection('inventory').doc(itemId).delete();
                }
            } else if (itemName === 'Ускоритель беременности' || itemName === 'Золотая рыбка') {
                const cats = await db.collection('cats').where('ownerId', '==', currentUser.uid).where('isPregnant', '==',
                    true).get();
                if (cats.empty) { alert('Нет беременных кошек!'); return; }
                const catId = prompt('Выберите ID кошки:\n' + cats.docs.map(d => d.data().name + ' ID:' + d.id).join(
                    '\n'));
                if (catId) {
                    await startBirth((await db.collection('cats').doc(catId).get()).data(), catId);
                    await db.collection('users').doc(currentUser.uid).collection('inventory').doc(itemId).delete();
                }
            } else if (itemName === 'Магический кристалл') {
                const cats = await db.collection('cats').where('ownerId', '==', currentUser.uid).get();
                const catId = prompt('Выберите ID кота для переименования:\n' + cats.docs.map(d => d.data().name +
                    ' ID:' + d.id).join('\n'));
                const newName = prompt('Новое имя:');
                if (catId && newName && newName.length <= 20) {
                    await db.collection('cats').doc(catId).update({ name: newName });
                    await db.collection('users').doc(currentUser.uid).collection('inventory').doc(itemId).delete();
                }
            } else {
                alert('Предмет использован!');
                await db.collection('users').doc(currentUser.uid).collection('inventory').doc(itemId).delete();
            }
        }

        // ============ GLOBAL DELEGATION ============
        document.addEventListener('click', (e) => {
            // Закрытие модалов по клику на фон
            if (e.target.classList.contains('modal')) {
                e.target.classList.remove('active');
            }
            // Клик по карточке кота
            const catCard = e.target.closest('[data-cat-id]');
            if (catCard && !e.target.closest('button')) {
                openCatModal(catCard.dataset.catId);
            }
            // Кнопка закрытия модалов
            if (e.target.classList.contains('close-modal')) {
                e.target.closest('.modal')?.classList.remove('active');
            }
        });

        // ============ INIT ============
        // Уже инициализируется через onAuthStateChanged
        console.log('🐱 Генетика котов - игра загружена');
    </script>
</body>
</html>
