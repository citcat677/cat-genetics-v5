<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐱 Генетика котов</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 50; }
        .modal.active { display: flex; }
        .notification-dot { position: relative; }
        .notification-dot::after { content: ''; position: absolute; top: -5px; right: -5px; width: 12px; height: 12px; background: red; border-radius: 50%; display: none; }
        .notification-dot.has-notifications::after { display: block; }
    </style>
</head>
<body class="bg-gray-100">
    <div id="app" class="max-w-6xl mx-auto p-4"></div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <script>
        // ================== ВАШ КОНФИГ ==================
        const firebaseConfig = {
  apiKey: "AIzaSyBSO84yoAhHUCIejdf9mmo89oXIYeeSFfs",
  authDomain: "cat-genetics-v6.firebaseapp.com",
  projectId: "cat-genetics-v6",
  storageBucket: "cat-genetics-v6.firebasestorage.app",
  messagingSenderId: "302978224196",
  appId: "1:302978224196:web:106b02fc1157bd17fdac11",
  measurementId: "G-HKJQVRPCZJ"
};

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const COAT_COLORS = ['черный', 'белый', 'рыжий', 'серый'];
        const EYE_COLORS = ['голубой', 'зеленый', 'желтый'];
        const CHARACTERS = ['добрый', 'игривый', 'агрессивный', 'ласковый', 'дружелюбный', 'ленивый'];
        const FEMALE_NAMES = ['Дымка', 'Снежка', 'Люся', 'Мила', 'Пуша', 'Луна', 'Зайка'];
        const MALE_NAMES = ['Персик', 'Рыжик', 'Барсик', 'Уголёк', 'Кузя', 'Симба'];
        function randomItem(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

        function inheritCoat(c1, c2) { return Math.random() < 0.5 ? c1 : c2; }
        function inheritEyes(e1, e2) { return Math.random() < 0.5 ? e1 : e2; }

        let notifications = [];
        function addNotification(msg) {
            notifications.unshift({ message: msg, read: false });
            updateNotifDot();
        }
        function updateNotifDot() {
            const dot = document.getElementById('notif-dot');
            if (!dot) return;
            if (notifications.some(n => !n.read)) dot.classList.add('has-notifications');
            else dot.classList.remove('has-notifications');
        }

        function showModal(title, message, onClose = null) {
            const modal = document.getElementById('info-modal');
            document.getElementById('info-title').innerText = title;
            document.getElementById('info-message').innerHTML = message;
            modal.classList.add('active');
            document.getElementById('info-ok-btn').onclick = () => {
                modal.classList.remove('active');
                if (onClose) onClose();
            };
        }

        async function resetEverything() {
            if (!confirm('⚠️ Удалить ВСЕ данные игры?')) return;
            const collections = ['cats', 'users', 'park', 'sales', 'trades', 'server'];
            for (const col of collections) {
                const snapshot = await db.collection(col).get();
                const batch = db.batch();
                snapshot.forEach(doc => batch.delete(doc.ref));
                await batch.commit();
            }
            alert('Данные удалены. Перезайдите в игру.');
            auth.signOut();
            location.reload();
        }

        async function deleteCurrentAccount() {

if (!confirm('⚠️ Удалить ваш аккаунт? Вы потеряете доступ к игре под этим email.')) return;
            const user = auth.currentUser;
            if (!user) return;
            await db.collection('users').doc(user.uid).delete();
            await user.delete();
            alert('Аккаунт удалён. Для продолжения зарегистрируйтесь заново.');
            location.reload();
        }

        function showLanding() {
            document.getElementById('app').innerHTML = `
                <div class="flex flex-col items-center justify-center min-h-screen">
                    <h1 class="text-5xl font-bold text-purple-700 mb-6">🐱 Генетика котов</h1>
                    <p class="text-xl mb-8">Добро пожаловать!</p>
                    <button id="play-btn" class="bg-purple-600 text-white px-10 py-4 rounded-full text-2xl font-bold">Играть</button>
                </div>`;
            document.getElementById('play-btn').onclick = showAuthForm;
        }

        function showAuthForm() {
            document.getElementById('app').innerHTML = `
                <div class="max-w-md mx-auto mt-20 bg-white p-6 rounded-lg shadow">
                    <h2 class="text-2xl font-bold mb-4">Вход / Регистрация</h2>
                    <input id="email" type="email" placeholder="Email" class="w-full border p-2 mb-2 rounded">
                    <input id="password" type="password" placeholder="Пароль" class="w-full border p-2 mb-4 rounded">
                    <button id="login-btn" class="bg-blue-500 text-white px-4 py-2 rounded mr-2">Войти</button>
                    <button id="signup-btn" class="bg-green-500 text-white px-4 py-2 rounded">Регистрация</button>
                    <p id="auth-error" class="text-red-500 mt-2 text-sm"></p>
                </div>`;
            document.getElementById('login-btn').onclick = () => {
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                auth.signInWithEmailAndPassword(email, password)
                    .then(() => {
                        const uid = auth.currentUser.uid;
                        db.collection('users').doc(uid).get().then(doc => {
                            if (!doc.exists) {
                                db.collection('users').doc(uid).set({
                                    coins: 20, catsBought: 0, homeSize: 'маленький'
                                });
                            }
                        });
                    })
                    .catch(e => document.getElementById('auth-error').innerText = e.message);
            };
            document.getElementById('signup-btn').onclick = () => {
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                auth.createUserWithEmailAndPassword(email, password)
                    .then(() => {
                        db.collection('users').doc(auth.currentUser.uid).set({
                            coins: 20, catsBought: 0, homeSize: 'маленький'
                        });
                    })
                    .catch(e => document.getElementById('auth-error').innerText = e.message);
            };
        }

        function showGame(user) {
            const uid = user.uid;
            const isAdmin = user.email === 'katya2013sara1981@gmail.com';

            document.getElementById('app').innerHTML = `
                <div class="bg-white rounded-lg shadow p-4">
                    <div class="flex justify-between items-center mb-4">
                        <h1 class="text-2xl font-bold">🐱 Коты</h1>
                        <div class="flex items-center gap-3">
                            <span id="coins-display" class="font-semibold"></span>
                            <div id="notif-dot" class="notification-dot">

<button id="messages-btn" class="bg-blue-400 text-white px-3 py-1 rounded">✉️</button>
                            </div>
                            ${isAdmin ? '<button id="reset-btn" class="bg-red-500 text-white px-3 py-1 rounded" title="Сброс данных">🌹</button>' : ''}
                            ${isAdmin ? '<button id="delete-account-btn" class="bg-gray-700 text-white px-3 py-1 rounded" title="Удалить аккаунт">🗑️</button>' : ''}
                            <button id="logout-btn" class="bg-gray-500 text-white px-3 py-1 rounded">Выйти</button>
                        </div>
                    </div>
                    <div>
                        <h2 class="font-bold text-lg mb-2">Мои коты</h2>
                        <div id="my-cats" class="space-y-2"></div>
                        <button id="buy-cat-btn" class="mt-2 bg-purple-500 text-white px-3 py-1 rounded"></button>
                    </div>
                    <div class="mt-4">
                        <h2 class="font-bold text-lg mb-2">Разведение</h2>
                        <select id="mother-select" class="border p-1"><option value="">-- мать --</option></select>
                        <select id="father-select" class="border p-1 ml-2"><option value="">-- отец --</option></select>
                        <button id="breed-btn" class="bg-pink-500 text-white px-3 py-1 rounded ml-2">Скрестить</button>
                    </div>
                    <div class="mt-4">
                        <h2 class="font-bold text-lg mb-2">Все коты</h2>
                        <div id="all-cats" class="space-y-2 max-h-60 overflow-y-auto"></div>
                    </div>
                </div>
                <div id="messages-modal" class="modal">
                    <div class="bg-white p-6 rounded-lg max-w-md w-full">
                        <button onclick="this.closest('.modal').style.display='none'" class="float-right text-xl">✕</button>
                        <h2 class="text-xl font-bold mb-4">Сообщения</h2>
                        <div id="messages-list"></div>
                    </div>
                </div>
                <div id="info-modal" class="modal">
                    <div class="bg-white p-6 rounded-lg max-w-md w-full text-center">
                        <h2 id="info-title" class="text-xl font-bold mb-4"></h2>
                        <div id="info-message" class="mb-4"></div>
                        <button id="info-ok-btn" class="bg-blue-500 text-white px-6 py-2 rounded">ОК</button>
                    </div>
                </div>
                <div id="kitten-name-modal" class="modal">
                    <div class="bg-white p-6 rounded-lg max-w-md w-full">
                        <h2 class="text-xl font-bold mb-4">🐱 Назовите котёнка!</h2>
                        <p id="kitten-details"></p>
                        <input id="kitten-name-input" type="text" placeholder="Имя" class="border p-2 w-full mt-2">
                        <button id="kitten-name-ok" class="mt-4 bg-green-500 text-white px-4 py-2 rounded">ОК</button>
                    </div>
                </div>
            `;

            if (isAdmin) {
                document.getElementById('reset-btn').onclick = resetEverything;
                document.getElementById('delete-account-btn').onclick = deleteCurrentAccount;
            }

            // Монеты и покупка
            db.collection('users').doc(uid).onSnapshot(doc => {
                if (!doc.exists) return;
                const d = doc.data();
                document.getElementById('coins-display').innerText = `💰 ${d.coins || 0}`;
                const bought = d.catsBought || 0;
                const btn = document.getElementById('buy-cat-btn');
                if (bought === 0) { btn.innerText = '+ Бесплатный кот'; btn.disabled = false; }
                else if (bought === 1) { btn.innerText = '+ Купить кота (10💰)'; btn.disabled = false; }

else if (bought === 2) { btn.innerText = '+ Купить кота (100💰)'; btn.disabled = false; }
                else { btn.innerText = 'Нет котов'; btn.disabled = true; }
            });

            // Мои коты
            db.collection('cats').where('owner', '==', uid).onSnapshot(snap => {
                const cats = [];
                snap.forEach(doc => cats.push({ id: doc.id, ...doc.data() }));
                const div = document.getElementById('my-cats');
                div.innerHTML = cats.length ? cats.map(c => `
                    <div class="border p-2 rounded">${c.name} {${c.gender === 'кот' ? 'мальчик' : 'девочка'}} [${String(c.id).padStart(4, '0')}] ${c.age} ${c.isPregnant ? ' <span class="text-pink-500">(беременна)</span>' : ''}</div>
                `).join('') : '<p>Нет котов.</p>';
                const opts = cats.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
                document.getElementById('mother-select').innerHTML = '<option value="">-- мать --</option>' + opts;
                document.getElementById('father-select').innerHTML = '<option value="">-- отец --</option>' + opts;
            });

            // Все коты
            db.collection('cats').onSnapshot(snap => {
                const cats = [];
                snap.forEach(doc => cats.push({ id: doc.id, ...doc.data() }));
                document.getElementById('all-cats').innerHTML = cats.map(c => `
                    <div class="border p-2 rounded text-sm">${c.name} {${c.gender === 'кот' ? 'мальчик' : 'девочка'}} [${String(c.id).padStart(4, '0')}]</div>
                `).join('');
            });

            // Покупка
            document.getElementById('buy-cat-btn').onclick = async () => {
                const userDoc = await db.collection('users').doc(uid).get();
                const d = userDoc.data();
                const bought = d.catsBought || 0;
                const coins = d.coins || 0;
                const price = bought === 0 ? 0 : bought === 1 ? 10 : 100;
                if (bought >= 3) { showModal('Ошибка', 'Вы раскупили всех котов.'); return; }
                if (coins < price) { showModal('Ошибка', 'Недостаточно монет.'); return; }
                if (price > 0) await db.collection('users').doc(uid).update({ coins: firebase.firestore.FieldValue.increment(-price) });
                const gender = Math.random() < 0.5 ? 'кошка' : 'кот';
                const newId = (await db.collection('cats').get()).size + 1;
                await db.collection('cats').add({
                    owner: uid,
                    name: gender === 'кот' ? randomItem(MALE_NAMES) : randomItem(FEMALE_NAMES),
                    gender, age: 'взрослый', id: newId,
                    coatColor: randomItem(COAT_COLORS), eyeColor: randomItem(EYE_COLORS),
                    character: randomItem(CHARACTERS), isPregnant: false,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                await db.collection('users').doc(uid).update({ catsBought: bought + 1 });
                showModal('Успех', 'Вы получили нового кота!');
            };

            // Разведение
            document.getElementById('breed-btn').onclick = async () => {
                const motherId = document.getElementById('mother-select').value;
                const fatherId = document.getElementById('father-select').value;
                if (!motherId || !fatherId) {
                    showModal('Ошибка', 'Выберите мать и отца.');
                    return;
                }
                const [mSnap, fSnap] = await Promise.all([
                    db.collection('cats').doc(motherId).get(),
                    db.collection('cats').doc(fatherId).get()
                ]);
                if (!mSnap.exists || !fSnap.exists) return;
                const m = mSnap.data(), f = fSnap.data();

                if (m.gender !== 'кошка' || f.gender !== 'кот') {

showModal('Ошибка', 'Мать должна быть кошкой {девочка}, а отец — котом {мальчик}.');
                    return;
                }
                if (m.age === 'новорождённый' || m.age === 'котёнок' || f.age === 'новорождённый' || f.age === 'котёнок') {
                    showModal('Ошибка', 'Котята не могут размножаться. Подождите, пока они вырастут.');
                    return;
                }
                const userDoc = await db.collection('users').doc(uid).get();
                if (userDoc.data().coins < 10) {
                    showModal('Ошибка', 'Недостаточно монет (нужно 10).');
                    return;
                }
                await db.collection('users').doc(uid).update({ coins: firebase.firestore.FieldValue.increment(-10) });
                await db.collection('cats').doc(motherId).update({
                    isPregnant: true,
                    pregnancyStart: firebase.firestore.FieldValue.serverTimestamp(),
                    fatherId: fatherId
                });
                showModal('Успех', `Ваша кошка ${m.name} успешно забеременела! Родит через 5 минут.`);
            };

            // Проверка родов
            setInterval(async () => {
                const pregnantCats = await db.collection('cats').where('isPregnant', '==', true).get();
                const now = Date.now();
                for (const doc of pregnantCats.docs) {
                    const cat = doc.data();
                    if (cat.pregnancyStart && now - cat.pregnancyStart.toMillis() >= 300000) {
                        const fatherId = cat.fatherId;
                        let fatherData = {};
                        if (fatherId) {
                            const fSnap = await db.collection('cats').doc(fatherId).get();
                            if (fSnap.exists) fatherData = fSnap.data();
                        }
                        const count = cat.litterCount === 0 ? Math.floor(Math.random() * 3) + 1 : Math.floor(Math.random() * 5) + 1;
                        for (let i = 0; i < count; i++) {
                            const coat = inheritCoat(cat.coatColor, fatherData.coatColor || cat.coatColor);
                            const eye = inheritEyes(cat.eyeColor, fatherData.eyeColor || cat.eyeColor);
                            const gender = Math.random() < 0.5 ? 'кошка' : 'кот';
                            const newId = (await db.collection('cats').get()).size + 1;
                            const newKitten = {
                                owner: cat.owner,
                                name: '',
                                gender,
                                age: 'новорождённый',
                                id: newId,
                                coatColor: coat,
                                eyeColor: eye,
                                character: randomItem(CHARACTERS),
                                isPregnant: false,
                                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                                motherId: cat.id,
                                fatherId: cat.fatherId
                            };
                            showKittenNaming(newKitten);
                        }
                        await db.collection('cats').doc(doc.id).update({
                            isPregnant: false,
                            pregnancyStart: null,
                            litterCount: firebase.firestore.FieldValue.increment(1)
                        });
                        addNotification(`Кошка ${cat.name} родила!`);
                    }
                }
            }, 10000);

            function showKittenNaming(kittenData) {
                const modal = document.getElementById('kitten-name-modal');
                document.getElementById('kitten-details').innerHTML = `
                    Пол: {${kittenData.gender === 'кот' ? 'мальчик' : 'девочка'}}<br>

Окрас: ${kittenData.coatColor}, глаза: ${kittenData.eyeColor}
                `;
                document.getElementById('kitten-name-input').value = '';
                modal.classList.add('active');
                document.getElementById('kitten-name-ok').onclick = async () => {
                    const name = document.getElementById('kitten-name-input').value.trim() ||
                        (kittenData.gender === 'кот' ? randomItem(MALE_NAMES) : randomItem(FEMALE_NAMES));
                    await db.collection('cats').add({ ...kittenData, name });
                    modal.classList.remove('active');
                };
            }

            document.getElementById('messages-btn').onclick = () => {
                const modal = document.getElementById('messages-modal');
                document.getElementById('messages-list').innerHTML = notifications.length ?
                    notifications.map(n => `<p>${n.message}</p>`).join('') : 'Нет сообщений.';
                notifications.forEach(n => n.read = true);
                updateNotifDot();
                modal.style.display = 'flex';
            };

            document.getElementById('logout-btn').onclick = () => auth.signOut();
        }

        auth.onAuthStateChanged(user => {
            if (user) showGame(user);
            else showLanding();
        });
    </script>
</body>
</html>
