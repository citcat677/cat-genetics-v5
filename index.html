<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #1f2937; color: #f3f4f6; }
    .tab-btn { transition: all 0.2s; }
    .tab-btn.active { background: #374151; border-bottom: 3px solid #f472b6; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; z-index: 1000; }
    .modal.active { display: flex; }
    .modal-content { background: #2d3748; border-radius: 1rem; padding: 1.5rem; max-width: 90%; width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
    .cat-card { transition: transform 0.1s; }
    .cat-card:hover { transform: scale(1.02); background: #374151; }
    .btn { padding: 0.5rem 1rem; border-radius: 0.5rem; font-weight: 600; cursor: pointer; }
    .btn-pink { background: #ec4899; color: white; }
    .btn-pink:hover { background: #db2777; }
    .btn-gray { background: #4b5563; color: white; }
    .btn-gray:hover { background: #374151; }
    .notification-dot { position: absolute; top: -5px; right: -5px; background: #ef4444; color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 0.7rem; display: flex; align-items: center; justify-content: center; }
    .countdown { font-size: 1.2rem; font-weight: bold; color: #fbbf24; }
    .park-game { position: relative; width: 100%; height: 200px; background: #7f1d1d; overflow: hidden; }
    .park-zone { position: absolute; width: 60px; height: 100%; background: #166534; left: 50%; transform: translateX(-50%); }
    .park-cat { position: absolute; font-size: 2rem; transition: left 0.15s linear; }
    body.mobile .cat-card { width: 100% !important; }
    body.mobile .btn { padding: 0.75rem 1.25rem; font-size: 1rem; }
    body.mobile .tab-btn { font-size: 0.8rem; }
    body.mobile #app { max-width: 100% !important; }
    body.mobile .modal-content { width: 95% !important; max-width: 95% !important; }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-start p-4">
  <div id="auth-container" class="w-full max-w-md mt-20 bg-gray-800 p-6 rounded-xl shadow-xl">
    <div id="start-screen" class="text-center">
      <h1 class="text-4xl font-bold text-pink-400 mb-4">🐾 Генетика котов</h1>
      <button id="play-btn" class="btn btn-pink text-2xl px-12 py-5 rounded-2xl shadow-lg">Играть</button>
    </div>
    <div id="login-screen" class="hidden">
      <div id="login-form">
        <h2 class="text-2xl font-bold text-pink-400 mb-4">🐱 Вход</h2>
        <input type="email" id="login-email" placeholder="Email" class="w-full p-2 mb-2 rounded bg-gray-700 text-white">
        <input type="password" id="login-password" placeholder="Пароль" class="w-full p-2 mb-4 rounded bg-gray-700 text-white">
        <button id="login-submit" class="btn btn-pink w-full">Войти</button>
        <p class="mt-2 text-center"><button id="to-register" class="text-pink-400 underline">Нет аккаунта? Регистрация</button></p>

        <button id="register-submit" class="btn btn-pink w-full">Создать аккаунт</button>

      </div>

  </div>

  <div id="app" class="w-full max-w-4xl hidden">
    <div class="flex justify-between items-center bg-gray-800 p-3 rounded-xl mb-4">
      <div class="flex space-x-2">
        <button class="tab-btn px-3 py-1 rounded" data-tab="home">🏠 Дом</button>
        <button class="tab-btn px-3 py-1 rounded" data-tab="allcats">🌍 Все коты</button>
        <button class="tab-btn px-3 py-1 rounded" data-tab="breeding">💕 Разведение</button>
        <button class="tab-btn px-3 py-1 rounded" data-tab="shop">🛒 Магазин</button>
        <button class="tab-btn px-3 py-1 rounded" data-tab="park">🌳 Парк</button>
        <button class="tab-btn px-3 py-1 rounded" data-tab="castle">🏰 Замок</button>
        <button class="tab-btn px-3 py-1 rounded" data-tab="mountain">🏔 Гора</button>
        <button class="tab-btn px-3 py-1 rounded" data-tab="lake">🌊 Озеро</button>

      </div>

        <button id="inventory-btn" class="relative text-xl">🎒</button>

  <!-- Модалки -->
  <div id="cat-modal" class="modal"><div class="modal-content" id="cat-modal-content"></div></div>

  <div id="walk-result-modal" class="modal"><div class="modal-content" id="walk-result-content"></div></div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBSO84yoAhHUCIejdf9mmo89oXIYeeSFfs",
      authDomain: "cat-genetics-v6.firebaseapp.com",
      projectId: "cat-genetics-v6",
      storageBucket: "cat-genetics-v6.firebasestorage.app",
      messagingSenderId: "302978224196",
      appId: "1:302978224196:web:106b02fc1157bd17fdac11",
      measurementId: "G-HKJQVRPCZJ"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null, currentTab = 'home', timeInterval = null, notificationsListener = null, gameMinutes = 360;

    const COLORS = ['белый','чёрный','рыжий','серый','кремовый','шоколадный','лиловый','голубой'];
    const PATTERNS = ['однотонный','табби','пятнистый','мраморный','колорпойнт','черепаховый'];
    const EYE_COLORS = ['голубой','зелёный','жёлтый','карий','красно-розовый'];
    const CHARACTERS = ['спокойный','игривый','ленивый','любопытный','независимый','ласковый'];

    const colorInheritance = {
      'чёрный_чёрный':[{c:'чёрный',p:80},{c:'серый',p:15},{c:'белый',p:5}],
      'чёрный_серый':[{c:'чёрный',p:50},{c:'серый',p:40},{c:'белый',p:10}],
      'чёрный_белый':[{c:'белый',p:40},{c:'чёрный',p:40},{c:'серый',p:20}],
      'чёрный_рыжий':[{c:'чёрный',p:45},{c:'рыжий',p:45},{c:'серый',p:10}],
      'чёрный_кремовый':[{c:'чёрный',p:40},{c:'кремовый',p:40},{c:'серый',p:20}],
      'чёрный_шоколадный':[{c:'чёрный',p:55},{c:'шоколадный',p:35},{c:'серый',p:10}],
      'чёрный_лиловый':[{c:'чёрный',p:45},{c:'лиловый',p:35},{c:'серый',p:20}],
      'чёрный_голубой':[{c:'чёрный',p:45},{c:'голубой',p:35},{c:'серый',p:20}],
      'серый_серый':[{c:'серый',p:70},{c:'чёрный',p:15},{c:'белый',p:15}],
      'серый_белый':[{c:'серый',p:50},{c:'белый',p:30},{c:'чёрный',p:20}],
      'серый_рыжий':[{c:'серый',p:40},{c:'рыжий',p:40},{c:'чёрный',p:20}],
      'серый_кремовый':[{c:'серый',p:40},{c:'кремовый',p:40},{c:'белый',p:20}],
      'серый_шоколадный':[{c:'серый',p:45},{c:'шоколадный',p:35},{c:'чёрный',p:20}],
      'серый_лиловый':[{c:'серый',p:45},{c:'лиловый',p:35},{c:'белый',p:20}],
      'серый_голубой':[{c:'серый',p:45},{c:'голубой',p:35},{c:'чёрный',p:20}],
      'белый_белый':[{c:'белый',p:90},{c:'серый',p:10}],
      'белый_рыжий':[{c:'белый',p:40},{c:'рыжий',p:40},{c:'кремовый',p:20}],
      'белый_кремовый':[{c:'белый',p:40},{c:'кремовый',p:40},{c:'серый',p:20}],
      'белый_шоколадный':[{c:'белый',p:40},{c:'шоколадный',p:35},{c:'серый',p:25}],
      'белый_лиловый':[{c:'белый',p:40},{c:'лиловый',p:35},{c:'серый',p:25}],
      'белый_голубой':[{c:'белый',p:40},{c:'голубой',p:35},{c:'серый',p:25}],
      'рыжий_рыжий':[{c:'рыжий',p:80},{c:'кремовый',p:15},{c:'белый',p:5}],
      'рыжий_кремовый':[{c:'рыжий',p:45},{c:'кремовый',p:45},{c:'белый',p:10}],
      'рыжий_шоколадный':[{c:'рыжий',p:40},{c:'шоколадный',p:30},{c:'чёрный',p:30}],
      'рыжий_лиловый':[{c:'рыжий',p:40},{c:'лиловый',p:30},{c:'серый',p:30}],
      'рыжий_голубой':[{c:'рыжий',p:40},{c:'голубой',p:30},{c:'серый',p:30}],
      'кремовый_кремовый':[{c:'кремовый',p:80},{c:'белый',p:15},{c:'рыжий',p:5}],
      'кремовый_шоколадный':[{c:'кремовый',p:40},{c:'шоколадный',p:35},{c:'серый',p:25}],
      'кремовый_лиловый':[{c:'кремовый',p:40},{c:'лиловый',p:35},{c:'серый',p:25}],
      'кремовый_голубой':[{c:'кремовый',p:40},{c:'голубой',p:35},{c:'серый',p:25}],
      'шоколадный_шоколадный':[{c:'шоколадный',p:80},{c:'чёрный',p:15},{c:'серый',p:5}],
      'шоколадный_лиловый':[{c:'шоколадный',p:45},{c:'лиловый',p:35},{c:'серый',p:20}],
      'шоколадный_голубой':[{c:'шоколадный',p:45},{c:'голубой',p:35},{c:'серый',p:20}],
      'лиловый_лиловый':[{c:'лиловый',p:80},{c:'серый',p:15},{c:'белый',p:5}],
      'лиловый_голубой':[{c:'лиловый',p:45},{c:'голубой',p:45},{c:'серый',p:10}],
      'голубой_голубой':[{c:'голубой',p:80},{c:'серый',p:15},{c:'белый',p:5}]
    };

    function applyMutations(cat) {
      const r = Math.random() * 100;
      if (r < 2) {
        cat.mainColor = 'белый'; cat.pattern = 'однотонный'; cat.eyeColor = 'красно-розовый';
        cat.mutations.push('альбинизм'); cat.secondaryColor = null; return;
      }
      if (r < 5) {
        const c1 = EYE_COLORS[Math.floor(Math.random()*EYE_COLORS.length)];
        let c2 = EYE_COLORS[Math.floor(Math.random()*EYE_COLORS.length)];
        while (c2 === c1) c2 = EYE_COLORS[Math.floor(Math.random()*EYE_COLORS.length)];
        cat.eyeColor = { type:'разные', colors: [c1, c2] };
        cat.mutations.push('гетерохромия'); return;
      }
      if (r < 8) {
        cat.pattern = cat.age === 'котёнок' ? 'крапчатый' : 'пятнистый';
        if (cat.age !== 'котёнок') cat.mainColor += ' (осветлённые пятна)';
        cat.mutations.push('витилиго'); cat.secondaryColor = null; return;
      }
      if (r < 9) {
        cat.secondaryColor = COLORS[Math.floor(Math.random()*COLORS.length)];
        cat.pattern = 'наполовину разный';
        cat.mutations.push('химеризм');
        if (Math.random() < 0.15) {
          const c1 = EYE_COLORS[Math.floor(Math.random()*EYE_COLORS.length)];
          let c2 = EYE_COLORS[Math.floor(Math.random()*EYE_COLORS.length)];
          while (c2 === c1) c2 = EYE_COLORS[Math.floor(Math.random()*EYE_COLORS.length)];
          cat.eyeColor = { type:'разные', colors: [c1, c2] };
          cat.mutations.push('гетерохромия');
        }
      }
    }

    function generateKittenFromParents(mother, father, motherId, fatherId) {
      const kitten = {
        gender: Math.random() < 0.5 ? 'male' : 'female', age: 'котёнок', state: 'лежит',
        mainColor: getInheritedColor(mother.mainColor, father.mainColor),
        pattern: getInheritedPattern(mother.pattern, father.pattern),
        eyeColor: getInheritedEyeColor(mother.eyeColor, father.eyeColor),
        character: CHARACTERS[Math.floor(Math.random()*CHARACTERS.length)],
        mutations: [], secondaryColor: null, isPregnant: false, pregnancyEnd: null, tiredUntil: null, birthCount: 0,
        motherId: motherId || null, fatherId: fatherId || null,
        adultAt: firebase.firestore.Timestamp.fromDate(new Date(Date.now() + 5*60000))
      };
      if (mother.secondaryColor && father.secondaryColor) {
        kitten.secondaryColor = Math.random() < 0.5 ? mother.secondaryColor : father.secondaryColor;
      } else if (mother.secondaryColor || father.secondaryColor) {
        kitten.secondaryColor = Math.random() < 0.4 ? (mother.secondaryColor || father.secondaryColor) : null;
      }
      if (kitten.pattern === 'однотонный' || kitten.mutations.includes('витилиго')) kitten.secondaryColor = null;
      const motherMuts = mother.mutations || [], fatherMuts = father.mutations || [];
      motherMuts.forEach(m => { if (fatherMuts.includes(m) && Math.random() < 0.75) kitten.mutations.push(m); });
      if (kitten.mutations.length === 0) applyMutations(kitten);
      return kitten;
    }

    function generateRandomCat() {
      const cat = {
        gender: Math.random()<0.5?'male':'female', age:'взрослый', state:'лежит',
        mainColor: COLORS[Math.floor(Math.random()*COLORS.length)],
        pattern: PATTERNS[Math.floor(Math.random()*PATTERNS.length)],
        eyeColor: EYE_COLORS[Math.floor(Math.random()*EYE_COLORS.length)],
        character: CHARACTERS[Math.floor(Math.random()*CHARACTERS.length)],
        mutations: [], secondaryColor: Math.random()<0.3?COLORS[Math.floor(Math.random()*COLORS.length)]:null,
        isPregnant: false, pregnancyEnd: null, tiredUntil: null, birthCount: 0,
        motherId: null, fatherId: null
      };
      if (cat.pattern === 'однотонный') cat.secondaryColor = null;
      applyMutations(cat);
      return cat;
    }

    function getInheritedColor(mc, fc) {
      if (mc === fc) { const key = `${mc}_${fc}`; if (colorInheritance[key]) return pickFromProb(colorInheritance[key]); return mc; }
      const k1=`${mc}_${fc}`, k2=`${fc}_${mc}`;
      const e = colorInheritance[k1] || colorInheritance[k2];
      if (e) return pickFromProb(e);
      return Math.random() < 0.5 ? mc : fc;
    }
    function getInheritedPattern(mp, fp) {
      if (mp === fp) return Math.random() < 0.8 ? mp : PATTERNS[Math.floor(Math.random()*PATTERNS.length)];
      return Math.random() < 0.5 ? mp : fp;
    }
    function getInheritedEyeColor(me, fe) {
      const mc = typeof me === 'object' ? me.colors[0] : me;
      const fc = typeof fe === 'object' ? fe.colors[0] : fe;
      if (mc === fc) return Math.random() < 0.8 ? mc : EYE_COLORS[Math.floor(Math.random()*EYE_COLORS.length)];
      return Math.random() < 0.5 ? mc : fc;
    }
    function pickFromProb(arr) { const r = Math.random()*100; let cum=0; for(const i of arr){cum+=i.p; if(r<=cum) return i.c;} return arr[arr.length-1].c; }

    function timeLeftStr(untilDate) {
      if (!untilDate) return '';
      const diff = untilDate.toDate() - new Date();
      if (diff <= 0) return 'готово';
      const m = Math.floor(diff/60000), s = Math.floor((diff%60000)/1000);
      return `${m}:${String(s).padStart(2,'0')}`;
    }

    function updateGameTimeDisplay() {
      const h = Math.floor(gameMinutes / 60) % 24, m = gameMinutes % 60;
      document.getElementById('game-time').textContent = `${h>=6&&h<18?'☀️':'🌃'} ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
    }
    function incrementGameTime() { gameMinutes++; updateGameTimeDisplay(); }

    function applyDeviceMode(mode) { if (mode === 'mobile') document.body.classList.add('mobile'); else document.body.classList.remove('mobile'); localStorage.setItem('device', mode); }
    function showDeviceModal() {
      const modal = document.getElementById('device-modal'), cont = document.getElementById('device-modal-content');
      cont.innerHTML = `<h2 class="text-xl font-bold mb-4">Выберите устройство</h2>
        <div class="grid grid-cols-2 gap-4">
          <button id="dev-mobile" class="btn btn-pink p-6 text-2xl">📱<br><span class="text-sm">Телефон</span></button>
          <button id="dev-desktop" class="btn btn-pink p-6 text-2xl">💻<br><span class="text-sm">Компьютер</span></button>
        </div>`;
      modal.classList.add('active');
      document.getElementById('dev-mobile').addEventListener('click', () => { applyDeviceMode('mobile'); modal.classList.remove('active'); });
      document.getElementById('dev-desktop').addEventListener('click', () => { applyDeviceMode('desktop'); modal.classList.remove('active'); });
    }

    // Auth
    document.getElementById('play-btn').addEventListener('click', () => {
      document.getElementById('start-screen').classList.add('hidden');
      document.getElementById('login-screen').classList.remove('hidden');
    });
    document.getElementById('to-register').addEventListener('click', () => {
      document.getElementById('login-form').classList.add('hidden');
      document.getElementById('register-form').classList.remove('hidden');
    });
    document.getElementById('to-login').addEventListener('click', () => {
      document.getElementById('register-form').classList.add('hidden');
      document.getElementById('login-form').classList.remove('hidden');
    });
    document.getElementById('login-submit').addEventListener('click', () => {
      const email = document.getElementById('login-email').value.trim();
      const pass = document.getElementById('login-password').value;
      auth.signInWithEmailAndPassword(email, pass).catch(e => alert(e.message));
    });
    document.getElementById('register-submit').addEventListener('click', async () => {
      const nick = document.getElementById('reg-nickname').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const pass = document.getElementById('reg-password').value;
      if (!nick || !email || !pass) return alert('Заполните все поля');
      // Проверка уникальности ника
      const nickCheck = await db.collection('users').where('nickname','==',nick).get();
      if (!nickCheck.empty) return alert('Этот ник уже занят! Выберите другой.');
      auth.createUserWithEmailAndPassword(email, pass)
        .then(cred => db.collection('users').doc(cred.user.uid).set({ coins: 100, nickname: nick }))
        .catch(e => alert(e.message));
    });

    auth.onAuthStateChanged(async user => {
      if (user) {
        currentUser = user;
        document.getElementById('auth-container').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
        if (timeInterval) clearInterval(timeInterval);
        timeInterval = setInterval(() => { incrementGameTime(); updateAllTimers(); }, 1000);
        updateCoinsDisplay();
        listenNotifications();
        if (!localStorage.getItem('device')) showDeviceModal();
        else applyDeviceMode(localStorage.getItem('device'));
        if (user.email === 'katya2013sara1981@gmail.com') {
          document.getElementById('reset-btn').classList.remove('hidden');
          document.getElementById('admin-tab-btn').classList.remove('hidden');
        }
        switchTab('home');
      } else {
        currentUser = null;
        document.getElementById('auth-container').classList.remove('hidden');
        document.getElementById('app').classList.add('hidden');
        document.getElementById('start-screen').classList.remove('hidden');
        document.getElementById('login-screen').classList.add('hidden');
        if (timeInterval) clearInterval(timeInterval);
        if (notificationsListener) notificationsListener();
      }
    });

    function updateCoinsDisplay() {
      db.collection('users').doc(currentUser.uid).get().then(doc => {
        if (doc.exists) document.getElementById('coins-display').textContent = `🪙 ${doc.data().coins}`;
      });
    }

    function listenNotifications() {
      if (notificationsListener) notificationsListener();
      notificationsListener = db.collection('users').doc(currentUser.uid)
        .collection('notifications').where('read', '==', false)
        .onSnapshot(snap => {
          const count = snap.size;
          const badge = document.getElementById('msg-badge');
          if (count > 0) { badge.textContent = count; badge.classList.remove('hidden'); }
          else badge.classList.add('hidden');
        });
    }

    document.getElementById('reset-btn').addEventListener('click', async () => {
      if (!confirm('Удалить ВСЕ данные (котов, аккаунты)?')) return;
      const cols = ['cats','users','park','sales','trades','server'];
      const batch = db.batch();
      for (const col of cols) { const snap = await db.collection(col).get(); snap.forEach(d => batch.delete(d.ref)); }
      await batch.commit();
      auth.signOut();
    });

    document.getElementById('account-btn').addEventListener('click', showDeviceModal);

    document.querySelectorAll('.tab-btn').forEach(b => b.addEventListener('click', () => switchTab(b.dataset.tab)));
    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
      const container = document.getElementById('tab-content');
      if (tab === 'home') renderHome();
      else if (tab === 'allcats') renderAllCats();
      else if (tab === 'breeding') renderBreeding();
      else if (tab === 'shop') renderShop();
      else if (tab === 'park') renderPark();
      else if (tab === 'castle') renderCastle();
      else if (tab === 'mountain') renderMountain();
      else if (tab === 'lake') renderLake();
      else if (tab === 'admin') renderAdmin();
    }

    async function getNextIdNumber() {
      const snap = await db.collection('cats').where('owner','==',currentUser.uid).get();
      return String(snap.size+1).padStart(4,'0');
    }

    function updateAllTimers() {
      document.querySelectorAll('.adult-timer-home').forEach(el => {
        const until = new Date(el.dataset.until);
        el.textContent = '⌚ ' + timeLeftStr({toDate:()=>until});
      });
      document.querySelectorAll('.tired-timer-home').forEach(el => {
        const until = new Date(el.dataset.until);
        el.textContent = '⌚ ' + timeLeftStr({toDate:()=>until});
      });
    }

    // Дом
    function renderHome() {
      const cont = document.getElementById('tab-content');
      cont.innerHTML='<p>Загрузка...</p>';
      db.collection('cats').where('owner','==',currentUser.uid).onSnapshot(snap=>{
        const owned = snap.size;
        let html = '<div class="flex flex-wrap gap-3">';
        snap.forEach(doc=>{
          const c = doc.data();
          html += `<div class="cat-card bg-gray-700 p-3 rounded-lg w-44">
            <span class="cat-link cursor-pointer text-blue-300" data-cat-id="${doc.id}">🐱 ${c.name}</span>
            <div class="text-xs text-gray-400">{${c.gender==='male'?'мальчик':'девочка'}} [${c.idNumber}]</div>
            <div class="text-xs">${c.age}${c.adultAt ? ` <span class="adult-timer-home" data-until="${c.adultAt.toDate().toISOString()}">⌚ ${timeLeftStr(c.adultAt)}</span>` : ''}</div>
            <div class="text-xs text-pink-300">${c.state}${c.tiredUntil ? ` <span class="tired-timer-home" data-until="${c.tiredUntil.toDate().toISOString()}">⌚ ${timeLeftStr(c.tiredUntil)}</span>` : ''}</div>
            ${c.secondaryColor ? `<div class="text-xs text-purple-300">Втор. цвет: ${c.secondaryColor}</div>` : ''}
          </div>`;
        });
        html += '</div>';
        if(!snap.size) html += '<p class="text-gray-400">Нет котов</p>';
        let btnText='', dis=false;
        if(owned===0) btnText='Купить кота (бесплатно)';
        else if(owned===1) btnText='Купить кота (10 монет)';
        else if(owned===2) btnText='Купить кота (100 монет)';
        else { btnText='Заблокировано'; dis=true; }
        html += `<button id="buy-cat-btn" class="btn btn-pink mt-3" ${dis?'disabled':''}>${btnText}</button>`;
        cont.innerHTML = html;
        if(!dis) document.getElementById('buy-cat-btn')?.addEventListener('click', openChooseCatModal);
      });
    }

    function renderAllCats() {
      const cont = document.getElementById('tab-content');
      cont.innerHTML='<p>Загрузка...</p>';
      db.collection('cats').onSnapshot(snap=>{
        let html = '<div class="flex flex-wrap gap-3">';
        snap.forEach(doc=>{
          const c = doc.data();
          html += `<div class="bg-gray-700 p-3 rounded-lg w-44"><span class="cat-link cursor-pointer text-blue-300" data-cat-id="${doc.id}">🐱 ${c.name}</span><div class="text-xs text-gray-400">{${c.gender==='male'?'мальчик':'девочка'}}</div></div>`;
        });
        html += '</div>'; cont.innerHTML=html;
      });
    }

    function openChooseCatModal() {
      const cats = [generateRandomCat(), generateRandomCat(), generateRandomCat()];
      const modal = document.getElementById('choose-cat-modal');
      const content = document.getElementById('choose-cat-modal-content');
      let html = '<h2 class="text-xl font-bold text-pink-300 mb-3">Выберите котёнка</h2><div class="grid grid-cols-3 gap-3">';
      cats.forEach((cat,i)=>{
        html += `<div class="bg-gray-700 p-3 rounded-lg text-center"><p class="text-lg">🐱</p>
          <p><b>Окрас:</b> ${cat.mainColor}${cat.secondaryColor?' + '+cat.secondaryColor:''}</p>
          <p><b>Рисунок:</b> ${cat.pattern}</p>
          <p><b>Глаза:</b> ${typeof cat.eyeColor==='object'?formatEyeColor(cat.eyeColor):cat.eyeColor}</p>
          <p><b>Характер:</b> ${cat.character}</p>
          <button class="btn btn-pink mt-2 choose-cat-btn" data-idx="${i}">Выбрать</button></div>`;
      });
      html += '</div>'; content.innerHTML=html; modal.classList.add('active');
      window._tempCats=cats;
      content.querySelectorAll('.choose-cat-btn').forEach(b=>b.addEventListener('click', e=>{
        window._chosenCat = window._tempCats[e.target.dataset.idx];
        content.innerHTML = `<h2>Назовите кота</h2>
          <div class="bg-gray-700 p-3 rounded-lg mb-3"><p><b>Окрас:</b> ${window._chosenCat.mainColor}</p>
          <p><b>Рисунок:</b> ${window._chosenCat.pattern}</p><p><b>Глаза:</b> ${formatEyeColor(window._chosenCat.eyeColor)}</p>
          <p><b>Пол:</b> {${window._chosenCat.gender==='male'?'мальчик':'девочка'}}</p></div>
          <input id="new-cat-name" placeholder="Имя" class="w-full p-2 rounded bg-gray-700 mb-2">
          <button id="confirm-choose-btn" class="btn btn-pink">Забрать домой</button>
          <button class="btn btn-gray" onclick="document.getElementById('choose-cat-modal').classList.remove('active')">Отмена</button>`;
        document.getElementById('confirm-choose-btn').addEventListener('click', finalizeCatPurchase);
      }));
    }

    async function finalizeCatPurchase() {
      const name = document.getElementById('new-cat-name')?.value.trim();
      if(!name) return alert('Введите имя');
      const userRef = db.collection('users').doc(currentUser.uid);
      const userDoc = await userRef.get();
      const coins = userDoc.data().coins;
      const catsSnap = await db.collection('cats').where('owner','==',currentUser.uid).get();
      const owned = catsSnap.size;
      let price=0;
      if(owned===0) price=0; else if(owned===1) price=10; else if(owned===2) price=100;
      else { alert('Больше нельзя'); return; }
      if(coins < price) return alert('Недостаточно монет');
      const newCat = { ...window._chosenCat, owner:currentUser.uid, name, idNumber: await getNextIdNumber(),
        createdAt: firebase.firestore.FieldValue.serverTimestamp() };
      await db.collection('cats').add(newCat);
      await userRef.update({ coins: coins-price });
      updateCoinsDisplay();
      document.getElementById('choose-cat-modal').classList.remove('active');
    }

    // Разведение (сокращено)
    function renderBreeding() { /* ... */ }
    async function startBreeding() { /* ... */ }

    function formatEyeColor(ec) {
      if(typeof ec==='object' && ec.type==='разные') return `разные, ${ec.colors.join(', ')}`;
      return ec;
    }

    async function openCatView(catId) {
      const doc = await db.collection('cats').doc(catId).get();
      if(!doc.exists) return;
      const c = doc.data();
      let html = `<h2>🐱 ${c.name}</h2><p>Пол: {${c.gender==='male'?'мальчик':'девочка'}}</p>
        <p>ID: [${c.idNumber}]</p><p>Возраст: ${c.age}</p><p>Цвет: ${c.mainColor}${c.secondaryColor?' + '+c.secondaryColor:''}</p>
        ${c.secondaryColor ? `<p>Втор. цвет: ${c.secondaryColor}</p>` : ''}
        <p>Окрас: ${c.pattern}</p><p>Глаза: ${formatEyeColor(c.eyeColor)}</p><p>Характер: ${c.character}</p>
        <p>Состояние: ${c.state}</p><p>Мутации: ${c.mutations?.join(', ')||'нет'}</p>`;
      if (c.age === 'котёнок' && c.adultAt) {
        const ready = c.adultAt.toDate() <= new Date();
        html += `<p>⌚ Вырастет: ${ready ? '<button class="btn btn-pink adult-btn" data-cat-id="${catId}">✅ Вырос!</button>' : `<span class="countdown" id="adult-timer-${catId}">${timeLeftStr(c.adultAt)}</span>`}</p>`;
      }
      if (c.state.startsWith('уставш') && c.tiredUntil) {
        const ready = c.tiredUntil.toDate() <= new Date();
        html += `<p>⌚ Отдых: ${ready ? '<button class="btn btn-pink rest-btn" data-cat-id="${catId}">😴💤 Отдохнул</button>' : `<span class="countdown" id="tired-timer-${catId}">${timeLeftStr(c.tiredUntil)}</span>`}</p>`;
      }
      html += `<div class="flex space-x-2 mt-3">
        <button class="btn btn-gray" onclick="document.getElementById('cat-modal').classList.remove('active')">Закрыть</button>
        <button class="btn btn-pink family-tree-btn" data-cat-id="${catId}">🌳 Родословная</button>
        <button class="btn btn-pink compare-btn" data-cat-id="${catId}">🔍 Сравнить</button>
      </div>`;
      document.getElementById('cat-modal-content').innerHTML = html;
      document.getElementById('cat-modal').classList.add('active');
      // таймеры ...
    }

    // Админ-панель
    function renderAdmin() {
      const cont = document.getElementById('tab-content');
      cont.innerHTML = `<h3 class="text-xl font-bold mb-3">🛡️ Административная панель</h3>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm">Имя кота</label>
            <input id="admin-cat-name" class="w-full p-2 rounded bg-gray-700 mb-2" placeholder="Имя">
          </div>
          <div>
            <label class="block text-sm">Пол</label>
            <select id="admin-cat-gender" class="w-full p-2 rounded bg-gray-700 mb-2"><option value="male">Кот</option><option value="female">Кошка</option></select>
          </div>
          <div>
            <label class="block text-sm">Основной цвет</label>
            <select id="admin-main-color" class="w-full p-2 rounded bg-gray-700 mb-2">${COLORS.map(c=>`<option>${c}</option>`).join('')}</select>
          </div>
          <div>
            <label class="block text-sm">Второстепенный цвет</label>
            <select id="admin-secondary-color" class="w-full p-2 rounded bg-gray-700 mb-2"><option value="">Нет</option>${COLORS.map(c=>`<option>${c}</option>`).join('')}</select>
          </div>
          <div>
            <label class="block text-sm">Окрас</label>
            <select id="admin-pattern" class="w-full p-2 rounded bg-gray-700 mb-2">${PATTERNS.map(p=>`<option>${p}</option>`).join('')}</select>
          </div>
          <div>
            <label class="block text-sm">Цвет глаз</label>
            <select id="admin-eye-color" class="w-full p-2 rounded bg-gray-700 mb-2">${EYE_COLORS.map(e=>`<option>${e}</option>`).join('')}</select>
          </div>
          <div>
            <label class="block text-sm">Характер</label>
            <select id="admin-character" class="w-full p-2 rounded bg-gray-700 mb-2">${CHARACTERS.map(ch=>`<option>${ch}</option>`).join('')}</select>
          </div>
          <div>
            <label class="block text-sm">Мутации (через запятую)</label>
            <input id="admin-mutations" class="w-full p-2 rounded bg-gray-700 mb-2" placeholder="альбинизм, гетерохромия...">
          </div>
          <div class="col-span-2">
            <label class="block text-sm">UID игрока (оставьте пустым для себя)</label>
            <input id="admin-target-uid" class="w-full p-2 rounded bg-gray-700 mb-2" placeholder="UID (необязательно)">
            <button id="admin-create-cat" class="btn btn-pink w-full mt-2">Создать кота</button>
          </div>
        </div>`;
      document.getElementById('admin-create-cat').addEventListener('click', async ()=>{
        const name = document.getElementById('admin-cat-name').value.trim() || 'Админский кот';
        const gender = document.getElementById('admin-cat-gender').value;
        const mainColor = document.getElementById('admin-main-color').value;
        const secondaryColor = document.getElementById('admin-secondary-color').value || null;
        const pattern = document.getElementById('admin-pattern').value;
        const eyeColor = document.getElementById('admin-eye-color').value;
        const character = document.getElementById('admin-character').value;
        const mutationsStr = document.getElementById('admin-mutations').value.trim();
        const mutations = mutationsStr ? mutationsStr.split(',').map(s=>s.trim()) : [];
        const targetUid = document.getElementById('admin-target-uid').value.trim() || currentUser.uid;
        const catData = {
          name, gender, mainColor, secondaryColor, pattern, eyeColor, character,
          mutations, owner: targetUid, age: 'взрослый', state: 'лежит',
          isPregnant: false, pregnancyEnd: null, tiredUntil: null, birthCount: 0,
          motherId: null, fatherId: null,
          idNumber: await getNextIdNumberFor(targetUid),
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        };
        await db.collection('cats').add(catData);
        alert('Кот создан!');
      });
    }

    async function getNextIdNumberFor(uid) {
      const snap = await db.collection('cats').where('owner','==',uid).get();
      return String(snap.size+1).padStart(4,'0');
    }

    // Остальные функции (парк, замок, магазин, роды и т.д.) идентичны предыдущему полному коду, не привожу для экономии места
    // ...

    document.getElementById('logout-btn').addEventListener('click', ()=> auth.signOut());
    console.log('🐱 Генетика котов v5.1');
  </script>
