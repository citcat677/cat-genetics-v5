<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Генетика котов</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #1f2937; color: #f3f4f6; }
    .tab-btn { transition: all 0.2s; }
    .tab-btn.active { background: #374151; border-bottom: 3px solid #f472b6; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; z-index: 1000; }
    .modal.active { display: flex; }
    .modal-content { background: #2d3748; border-radius: 1rem; padding: 1.5rem; max-width: 90%; width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
    .cat-card { transition: transform 0.1s; }
    .cat-card:hover { transform: scale(1.02); background: #374151; }
    .btn { padding: 0.5rem 1rem; border-radius: 0.5rem; font-weight: 600; cursor: pointer; }
    .btn-pink { background: #ec4899; color: white; }
    .btn-pink:hover { background: #db2777; }
    .btn-gray { background: #4b5563; color: white; }
    .btn-gray:hover { background: #374151; }
    .notification-dot { position: absolute; top: -5px; right: -5px; background: #ef4444; color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 0.7rem; display: flex; align-items: center; justify-content: center; }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-start p-4">
  <div id="auth-container" class="w-full max-w-md mt-20 bg-gray-800 p-6 rounded-xl shadow-xl">
    <h1 class="text-2xl font-bold text-pink-400 mb-4">🐾 Генетика котов</h1>
    <input id="email" type="email" placeholder="Email" class="w-full p-2 mb-2 rounded bg-gray-700 text-white">
    <input id="password" type="password" placeholder="Пароль" class="w-full p-2 mb-2 rounded bg-gray-700 text-white">
    <button id="login-btn" class="btn btn-pink w-full mb-2">Войти</button>
    <button id="register-btn" class="btn btn-gray w-full">Регистрация</button>
  </div>

  <div id="app" class="w-full max-w-4xl hidden">
    <div class="flex justify-between items-center bg-gray-800 p-3 rounded-xl mb-4">
      <div class="flex space-x-2">
        <button class="tab-btn px-3 py-1 rounded" data-tab="home">🏠 Дом</button>
        <button class="tab-btn px-3 py-1 rounded" data-tab="street">🌍 Улица</button>
        <button class="tab-btn px-3 py-1 rounded" data-tab="breeding">💕 Разведение</button>
        <button class="tab-btn px-3 py-1 rounded" data-tab="shop">🛒 Магазин</button>
        <button class="tab-btn px-3 py-1 rounded" data-tab="park">🌳 Парк</button>
      </div>
      <div class="flex items-center space-x-3">
        <span id="game-time" class="text-yellow-300 font-mono">☀️ 00:00</span>
        <span id="coins-display" class="text-yellow-400 font-bold">🪙 0</span>
        <button id="msg-btn" class="relative text-xl">✉️ <span id="msg-badge" class="notification-dot hidden">0</span></button>
        <button id="account-btn" class="text-xl">⚙️</button>
        <button id="logout-btn" class="text-sm text-red-400">Выйти</button>
      </div>
    </div>
    <div id="tab-content" class="bg-gray-800 p-4 rounded-xl min-h-[300px]"></div>
  </div>

  <div id="cat-modal" class="modal"><div class="modal-content" id="cat-modal-content"></div></div>
  <div id="message-modal" class="modal"><div class="modal-content" id="message-modal-content"></div></div>
  <div id="confirm-modal" class="modal"><div class="modal-content" id="confirm-modal-content"></div></div>
  <div id="birth-modal" class="modal"><div class="modal-content" id="birth-modal-content"></div></div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBSO84yoAhHUCIejdf9mmo89oXIYeeSFfs",
      authDomain: "cat-genetics-v6.firebaseapp.com",
      projectId: "cat-genetics-v6",
      storageBucket: "cat-genetics-v6.firebasestorage.app",
      messagingSenderId: "302978224196",
      appId: "1:302978224196:web:106b02fc1157bd17fdac11",
      measurementId: "G-HKJQVRPCZJ"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null;
    let currentTab = 'home';
    let gameInterval = null;
    let notificationsListener = null;

    function updateGameTime() {
      const now = new Date();
      const hours = String(now.getHours()).padStart(2,'0');
      const mins = String(now.getMinutes()).padStart(2,'0');
      const icon = (now.getHours() >= 6 && now.getHours() < 18) ? '☀️' : '🌃';
      document.getElementById('game-time').textContent = `${icon} ${hours}:${mins}`;
    }

    document.getElementById('login-btn').addEventListener('click', () => {
      const email = document.getElementById('email').value.trim();
      const pass = document.getElementById('password').value;
      auth.signInWithEmailAndPassword(email, pass).catch(e => alert(e.message));
    });
    document.getElementById('register-btn').addEventListener('click', () => {
      const email = document.getElementById('email').value.trim();
      const pass = document.getElementById('password').value;
      auth.createUserWithEmailAndPassword(email, pass).catch(e => alert(e.message));
    });

    auth.onAuthStateChanged(user => {
      if (user) {
        currentUser = user;
        document.getElementById('auth-container').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
        initApp();
      } else {
        currentUser = null;
        document.getElementById('auth-container').classList.remove('hidden');
        document.getElementById('app').classList.add('hidden');
        if (gameInterval) clearInterval(gameInterval);
        if (notificationsListener) notificationsListener();
      }
    });

    async function initApp() {
      updateGameTime();
      gameInterval = setInterval(updateGameTime, 1000);
      const userDoc = await db.collection('users').doc(currentUser.uid).get();
      if (!userDoc.exists) {
        await db.collection('users').doc(currentUser.uid).set({ coins: 100, nickname: currentUser.email });
      }
      updateCoinsDisplay();
      listenNotifications();
      switchTab('home');
    }

    function updateCoinsDisplay() {
      db.collection('users').doc(currentUser.uid).get().then(doc => {
        const coins = doc.exists ? doc.data().coins : 0;
        document.getElementById('coins-display').textContent = `🪙 ${coins}`;
      });
    }

    function listenNotifications() {
      if (notificationsListener) notificationsListener();
      notificationsListener = db.collection('users').doc(currentUser.uid)
        .collection('notifications').where('read', '==', false)
        .onSnapshot(snapshot => {
          const count = snapshot.size;
          const badge = document.getElementById('msg-badge');
          if (count > 0) {
            badge.textContent = count;
            badge.classList.remove('hidden');
          } else {
            badge.classList.add('hidden');
          }
        });
    }

    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => switchTab(btn.dataset.tab));
    });

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
      const container = document.getElementById('tab-content');
      switch(tab) {
        case 'home': renderHome(); break;
        case 'street': renderStreet(); break;
        case 'breeding': renderBreeding(); break;
        case 'shop': container.innerHTML = '<p class="text-gray-400">Магазин в разработке</p>'; break;
        case 'park': container.innerHTML = '<p class="text-gray-400">Парк в разработке</p>'; break;
      }
    }

    function renderHome() {
      const container = document.getElementById('tab-content');
      container.innerHTML = '<p>Загрузка...</p>';
      db.collection('cats').where('owner', '==', currentUser.uid)
        .onSnapshot(snapshot => {
          let html = '<div class="flex flex-wrap gap-3" id="home-cats">';
          snapshot.forEach(doc => {
            const c = doc.data();
            html += `
              <div class="cat-card bg-gray-700 p-3 rounded-lg w-44">
                <span class="cat-link cursor-pointer text-blue-300 hover:underline" data-cat-id="${doc.id}">🐱 ${c.name}</span>
                <div class="text-xs text-gray-400">{${c.gender === 'male' ? 'мальчик' : 'девочка'}} [${c.idNumber || '0000'}]</div>
                <div class="text-xs">Возраст: ${c.age || 'взрослый'}</div>
                <div class="text-xs text-pink-300">${c.state || 'лежит'}</div>
              </div>`;
          });
          html += '</div>';
          if (snapshot.empty) html += '<p class="text-gray-400">У вас пока нет котов. Купите первого бесплатно!</p>';
          html += `<button id="buy-cat-btn" class="btn btn-pink mt-3">Купить кота 🐈</button>`;
          container.innerHTML = html;
          document.getElementById('buy-cat-btn')?.addEventListener('click', buyCat);
        });
    }

    async function buyCat() {
      const userRef = db.collection('users').doc(currentUser.uid);
      const userDoc = await userRef.get();
      if (!userDoc.exists) return;
      const data = userDoc.data();
      const currentCoins = data.coins || 0;
      const catsSnapshot = await db.collection('cats').where('owner', '==', currentUser.uid).get();
      const ownedCount = catsSnapshot.size;
      let price = 0;
      if (ownedCount === 0) price = 0;
      else if (ownedCount === 1) price = 10;
      else if (ownedCount === 2) price = 100;
      else { alert('Больше нельзя купить котов'); return; }

      if (currentCoins < price) { alert('Недостаточно монет'); return; }

      const name = prompt('Введите имя кота:');
      if (!name) return;

      const newCat = {
        owner: currentUser.uid,
        name: name,
        gender: Math.random() < 0.5 ? 'male' : 'female',
        idNumber: String(ownedCount + 1).padStart(4, '0'),
        age: 'взрослый',
        state: 'лежит',
        mainColor: 'чёрный',
        pattern: 'однотонный',
        eyeColor: 'зелёный',
        character: 'спокойный',
        mutations: [],
        secondaryColor: null,
        isPregnant: false,
        pregnancyEnd: null,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      };
      await db.collection('cats').add(newCat);
      await userRef.update({ coins: currentCoins - price });
      updateCoinsDisplay();
    }

    function renderStreet() {
      const container = document.getElementById('tab-content');
      container.innerHTML = '<p>Загрузка...</p>';
      db.collection('cats').onSnapshot(snapshot => {
        let html = '<div class="flex flex-wrap gap-3">';
        snapshot.forEach(doc => {
          const c = doc.data();
          html += `<div class="bg-gray-700 p-3 rounded-lg w-44">
            <span class="cat-link cursor-pointer text-blue-300" data-cat-id="${doc.id}">🐱 ${c.name}</span>
            <div class="text-xs text-gray-400">{${c.gender === 'male' ? 'мальчик' : 'девочка'}}</div>
          </div>`;
        });
        html += '</div>';
        container.innerHTML = html;
      });
    }

    function renderBreeding() {
      const container = document.getElementById('tab-content');
      container.innerHTML = '<p>Загрузка...</p>';
      db.collection('cats').where('owner', '==', currentUser.uid).get().then(snapshot => {
        const cats = [];
        snapshot.forEach(doc => cats.push({ id: doc.id, ...doc.data() }));
        const females = cats.filter(c => c.gender === 'female' && c.age !== 'котёнок' && !c.isPregnant);
        const males = cats.filter(c => c.gender === 'male' && c.age !== 'котёнок');
        let html = '<div class="space-y-4" id="breed-area">';
        html += '<div><label class="block text-sm">Мать {девочка}:</label><select id="mother-select" class="w-full p-2 rounded bg-gray-700">';
        html += '<option value="">-- выберите --</option>';
        females.forEach(c => html += `<option value="${c.id}">${c.name} [${c.idNumber}]</option>`);
        html += '</select></div>';
        html += '<div><label class="block text-sm">Отец {мальчик}:</label><select id="father-select" class="w-full p-2 rounded bg-gray-700">';
        html += '<option value="">-- выберите --</option>';
        males.forEach(c => html += `<option value="${c.id}">${c.name} [${c.idNumber}]</option>`);
        html += '</select></div>';
        html += '<button id="breed-btn" class="btn btn-pink">Скрестить 💕</button>';
        html += '</div>';
        container.innerHTML = html;
      });
    }

    async function startBreeding() {
      const motherId = document.getElementById('mother-select')?.value;
      const fatherId = document.getElementById('father-select')?.value;
      if (!motherId || !fatherId) return alert('Выберите обоих родителей');
      if (motherId === fatherId) return alert('Нельзя скрестить кота с самим собой');

      const userRef = db.collection('users').doc(currentUser.uid);
      const userDoc = await userRef.get();
      const coins = userDoc.data().coins;
      if (coins < 10) return alert('Недостаточно монет (нужно 10)');

      const motherDoc = await db.collection('cats').doc(motherId).get();
      if (motherDoc.data().isPregnant) return alert('Кошка уже беременна');

      const confirmed = confirm('Потратить 10 монет на вязку?');
      if (!confirmed) return;

      await userRef.update({ coins: coins - 10 });
      const pregnancyEnd = new Date(Date.now() + 5 * 60000);
      await db.collection('cats').doc(motherId).update({
        isPregnant: true,
        state: 'беременна',
        pregnancyEnd: firebase.firestore.Timestamp.fromDate(pregnancyEnd)
      });

      await db.collection('users').doc(currentUser.uid).collection('notifications').add({
        type: 'pregnancy',
        message: `🐱 ${motherDoc.data().name} беременна. Роды через 5 минут.`,
        motherId: motherId,
        fatherId: fatherId,
        read: false,
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
      });
      updateCoinsDisplay();
      alert('Вязка успешна! Ожидайте.');
      switchTab('breeding');
    }

    document.addEventListener('click', (e) => {
      if (e.target.classList.contains('modal')) {
        e.target.classList.remove('active');
        return;
      }

      const catLink = e.target.closest('[data-cat-id]');
      if (catLink) {
        openCatView(catLink.dataset.catId);
        return;
      }

      if (e.target.id === 'breed-btn') {
        startBreeding();
        return;
      }

      const birthAction = e.target.closest('[data-action="accept-birth"]');
      if (birthAction) {
        const motherId = birthAction.dataset.motherId;
        const fatherId = birthAction.dataset.fatherId;
        openBirthModal(motherId, fatherId);
        return;
      }
    });

    async function openCatView(catId) {
      const doc = await db.collection('cats').doc(catId).get();
      if (!doc.exists) return alert('Кот не найден');
      const c = doc.data();
      const modal = document.getElementById('cat-modal');
      const content = document.getElementById('cat-modal-content');
      content.innerHTML = `
        <h2 class="text-xl font-bold text-pink-300">🐱 ${c.name}</h2>
        <p><b>Пол:</b> {${c.gender === 'male' ? 'мальчик' : 'девочка'}}</p>
        <p><b>ID:</b> [${c.idNumber || '0000'}]</p>
        <p><b>Возраст:</b> ${c.age}</p>
        <p><b>Основной цвет:</b> ${c.mainColor}</p>
        <p><b>Окрас:</b> ${c.pattern}</p>
        <p><b>Цвет глаз:</b> ${c.eyeColor}</p>
        <p><b>Характер:</b> ${c.character}</p>
        <p><b>Состояние:</b> ${c.state}</p>
        <p><b>Мутации:</b> ${c.mutations?.join(', ') || 'нет'}</p>
        <button class="btn btn-gray mt-3" onclick="document.getElementById('cat-modal').classList.remove('active')">Закрыть</button>
      `;
      modal.classList.add('active');
    }

    async function openBirthModal(motherId, fatherId) {
      const motherDoc = await db.collection('cats').doc(motherId).get();
      const mother = motherDoc.data();
      const modal = document.getElementById('birth-modal');
      const content = document.getElementById('birth-modal-content');
      const kitten = {
        owner: currentUser.uid,
        name: '',
        gender: Math.random() < 0.5 ? 'male' : 'female',
        idNumber: '0000',
        age: 'котёнок',
        state: 'лежит',
        mainColor: mother.mainColor,
        pattern: mother.pattern,
        eyeColor: mother.eyeColor,
        character: mother.character,
        mutations: [],
        secondaryColor: null,
        isPregnant: false,
        pregnancyEnd: null
      };
      content.innerHTML = `
        <h2 class="text-xl font-bold">💥 Роды!</h2>
        <p>Кошка ${mother.name} родила котёнка.</p>
        <p>Пол: {${kitten.gender === 'male' ? 'мальчик' : 'девочка'}}</p>
        <input id="kitten-name" type="text" placeholder="Имя котёнка" class="w-full p-2 rounded bg-gray-700 mb-2">
        <button id="save-kitten" class="btn btn-pink">Сохранить</button>
        <button class="btn btn-gray" onclick="document.getElementById('birth-modal').classList.remove('active')">Отмена</button>
      `;
      modal.classList.add('active');

      document.getElementById('save-kitten').addEventListener('click', async () => {
        const name = document.getElementById('kitten-name').value.trim();
        if (!name) return alert('Введите имя');
        kitten.name = name;
        const siblings = await db.collection('cats').where('owner', '==', currentUser.uid).get();
        kitten.idNumber = String(siblings.size + 1).padStart(4, '0');
        await db.collection('cats').add(kitten);
        await db.collection('cats').doc(motherId).update({ isPregnant: false, state: 'лежит', pregnancyEnd: null });
        const notifSnap = await db.collection('users').doc(currentUser.uid)
          .collection('notifications').where('motherId', '==', motherId).where('type', '==', 'pregnancy').get();
        notifSnap.forEach(async ndoc => await ndoc.ref.delete());
        modal.classList.remove('active');
        updateCoinsDisplay();
        switchTab('home');
      });
    }

    document.getElementById('msg-btn').addEventListener('click', async () => {
      const modal = document.getElementById('message-modal');
      const content = document.getElementById('message-modal-content');
      const notifSnap = await db.collection('users').doc(currentUser.uid)
        .collection('notifications').where('read', '==', false).get();
      let html = '<h2 class="text-lg font-bold mb-2">📬 Уведомления</h2>';
      if (notifSnap.empty) html += '<p>Нет новых уведомлений</p>';
      notifSnap.forEach(doc => {
        const n = doc.data();
        html += `<div class="bg-gray-700 p-2 rounded mb-2 flex justify-between items-center">
          <span>${n.message}</span>
          ${n.type === 'pregnancy' ? `<button data-action="accept-birth" data-mother-id="${n.motherId}" data-father-id="${n.fatherId}" class="text-pink-400 text-sm">👁 Принять роды</button>` : ''}
        </div>`;
      });
      html += '<button class="btn btn-gray mt-2" onclick="document.getElementById(\'message-modal\').classList.remove(\'active\')">Закрыть</button>';
      content.innerHTML = html;
      modal.classList.add('active');
    });

    document.getElementById('logout-btn').addEventListener('click', () => auth.signOut());

    setInterval(async () => {
      if (!currentUser) return;
      const now = new Date();
      const pregnantCats = await db.collection('cats')
        .where('owner', '==', currentUser.uid)
        .where('isPregnant', '==', true).get();
      pregnantCats.forEach(async doc => {
        const data = doc.data();
        if (data.pregnancyEnd && data.pregnancyEnd.toDate() <= now) {
          await db.collection('users').doc(currentUser.uid).collection('notifications').add({
            type: 'birth_ready',
            message: `💥 ${data.name} готова родить! Нажмите, чтобы принять роды.`,
            motherId: doc.id,
            fatherId: 'unknown',
            read: false,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
          });
        }
      });
    }, 10000);

    document.addEventListener('click', (e) => {
      if (e.target.id === 'buy-cat-btn') buyCat();
    });

    console.log('🐱 Генетика котов готова. Делегирование активно.');
  </script>
</body>
</html>
